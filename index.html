<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin AI | v3.0 Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #0b0b0d; --sidebar: #000000; --card: #141416; --text: #ececed; --accent: #a855f7; --user-msg: #202023; }
        .theme-gold { --accent: #e2b714; } .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #22c55e; }
        .theme-red { --accent: #ef4444; } .theme-pink { --accent: #ec4899; } .theme-light { --bg: #f8f9fa; --sidebar: #ffffff; --card: #ffffff; --text: #1a1a1b; --user-msg: #f1f1f4; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .font-magic { font-family: 'Cinzel', serif; }
        
        #sidebar { transition: transform 0.3s ease; z-index: 60; }
        @media (max-width: 768px) { #sidebar { position: fixed; transform: translateX(-100%); } #sidebar.open { transform: translateX(0); } }

        .user-msg { align-self: flex-start; background: var(--user-msg); padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 14px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .ai-msg { align-self: flex-end; padding: 12px; max-width: 90%; text-align: left; }
        
        .file-card { background: rgba(255,255,255,0.05); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 12px; display: inline-flex; align-items: center; gap: 8px; font-size: 11px; margin-top: 8px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-[var(--card)] p-8 rounded-3xl border border-white/5 w-full max-w-sm text-center shadow-2xl">
            <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">🧞</div>
            <h2 class="text-2xl font-bold font-magic text-[var(--accent)] mb-6">ALADDIN v3.0</h2>
            <div id="email-step">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[var(--accent)] transition">
                <button onclick="sendOTP()" id="otp-btn" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:opacity-90 transition">Grant Access</button>
            </div>
            <div id="otp-step" class="hidden">
                <input type="text" id="auth-otp" placeholder="Enter Magic Code" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 text-center text-2xl tracking-widest outline-none">
                <button onclick="verifyOTP()" class="w-full bg-[var(--accent)] text-white font-bold py-4 rounded-xl">Verify Wish</button>
            </div>
            <div id="profile-step" class="hidden text-left">
                <p class="text-xs opacity-50 mb-2">Final Step: Introduce yourself</p>
                <input type="text" id="user-name" placeholder="Full Name" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 outline-none">
                <button onclick="saveProfile()" class="w-full bg-white text-black font-bold py-4 rounded-xl">Start Journey</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="w-[300px] bg-[var(--sidebar)] border-r border-white/5 flex flex-col p-6 shrink-0 h-full">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3 font-magic font-bold text-lg text-[var(--accent)]">
                <span class="text-2xl">🧞</span> ALADDIN
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-2xl opacity-50">×</button>
        </div>

        <button onclick="createNewChat()" class="w-full flex items-center justify-between p-4 rounded-xl bg-white/5 border border-white/10 text-sm mb-8 hover:bg-white/10 transition">
            <span>+ New chat</span>
            <kbd class="text-[10px] opacity-40">⌘ K</kbd>
        </button>

        <div class="flex-1 overflow-y-auto space-y-8 text-sm custom-scrollbar pr-2">
            <section>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4">🧭 Core Options</p>
                <div class="space-y-1">
                    <div onclick="createNewChat()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3"><span>✨</span> New conversation</div>
                    <div onclick="focusSearch()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3"><span>🔍</span> Search chats</div>
                    <div onclick="alert('Codex AI is warming up!')" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 font-medium text-[var(--accent)]"><span>💻</span> Codex AI</div>
                </div>
            </section>

            <section>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4">📁 Projects</p>
                <div onclick="alert('Project Workspace coming soon!')" class="p-4 border-2 border-dashed border-white/5 rounded-2xl text-center text-xs opacity-40 cursor-pointer hover:border-[var(--accent)] hover:opacity-100 transition">
                    + New project
                </div>
            </section>

            <section id="chat-list-container">
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4">🕘 Recent Chats</p>
                <div id="chat-list" class="space-y-2"></div>
            </section>
        </div>

        <div class="pt-6 border-t border-white/5 space-y-4">
            <div class="flex justify-between items-center px-1">
                <div onclick="setTheme('gold')" class="w-5 h-5 bg-[#e2b714] rounded-full cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('blue')" class="w-5 h-5 bg-[#3b82f6] rounded-full cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('green')" class="w-5 h-5 bg-[#22c55e] rounded-full cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('purple')" class="w-5 h-5 bg-[#a855f7] rounded-full cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('red')" class="w-5 h-5 bg-[#ef4444] rounded-full cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('light')" class="w-5 h-5 bg-white rounded-full border border-black/10 cursor-pointer hover:scale-125 transition"></div>
            </div>
            
            <div class="flex items-center gap-4 p-3 bg-white/5 rounded-2xl border border-white/5 relative group">
                <input type="file" id="pfp-upload" class="hidden" accept="image/*" onchange="updatePFP(this)">
                <div onclick="document.getElementById('pfp-upload').click()" class="w-10 h-10 rounded-full bg-[var(--accent)] flex items-center justify-center text-white font-bold cursor-pointer overflow-hidden shadow-lg">
                    <img id="user-pfp-img" class="w-full h-full object-cover hidden">
                    <span id="pfp-fallback">U</span>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="nav-user-name" class="font-semibold text-xs truncate">Master</p>
                    <button onclick="logout()" class="text-[10px] text-red-400 hover:underline">Logout Session</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 relative">
        <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 bg-[var(--bg)]/80 backdrop-blur-xl z-40">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-lg">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex bg-black/20 p-1 rounded-xl gap-1 border border-white/5">
                    <button onclick="setBrain('Basic', this)" class="brain-tab px-3 py-1.5 text-[10px] rounded-lg active bg-[var(--accent)] text-white">Basic</button>
                    <button onclick="setBrain('Pro', this)" class="brain-tab px-3 py-1.5 text-[10px] rounded-lg">Pro</button>
                    <button onclick="setBrain('Ultra', this)" class="brain-tab px-3 py-1.5 text-[10px] rounded-lg">Ultra</button>
                    <button onclick="setBrain('Cherag', this)" class="brain-tab px-3 py-1.5 text-[10px] rounded-lg">Cherag Pro</button>
                </div>
            </div>
            <div id="status-bar" class="text-[10px] font-medium opacity-40 uppercase tracking-widest hidden md:block">The Lamp is Online</div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-12 custom-scrollbar">
            <div id="messages" class="max-w-3xl mx-auto flex flex-col">
                <div id="empty-state" class="py-32 text-center">
                    <h1 class="text-4xl font-magic font-bold opacity-10 mb-4">ALADDIN LEGEND</h1>
                    <p class="text-sm opacity-20">A professional assistant for your every wish.</p>
                </div>
            </div>
        </div>

        <div class="p-6">
            <div class="max-w-3xl mx-auto relative">
                <div id="upload-tray" class="flex gap-2 mb-3 overflow-x-auto"></div>
                
                <div class="bg-[var(--card)] border border-white/10 rounded-3xl shadow-2xl p-2 focus-within:border-[var(--accent)] transition-all duration-300">
                    <div class="flex items-end gap-2 px-2 pb-1">
                        <button onclick="document.getElementById('chat-file').click()" class="p-3 text-gray-500 hover:text-[var(--accent)] transition">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                        </button>
                        <input type="file" id="chat-file" class="hidden" multiple onchange="handleFile(this)">
                        
                        <textarea id="user-input" rows="1" placeholder="Ask Aladdin anything..." 
                            class="flex-1 bg-transparent py-3 outline-none resize-none text-sm max-h-48 custom-scrollbar"></textarea>
                        
                        <button onclick="handleSend()" id="send-btn" class="mb-1 p-3 bg-[var(--accent)] text-white rounded-2xl shadow-lg hover:scale-105 active:scale-95 transition">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GROQ_KEY = "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";
        const EMAILJS = { service: "service_d7q8v4o", template: "template_9nrhdsl", key: "5IDeLAjB6gy610xIB" };

        let chats = JSON.parse(localStorage.getItem('al_chats')) || [];
        let currentChatId = null;
        let selectedBrain = "Basic";
        let uploadedFiles = [];

        // Initialize App
        window.onload = () => {
            emailjs.init(EMAILJS.key);
            // Persistent Theme Load
            const savedTheme = localStorage.getItem('al_theme') || 'purple';
            setTheme(savedTheme);
            
            if(localStorage.getItem('al_logged') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                loadProfile();
                if(chats.length > 0) renderChat(chats[0].id); else createNewChat();
            }
        };

        function setTheme(t) {
            document.body.className = "flex h-screen overflow-hidden theme-" + t;
            localStorage.setItem('al_theme', t);
        }

        // --- AUTH LOGIC (UNTOUCHED) ---
        let currentOTP = "";
        async function sendOTP() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Enter valid email");
            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
            try {
                await emailjs.send(EMAILJS.service, EMAILJS.template, { email: email, otp: currentOTP });
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            } catch (e) { alert("Email Failed! Use '123456' (Demo Mode)"); currentOTP = "123456"; }
        }
        function verifyOTP() {
            if(document.getElementById('auth-otp').value === currentOTP) {
                document.getElementById('otp-step').classList.add('hidden');
                document.getElementById('profile-step').classList.remove('hidden');
            } else alert("Wrong code!");
        }
        function saveProfile() {
            const name = document.getElementById('user-name').value || "Master";
            localStorage.setItem('al_profile', JSON.stringify({name, pfp: null}));
            localStorage.setItem('al_logged', 'true');
            location.reload();
        }

        // --- CORE UI ACTIONS ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({id, title: "New Conversation", messages: []});
            save(); renderSidebar(); renderChat(id);
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="renderChat(${c.id})" class="p-3 rounded-xl cursor-pointer flex justify-between group transition ${c.id === currentChatId ? 'bg-white/5 border border-white/5' : 'hover:bg-white/5'}">
                    <span class="truncate text-xs opacity-70">${c.title}</span>
                    <button onclick="deleteChat(event, ${c.id})" class="opacity-0 group-hover:opacity-100 text-red-500">×</button>
                </div>
            `).join('');
        }

        function renderChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            const container = document.getElementById('messages');
            container.innerHTML = "";
            document.getElementById('empty-state').style.display = chat.messages.length ? 'none' : 'block';
            chat.messages.forEach(m => addMessageUI(m.role, m.content, m.files));
            renderSidebar();
        }

        // --- FILE HANDLING ---
        function handleFile(input) {
            const tray = document.getElementById('upload-tray');
            Array.from(input.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = { name: f.name, type: f.type, data: e.target.result };
                    uploadedFiles.push(fileData);
                    const pill = document.createElement('div');
                    pill.className = "bg-[var(--accent)]/20 border border-[var(--accent)]/30 text-[10px] p-2 rounded-lg flex items-center gap-2";
                    pill.innerHTML = `📄 ${f.name.substring(0,10)}...`;
                    tray.appendChild(pill);
                };
                reader.readAsDataURL(f);
            });
        }

        function updatePFP(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const profile = JSON.parse(localStorage.getItem('al_profile'));
                profile.pfp = e.target.result;
                localStorage.setItem('al_profile', JSON.stringify(profile));
                loadProfile();
            };
            reader.readAsDataURL(file);
        }

        function loadProfile() {
            const p = JSON.parse(localStorage.getItem('al_profile'));
            document.getElementById('nav-user-name').innerText = p.name;
            if(p.pfp) {
                document.getElementById('user-pfp-img').src = p.pfp;
                document.getElementById('user-pfp-img').classList.remove('hidden');
                document.getElementById('pfp-fallback').classList.add('hidden');
            }
        }

        // --- CHAT & AI LOGIC ---
        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !uploadedFiles.length) return;

            const chat = chats.find(c => c.id === currentChatId);
            if(chat.messages.length === 0) chat.title = text ? text.substring(0, 25) : "File Analysis";

            // Add User Message
            addMessageUI('user', text, uploadedFiles);
            chat.messages.push({role: 'user', content: text, files: [...uploadedFiles]});
            
            const currentFiles = [...uploadedFiles];
            input.value = "";
            uploadedFiles = [];
            document.getElementById('upload-tray').innerHTML = "";
            document.getElementById('empty-state').style.display = 'none';

            // AI Thinking
            const aiStream = addMessageUI('ai', `<span class="opacity-40 animate-pulse italic">ALADDIN is thinking...</span>`, null, true);
            
            try {
                // File Context Preparation
                let fileContext = currentFiles.length ? `[User uploaded ${currentFiles.length} file(s): ${currentFiles.map(f => f.name).join(', ')}. Analyze them if relevant.] ` : "";
                
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: selectedBrain === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "You are Aladdin AI v3.0 Ultra. Professional, precise, and helpful. Always give tips at the end. Final sentence must be: 'Do you need anything else? I am Aladdin, right by your side.'"},
                            ...chat.messages.map(m => ({role: m.role === 'user' ? 'user' : 'assistant', content: m.content}))
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiStream.innerHTML = marked.parse(aiText);
                chat.messages.push({role: 'assistant', content: aiText});
                save();
                renderSidebar();
            } catch (e) { aiStream.innerHTML = "Error connecting to the lamp. Check your internet."; }
        }

        function addMessageUI(role, content, files = [], isStream = false) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            
            const pfp = JSON.parse(localStorage.getItem('al_profile'))?.pfp;
            const avatar = role === 'user' ? (pfp ? `<img src="${pfp}" class="w-full h-full object-cover">` : 'U') : '🧞';

            let fileHtml = files?.map(f => `
                <div class="file-card">
                    <span>${f.type.includes('image') ? '🖼️' : '📄'}</span>
                    <span>${f.name}</span>
                </div>
            `).join('') || "";

            div.innerHTML = `
                <div class="flex items-center gap-2 mb-2 opacity-30 text-[10px] font-bold tracking-tighter">
                    <div class="w-4 h-4 rounded-full bg-[var(--accent)] overflow-hidden flex items-center justify-center text-[8px] text-white">${avatar}</div>
                    ${role === 'user' ? 'MASTER' : 'ALADDIN AI'}
                </div>
                <div class="prose prose-sm prose-invert max-w-full">${isStream ? content : marked.parse(content || "")}</div>
                ${fileHtml}
            `;
            
            document.getElementById('messages').appendChild(div);
            const win = document.getElementById('chat-window');
            win.scrollTo({ top: win.scrollHeight, behavior: 'smooth' });
            return div.querySelector('.prose');
        }

        function setBrain(type, el) {
            selectedBrain = type;
            document.querySelectorAll('.brain-tab').forEach(b => b.classList.remove('bg-[var(--accent)]', 'text-white'));
            el.classList.add('bg-[var(--accent)]', 'text-white');
        }

        function save() { localStorage.setItem('al_chats', JSON.stringify(chats)); }
        function deleteChat(e, id) { e.stopPropagation(); chats = chats.filter(c => c.id !== id); save(); location.reload(); }
        function logout() { localStorage.clear(); location.reload(); }
        
        // Key bindings
        document.getElementById('user-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
    </script>
</body>
</html>
