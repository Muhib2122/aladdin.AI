<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Ultra Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-main: #0b0d0e; --bg-sidebar: #000000; --bg-chat: #1a1d21; --text-main: #ececf1; --accent: #10a37f; --border: rgba(255,255,255,0.1);
        }
        [data-theme="light"] { --bg-main: #ffffff; --bg-sidebar: #f9fafb; --bg-chat: #f3f4f6; --text-main: #1f2937; --accent: #10a37f; --border: rgba(0,0,0,0.1); }
        [data-theme="blue"] { --bg-main: #020617; --bg-sidebar: #0f172a; --bg-chat: #1e293b; --text-main: #f8fafc; --accent: #3b82f6; --border: rgba(255,255,255,0.1); }
        [data-theme="purple"] { --bg-main: #0f0720; --bg-sidebar: #1e1b4b; --bg-chat: #2e1065; --text-main: #f5f3ff; --accent: #a855f7; --border: rgba(255,255,255,0.1); }
        [data-theme="crimson"] { --bg-main: #1a0505; --bg-sidebar: #450a0a; --bg-chat: #7f1d1d; --text-main: #fef2f2; --accent: #ef4444; --border: rgba(255,255,255,0.1); }
        [data-theme="midnight"] { --bg-main: #000000; --bg-sidebar: #090909; --bg-chat: #121212; --text-main: #ffffff; --accent: #f59e0b; --border: rgba(255,255,255,0.05); }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: background 0.3s ease; }
        .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid var(--border); }
        .glass-panel { background: var(--bg-chat); border: 1px solid var(--border); border-radius: 1.25rem; }
        
        .user-msg { background-color: var(--bg-chat); border: 1px solid var(--border); }
        .ai-msg { background-color: transparent; }
        
        .popup-menu { position: absolute; bottom: 80px; left: 10px; width: 240px; background: var(--bg-chat); border: 1px solid var(--border); border-radius: 12px; display: none; z-index: 100; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .popup-menu.show { display: block; animation: fadeInUp 0.2s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }
        
        .loader-dots span { animation: blink 1.4s infinite both; }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden" data-theme="midnight">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-[#111] border border-white/10 p-10 rounded-[2.5rem] text-center shadow-2xl">
            <img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-20 h-20 mx-auto mb-6 animate-pulse">
            <h1 class="text-4xl font-bold text-white mb-2">Aladdin AI</h1>
            <p class="text-gray-400 text-sm mb-8">Enter the world of magic & intelligence</p>

            <div id="auth-step-1" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-[var(--accent)] text-white">
                <button onclick="sendMagicCode()" id="btn-send-code" class="w-full p-4 bg-[var(--accent)] text-white rounded-2xl font-bold hover:opacity-90 transition">Send Verification Code</button>
            </div>

            <div id="auth-step-2" class="hidden space-y-4">
                <div class="flex justify-center gap-2">
                    <input type="text" id="login-otp" maxlength="6" placeholder="000000" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-center text-3xl tracking-[0.3em] font-mono outline-none text-white">
                </div>
                <button onclick="verifyCode()" class="w-full p-4 bg-white text-black rounded-2xl font-bold">Verify Code</button>
            </div>

            <div id="auth-step-3" class="hidden space-y-3 text-left">
                <input type="text" id="reg-name" placeholder="Your Name" class="w-full p-4 bg-white/5 rounded-xl border border-white/10 text-white">
                <div class="flex gap-2">
                    <input type="number" id="reg-age" placeholder="Age" class="w-1/3 p-4 bg-white/5 rounded-xl border border-white/10 text-white">
                    <input type="text" id="reg-country" placeholder="Country" class="w-2/3 p-4 bg-white/5 rounded-xl border border-white/10 text-white">
                </div>
                <button onclick="completeLogin()" class="w-full p-4 bg-[var(--accent)] rounded-2xl font-bold text-white mt-4">Start Magic</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="sidebar w-[280px] flex flex-col h-full hidden md:flex transition-all">
        <div class="p-6 flex items-center gap-3 font-bold text-2xl border-b border-white/5">
            <img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-8 h-8">
            Aladdin <span class="text-[var(--accent)]">AI</span>
        </div>
        
        <div class="p-4">
            <button onclick="startNewChat()" class="flex items-center gap-3 w-full p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition text-sm font-medium">
                <i class="fa-solid fa-plus"></i> New Conversation
            </button>
        </div>

        <div id="chat-history" class="flex-1 overflow-y-auto px-4 space-y-2 text-sm opacity-80"></div>

        <div class="p-4 mt-auto relative">
            <div id="user-popup" class="popup-menu p-3 text-white">
                <div class="text-[10px] text-gray-500 px-3 py-1 uppercase font-black">Preferences</div>
                <button onclick="openSettings()" class="w-full text-left px-3 py-3 hover:bg-white/5 rounded-xl flex items-center gap-3"><i class="fa-solid fa-sliders"></i> Settings</button>
                <div class="border-t border-white/5 my-2"></div>
                <button onclick="logout()" class="w-full text-left px-3 py-3 text-red-400 hover:bg-red-500/10 rounded-xl flex items-center gap-3"><i class="fa-solid fa-power-off"></i> Logout</button>
            </div>

            <div onclick="toggleMenu()" class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                <img id="sidebar-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-10 h-10 rounded-full object-cover border border-white/10">
                <div class="flex-1 truncate">
                    <p class="font-bold text-sm" id="sidebar-name">Master</p>
                    <p class="text-[10px] text-[var(--accent)] font-bold">LEGEND PLAN</p>
                </div>
                <i class="fa-solid fa-ellipsis-h text-gray-500"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="flex items-center justify-between p-4 md:px-8 border-b border-white/5 bg-transparent backdrop-blur-md z-20">
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="md:hidden text-xl"><i class="fa-solid fa-bars-staggered"></i></button>
            
            <div class="flex bg-white/5 p-1 rounded-xl gap-1 text-[10px] font-bold">
                <button onclick="setLevel('Basic')" id="btn-Basic" class="level-btn px-4 py-2 rounded-lg transition">BASIC</button>
                <button onclick="setLevel('Pro')" id="btn-Pro" class="level-btn px-4 py-2 rounded-lg transition">PRO</button>
                <button onclick="setLevel('Ultra')" id="btn-Ultra" class="level-btn px-4 py-2 rounded-lg transition">ULTRA</button>
                <button onclick="setLevel('Legend')" id="btn-Legend" class="level-btn px-4 py-2 rounded-lg transition active bg-[var(--accent)] text-white">LEGEND</button>
            </div>
            <div class="w-8"></div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-60 pb-40">
            <div id="welcome-state" class="h-full flex flex-col items-center justify-center text-center">
                <img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-24 h-24 mb-8 drop-shadow-2xl">
                <h2 id="greeting-msg" class="text-3xl md:text-5xl font-bold mb-4 tracking-tight"></h2>
                <p class="text-gray-500 max-w-md mx-auto leading-relaxed">Aladdin AI is now at your service. Ask anything, upload images, or create magic visuals.</p>
            </div>
            <div id="messages" class="space-y-8 pt-10"></div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent pt-20 pb-8 px-4 md:px-20 lg:px-60">
            <div class="glass-panel p-2 shadow-3xl relative max-w-4xl mx-auto">
                <div id="file-preview" class="flex gap-2 p-2 hidden overflow-x-auto border-b border-white/5 mb-2"></div>
                
                <div class="flex items-end gap-2 px-2">
                    <label class="p-4 cursor-pointer text-gray-400 hover:text-[var(--accent)] transition">
                        <i class="fa-solid fa-paperclip text-xl"></i>
                        <input type="file" id="media-upload" class="hidden" multiple accept="image/*, .pdf" onchange="handleFiles(this)">
                    </label>
                    <textarea id="prompt-input" rows="1" placeholder="Ask Aladdin anything..." class="flex-1 bg-transparent border-none outline-none py-4 px-2 resize-none max-h-60 text-lg"></textarea>
                    <button id="send-btn" onclick="sendPrompt()" class="m-1 p-4 bg-[var(--accent)] text-white rounded-2xl hover:scale-105 active:scale-95 transition shadow-lg">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
            <div class="text-center text-[9px] mt-4 opacity-30 tracking-widest uppercase">Aladdin v3.0 • Powered by Muhib Creation • Dhaka</div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[300] bg-black/90 hidden items-center justify-center p-4 backdrop-blur-xl">
        <div class="max-w-lg w-full bg-[var(--bg-chat)] p-8 rounded-[2rem] border border-white/10 text-white space-y-6">
            <div class="flex justify-between items-center border-b border-white/5 pb-4">
                <h2 class="text-2xl font-bold">Configuration</h2>
                <button onclick="closeSettings()" class="hover:rotate-90 transition"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-6 overflow-y-auto max-h-[70vh] pr-2">
                <div>
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest block mb-4">Identity Photo</label>
                    <div class="flex items-center gap-6">
                        <img id="settings-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-20 h-20 rounded-full object-cover border-2 border-[var(--accent)]">
                        <input type="file" id="pfp-upload" class="hidden" accept="image/*" onchange="updatePFP(this)">
                        <button onclick="document.getElementById('pfp-upload').click()" class="px-6 py-3 bg-white/5 rounded-xl text-sm font-bold border border-white/10 hover:bg-white/10 transition">Upload New</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest block mb-4">Environment Theme</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="changeTheme('midnight')" class="p-4 bg-black border border-white/10 rounded-xl text-xs font-bold">Midnight</button>
                        <button onclick="changeTheme('dark')" class="p-4 bg-[#212121] border border-white/10 rounded-xl text-xs font-bold">Charcoal</button>
                        <button onclick="changeTheme('light')" class="p-4 bg-white text-black border border-black/10 rounded-xl text-xs font-bold">Snow</button>
                        <button onclick="changeTheme('blue')" class="p-4 bg-[#0f172a] border border-white/10 rounded-xl text-xs font-bold text-blue-400">Oceanic</button>
                        <button onclick="changeTheme('purple')" class="p-4 bg-[#2e1065] border border-white/10 rounded-xl text-xs font-bold text-purple-400">Royal</button>
                        <button onclick="changeTheme('crimson')" class="p-4 bg-[#450a0a] border border-white/10 rounded-xl text-xs font-bold text-red-400">Crimson</button>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest block mb-4">Master Language</label>
                    <select id="lang-pref" class="w-full p-4 bg-white/5 border border-white/10 rounded-xl outline-none" onchange="saveLang(this.value)">
                        <option value="en">English (Global)</option>
                        <option value="bn">Bengali / Banglish</option>
                        <option value="auto">Auto Intelligence</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SECURE CONFIG ---
        const EMAILJS = { SERVICE: "service_d7q8v4o", TEMPLATE: "template_9nrhdsl", PUBLIC: "5IDeLAjB6gy610xIB" };
        const GROQ_API = "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";
        
        let genOTP = null;
        let aiLevel = "Legend";
        let currChatId = null;
        let attachedImages = []; 
        let chatDB = JSON.parse(localStorage.getItem('aladdin_v3_db')) || [];

        window.onload = () => {
            emailjs.init(EMAILJS.PUBLIC);
            checkSession();
            
            const ta = document.getElementById('prompt-input');
            ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
            ta.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); } });

            document.addEventListener('click', (e) => {
                const popup = document.getElementById('user-popup');
                if(!e.target.closest('.relative') && popup.classList.contains('show')) popup.classList.remove('show');
            });
        };

        function checkSession() {
            const savedUser = localStorage.getItem('aladdin_user_v3');
            if(savedUser) {
                document.getElementById('auth-screen').style.display = 'none';
                bootApp();
            }
        }

        // --- AUTHENTICATION ---
        async function sendMagicCode() {
            const email = document.getElementById('login-email').value;
            if(!email.includes('@')) return alert("Enter a valid magical email!");
            
            genOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('btn-send-code');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
            btn.disabled = true;

            try {
                // IMPORTANT: Template used {{email}} and {{otp}}
                await emailjs.send(EMAILJS.SERVICE, EMAILJS.TEMPLATE, { email: email, otp: genOTP });
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            } catch(err) {
                console.error(err);
                alert("EmailJS Delivery Failed. Using Emergency Code: 123456");
                genOTP = "123456";
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            }
        }

        function verifyCode() {
            const input = document.getElementById('login-otp').value;
            if(input === genOTP) {
                document.getElementById('auth-step-2').classList.add('hidden');
                document.getElementById('auth-step-3').classList.remove('hidden');
            } else alert("The code doesn't match the magic!");
        }

        function completeLogin() {
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const country = document.getElementById('reg-country').value;
            if(!name || !age || !country) return alert("All details are required by the Lamp!");

            const userData = { name, age, country, joined: new Date().toISOString() };
            localStorage.setItem('aladdin_user_v3', JSON.stringify(userData));
            location.reload();
        }

        // --- APP INITIALIZATION ---
        function bootApp() {
            const user = JSON.parse(localStorage.getItem('aladdin_user_v3'));
            document.getElementById('sidebar-name').innerText = user.name;
            document.getElementById('greeting-msg').innerText = generateGreeting(user.name);
            
            const pfp = localStorage.getItem('aladdin_pfp');
            if(pfp) {
                document.getElementById('sidebar-pfp').src = pfp;
                document.getElementById('settings-pfp').src = pfp;
            }

            changeTheme(localStorage.getItem('aladdin_theme') || 'midnight');
            renderHistory();
        }

        function generateGreeting(name) {
            const hour = new Date().getHours();
            const time = hour < 12 ? "Morning" : hour < 18 ? "Afternoon" : "Evening";
            const moods = ["Let's create magic", "Your wish is my command", "Ready for a new adventure?", "How can I help you today?", "The Lamp is glowing!", "Thinking of a new project?"];
            const emojis = ["✨", "🧞‍♂️", "⚡", "🔮", "🌌", "🚀", "💎"];
            return `Good ${time}, ${name}. ${moods[Math.floor(Math.random()*moods.length)]} ${emojis[Math.floor(Math.random()*emojis.length)]}`;
        }

        // --- CHAT ENGINE ---
        async function sendPrompt() {
            const input = document.getElementById('prompt-input');
            const text = input.value.trim();
            if(!text && attachedImages.length === 0) return;

            if(!currChatId) {
                currChatId = "chat_" + Date.now();
                chatDB.unshift({ id: currChatId, title: text.substring(0, 30) || "Image Search", msgs: [] });
            }

            appendDOM('user', text, attachedImages);
            const userImages = [...attachedImages];
            input.value = ""; 
            input.style.height = "auto";
            document.getElementById('file-preview').innerHTML = "";
            document.getElementById('file-preview').classList.add('hidden');
            attachedImages = [];

            const loader = appendDOM('ai', '<div class="loader-dots">Thinking<span>.</span><span>.</span><span>.</span></div>');
            
            try {
                // Image Generation
                if(text.toLowerCase().includes('create image') || text.toLowerCase().includes('ছবি বানাও')) {
                    const encoded = encodeURIComponent(text);
                    const aiRes = `Here are your two magical creations, Master:\n\n![Vision 1](https://pollinations.ai/p/${encoded}?width=1024&height=1024&seed=${Math.random()})\n\n![Vision 2](https://pollinations.ai/p/${encoded}?width=1024&height=1024&seed=${Math.random()})\n\n**Aladdin is right by your side.**`;
                    loader.innerHTML = marked.parse(aiRes);
                    saveMsg('ai', aiRes);
                    return;
                }

                // AI Response (Text + Vision)
                const user = JSON.parse(localStorage.getItem('aladdin_user_v3'));
                const sysPrompt = `Identity: Aladdin AI v3.0. Creator: Muhib Creation. Owner: Muhib. Location: Dhaka. Support 100+ languages including Banglish. 
                User: ${user.name}, ${user.age} years old from ${user.country}. Level: ${aiLevel}. 
                Behavior: Friendly, Genius, Ultra-Premium. Remind user you're always there. End with "Aladdin is right by your side."`;

                const model = userImages.length > 0 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                let payload = [{ role: "system", content: sysPrompt }];
                
                // Add Context
                const currentChat = chatDB.find(c => c.id === currChatId);
                currentChat.msgs.slice(-6).forEach(m => payload.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));

                if(userImages.length > 0) {
                    let contentArr = [{ type: "text", text: text || "Analyze this image." }];
                    userImages.forEach(img => contentArr.push({ type: "image_url", image_url: { url: img } }));
                    payload.push({ role: "user", content: contentArr });
                } else {
                    payload.push({ role: "user", content: text });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: model, messages: payload, temperature: 0.6 })
                });

                const data = await response.json();
                let result = data.choices[0].message.content;
                if(!result.includes("Aladdin")) result += "\n\n**Aladdin is right by your side.**";

                loader.innerHTML = marked.parse(result);
                saveMsg('ai', result);

            } catch(e) {
                loader.innerHTML = "<span class='text-red-500'>Connection to the Lamp lost. Please try again.</span>";
            }
        }

        function appendDOM(role, text, images = []) {
            document.getElementById('welcome-state').classList.add('hidden');
            const wrapper = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex gap-4 p-4 ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
            
            let imgHTML = images.map(i => `<img src="${i}" class="max-w-[250px] rounded-2xl border border-white/10 mb-2">`).join('');
            const icon = role === 'user' ? '<i class="fa-solid fa-circle-user text-2xl"></i>' : '<img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-8 h-8">';

            div.innerHTML = `
                <div class="flex ${role === 'user' ? 'flex-row-reverse' : 'flex-row'} gap-4 max-w-[85%]">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center bg-white/5 border border-white/10 shrink-0">${icon}</div>
                    <div class="${role === 'user' ? 'user-msg' : 'ai-msg'} p-5 rounded-[1.5rem] prose prose-invert max-w-none text-[16px]">
                        ${imgHTML}
                        ${role === 'user' ? text : marked.parse(text)}
                    </div>
                </div>
            `;
            wrapper.appendChild(div);
            scrollToBottom();
            if(role === 'user' && currChatId) saveMsg('user', text, images);
            return div.querySelector('.prose');
        }

        // --- UTILS ---
        function scrollToBottom() { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }
        function toggleMenu() { document.getElementById('user-popup').classList.toggle('show'); }
        function setLevel(l) {
            aiLevel = l;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('bg-[var(--accent)]', 'text-white'));
            document.getElementById(`btn-${l}`).classList.add('bg-[var(--accent)]', 'text-white');
        }

        function handleFiles(input) {
            const preview = document.getElementById('file-preview');
            preview.classList.remove('hidden');
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    attachedImages.push(e.target.result);
                    preview.innerHTML += `<div class="relative group"><img src="${e.target.result}" class="w-20 h-20 object-cover rounded-xl border border-white/20"><div class="absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full flex items-center justify-center text-[10px] cursor-pointer" onclick="this.parentElement.remove()">×</div></div>`;
                };
                reader.readAsDataURL(file);
            });
        }

        function saveMsg(role, content, images = []) {
            const chat = chatDB.find(c => c.id === currChatId);
            if(chat) {
                chat.msgs.push({ role, content, images });
                localStorage.setItem('aladdin_v3_db', JSON.stringify(chatDB));
            }
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatDB.map(c => `
                <div onclick="loadChat('${c.id}')" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer truncate transition flex items-center gap-3 ${currChatId === c.id ? 'bg-white/10 text-[var(--accent)]' : ''}">
                    <i class="fa-regular fa-comment-alt opacity-40"></i> ${c.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            currChatId = id;
            const chat = chatDB.find(c => c.id === id);
            document.getElementById('messages').innerHTML = "";
            document.getElementById('welcome-state').classList.add('hidden');
            chat.msgs.forEach(m => appendDOM(m.role, m.content, m.images));
            renderHistory();
        }

        function startNewChat() {
            currChatId = null;
            document.getElementById('messages').innerHTML = "";
            document.getElementById('welcome-state').classList.remove('hidden');
            renderHistory();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function changeTheme(t) {
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('aladdin_theme', t);
        }

        function updatePFP(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('aladdin_pfp', e.target.result);
                    document.getElementById('sidebar-pfp').src = e.target.result;
                    document.getElementById('settings-pfp').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function logout() {
            localStorage.removeItem('aladdin_user_v3');
            location.reload();
        }
    </script>
</body>
</html>
