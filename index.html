<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Aladdin AI v3.5 🧞</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<style>
  :root {
    --bg-primary: #0a0a0f; --bg-secondary: #111118; --bg-tertiary: #16161f;
    --accent: #10a37f; --accent-glow: rgba(16,163,127,0.3); --text: #ececf1;
  }
  [data-theme="light"] { --bg-primary: #f9f9fb; --bg-secondary: #ffffff; --bg-tertiary: #f3f4f6; --text: #1f2937; }
  
  body { font-family: 'DM+Sans', sans-serif; background: var(--bg-primary); color: var(--text); overflow: hidden; margin: 0; height: 100vh; }
  .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 50; transition: transform 0.3s ease; border-right: 1px solid rgba(255,255,255,0.05); }
  .chat-container { margin-left: 280px; height: 100vh; display: flex; flex-direction: column; width: calc(100% - 280px); transition: all 0.3s; }
  
  @media (max-width: 1024px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .chat-container { margin-left: 0; width: 100%; }
  }

  .msg-bubble { max-width: 85%; padding: 1.25rem; border-radius: 1.5rem; line-height: 1.6; }
  .user-msg { background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.05); align-self: flex-end; }
  .ai-msg { background: transparent; align-self: flex-start; }
  
  .settings-modal { position: absolute; bottom: 90px; left: 15px; width: 250px; background: var(--bg-secondary); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.25rem; display: none; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .settings-modal.show { display: block; }
  pre { background: #000 !important; padding: 1rem; border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); margin: 10px 0; overflow-x: auto; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<div id="auth-screen" class="fixed inset-0 z-[1000] bg-[#050508] flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-[#0d0d12] border border-white/5 p-10 rounded-[2.5rem] text-center">
        <div class="mb-6 inline-flex p-5 bg-white/5 rounded-full text-5xl">🧞</div>
        <h1 class="text-4xl font-black text-white mb-2 tracking-tighter text-white">Aladdin AI 🧞</h1>
        <div id="step-email" class="space-y-4">
            <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-white text-center">
            <button onclick="sendOTP()" id="send-otp-btn" class="w-full p-4 bg-[var(--accent)] text-white rounded-2xl font-bold">Send Code 🧞</button>
        </div>
        <div id="step-otp" class="hidden space-y-4">
            <input type="text" id="auth-otp" maxlength="6" placeholder="OTP" class="w-full p-4 bg-white/5 border border-white/10 text-center text-white rounded-2xl">
            <input type="text" id="auth-name" placeholder="Name" class="w-full p-4 bg-white/5 border border-white/10 text-white rounded-2xl text-center">
            <button onclick="verifyAndLogin()" class="w-full p-4 bg-white text-black rounded-2xl font-bold">Login 🧞</button>
        </div>
    </div>
</div>

<div id="app" class="flex opacity-0 transition-opacity h-screen w-screen overflow-hidden">
    <aside id="sidebar" class="sidebar bg-[var(--bg-secondary)] flex flex-col">
        <div class="p-6 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-2 font-black text-xl text-[var(--accent)]">🧞 Aladdin</div>
            <button onclick="startNewChat()" class="p-2 text-gray-400"><i class="fa fa-plus-circle"></i></button>
        </div>
        <div id="chat-history-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        <div class="p-4 border-t border-white/5 relative">
            <div id="settings-menu" class="settings-modal p-2">
                <button onclick="openConfigModal()" class="w-full text-left px-4 py-3 hover:bg-white/5 rounded-lg flex items-center gap-3 text-white"><i class="fa fa-cog"></i> Settings</button>
                <button onclick="logout()" class="w-full text-left px-4 py-3 text-red-500 hover:bg-red-500/5 rounded-lg flex items-center gap-3"><i class="fa fa-power-off"></i> Logout</button>
            </div>
            <div onclick="toggleSettingsMenu()" class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl cursor-pointer">
                <img id="user-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-10 h-10 rounded-full border border-white/10">
                <div class="flex-1 overflow-hidden">
                    <p class="font-bold text-sm text-white truncate" id="display-name">Master 🧞</p>
                    <p class="text-[9px] text-[var(--accent)] font-bold uppercase">Premium</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="chat-container">
        <header class="h-16 flex items-center justify-between px-6 bg-[var(--bg-primary)] border-b border-white/5">
            <button onclick="toggleSidebar()" class="lg:hidden text-white"><i class="fa fa-bars"></i></button>
            <div class="text-[10px] text-white opacity-30 font-black tracking-widest uppercase">ALADDIN v3.5 🧞</div>
            <div class="w-10"></div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto px-4 md:px-20 pb-44 pt-10">
            <div id="welcome-state" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="text-7xl">🧞</div>
                <h2 id="greeting-msg" class="text-3xl text-white font-black"></h2>
            </div>
            <div id="messages-list" class="flex flex-col space-y-10"></div>
        </div>

        <div class="fixed bottom-0 left-0 lg:left-[280px] right-0 p-4 bg-gradient-to-t from-[var(--bg-primary)] pt-10">
            <div class="max-w-4xl mx-auto">
                <div id="file-preview" class="hidden flex gap-3 p-4 bg-white/5 rounded-t-[2rem] border-t border-white/10 overflow-x-auto"></div>
                <div class="bg-white/5 flex items-end gap-2 p-3 rounded-[2.5rem] border border-white/10">
                    <label class="p-4 cursor-pointer text-gray-400"><i class="fa fa-paperclip text-xl"></i><input type="file" id="media-upload" class="hidden" multiple onchange="handleFiles(this)"></label>
                    <textarea id="prompt-input" rows="1" placeholder="Master, what is your wish? 🧞" class="flex-1 bg-transparent border-none outline-none py-4 text-white resize-none"></textarea>
                    <button onclick="sendPrompt()" id="send-btn" class="m-1 p-4 bg-[var(--accent)] text-white rounded-2xl transition"><i class="fa fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="config-modal" class="fixed inset-0 z-[2000] bg-black/95 hidden items-center justify-center p-6 backdrop-blur-3xl">
    <div class="max-w-lg w-full bg-[#111] p-10 rounded-[3rem] border border-white/10 space-y-8">
        <div class="flex items-center justify-between"><h2 class="text-3xl font-black text-white">Settings 🧞</h2><button onclick="closeConfigModal()" class="text-white"><i class="fa fa-times"></i></button></div>
        <div class="flex items-center gap-8"><img id="config-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-24 h-24 rounded-full border-4 border-[var(--accent)]"><button onclick="document.getElementById('pfp-input').click()" class="bg-white px-4 py-2 rounded-xl text-black font-bold">Change</button><input type="file" id="pfp-input" class="hidden" onchange="updateProfilePic(this)"></div>
    </div>
</div>

<script>
    const API_KEY = "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";
    const EMAIL_CFG = { SERVICE: "service_d7q8v4o", TEMPLATE: "template_9nrhdsl", PUBLIC: "5IDeLAjB6gy610xIB" };

    let currentUser = null, currentChatId = null, chatDB = JSON.parse(localStorage.getItem('aladdin_v3_chats')) || [], attachedImages = [], magicOTP = null;

    window.onload = () => {
        emailjs.init(EMAIL_CFG.PUBLIC);
        const saved = localStorage.getItem('aladdin_user');
        if (saved) { currentUser = JSON.parse(saved); bootApp(); }
        document.getElementById('prompt-input').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
    };

    async function sendOTP() {
        const email = document.getElementById('auth-email').value;
        if (!email.includes('@')) return alert("Enter valid email 🧞");
        magicOTP = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('send-otp-btn').innerText = "Sending... 🧞";
        try {
            await emailjs.send(EMAIL_CFG.SERVICE, EMAIL_CFG.TEMPLATE, { email, otp: magicOTP });
            document.getElementById('step-email').style.display = 'none';
            document.getElementById('step-otp').classList.remove('hidden');
        } catch { alert("Use: 123456"); magicOTP = "123456"; document.getElementById('step-email').style.display = 'none'; document.getElementById('step-otp').classList.remove('hidden'); }
    }

    function verifyAndLogin() {
        const otp = document.getElementById('auth-otp').value, name = document.getElementById('auth-name').value;
        if (otp === magicOTP && name) {
            currentUser = { name, email: document.getElementById('auth-email').value, pfp: 'https://i.ibb.co/mR70vS0/user.png' };
            localStorage.setItem('aladdin_user', JSON.stringify(currentUser));
            bootApp();
        } else alert("Invalid 🧞");
    }

    function bootApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app').classList.add('opacity-100');
        document.getElementById('display-name').innerText = currentUser.name + " 🧞";
        document.getElementById('user-pfp').src = currentUser.pfp;
        document.getElementById('greeting-msg').innerText = `Greetings, Master ${currentUser.name}! 🧞`;
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('chat-history-list');
        container.innerHTML = chatDB.map(chat => `<div onclick="loadChat('${chat.id}')" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer text-white truncate ${currentChatId === chat.id ? 'bg-white/10' : 'opacity-60'}">🧞 ${chat.title}</div>`).join('');
    }

    async function sendPrompt() {
        const input = document.getElementById('prompt-input'), text = input.value.trim();
        if (!text && attachedImages.length === 0) return;
        if (!currentChatId) {
            currentChatId = "chat_" + Date.now();
            chatDB.unshift({ id: currentChatId, title: text.substring(0, 30) || "Visual Wish 🧞", msgs: [] });
            localStorage.setItem('aladdin_v3_chats', JSON.stringify(chatDB));
        }
        const currentImgs = [...attachedImages];
        appendDOM('user', text, currentImgs);
        input.value = ""; input.style.height = "auto";
        document.getElementById('file-preview').classList.add('hidden');
        attachedImages = [];

        const loader = appendDOM('ai', `<div class="italic">🧞 Magic in progress...</div>`);

        try {
            // Image Generation Logic
            if (text.toLowerCase().match(/(create|generate) image|ছবি বানাও|image banao/gi)) {
                const prompt = encodeURIComponent(text.replace(/create|generate|image|ছবি বানাও|banao/gi, '').trim());
                const resHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                    <img src="https://pollinations.ai/p/${prompt}?width=1024&height=1024&seed=${Math.random()}&nologo=true" class="rounded-2xl border border-white/10">
                    <img src="https://pollinations.ai/p/${prompt}?width=1024&height=1024&seed=${Math.random()}&nologo=true" class="rounded-2xl border border-white/10">
                </div><br>Aladdin is right by your side. 🧞`;
                loader.innerHTML = resHtml; saveToDB('ai', resHtml); return;
            }

            // Summarize & Vision Logic
            const model = currentImgs.length > 0 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
            let systemMsg = `You are Aladdin AI 🧞. Master's name is ${currentUser.name}. Always end with 'Aladdin is right by your side.'`;
            if (text.toLowerCase().match(/summarize|সারসংক্ষেপ/gi)) systemMsg += " Provide a very concise summary.";

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model,
                    messages: [{ role: "system", content: systemMsg }, { role: "user", content: currentImgs.length > 0 ? [{ type: "text", text }, ...currentImgs.map(i => ({ type: "image_url", image_url: { url: i } }))] : text }],
                    temperature: 0.6
                })
            });
            const data = await res.json();
            const result = data.choices[0].message.content;
            loader.innerHTML = marked.parse(result);
            saveToDB('ai', result);
            renderHistory();
        } catch { loader.innerHTML = "🧞 Lamp error. Check API Key. Aladdin is right by your side."; }
    }

    function appendDOM(role, text, imgs = []) {
        document.getElementById('welcome-state').style.display = 'none';
        const list = document.getElementById('messages-list'), div = document.createElement('div');
        div.className = `flex gap-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
        let imgTags = imgs.map(i => `<img src="${i}" class="max-w-[250px] rounded-2xl mb-2">`).join('');
        div.innerHTML = `<div class="flex ${role === 'user' ? 'flex-row-reverse' : 'flex-row'} gap-4 max-w-[90%]">
            <div class="mt-1">${role === 'user' ? `<img src="${currentUser.pfp}" class="w-8 h-8 rounded-full">` : `<div class="text-xl">🧞</div>`}</div>
            <div class="${role === 'user' ? 'user-msg' : 'ai-msg'} msg-bubble prose prose-invert text-white">${imgTags}${role === 'user' ? text : marked.parse(text)}</div>
        </div>`;
        list.appendChild(div);
        const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight;
        if (role === 'user') saveToDB('user', text, imgs);
        return div.querySelector('.prose');
    }

    function saveToDB(role, content, images = []) {
        const chat = chatDB.find(c => c.id === currentChatId);
        if (chat) { chat.msgs.push({ role, content, images }); localStorage.setItem('aladdin_v3_chats', JSON.stringify(chatDB)); }
    }

    function loadChat(id) {
        currentChatId = id; const chat = chatDB.find(c => c.id === id);
        document.getElementById('messages-list').innerHTML = "";
        document.getElementById('welcome-state').style.display = 'none';
        chat.msgs.forEach(m => appendDOM(m.role, m.content, m.images));
    }

    function handleFiles(input) {
        const preview = document.getElementById('file-preview'); preview.classList.remove('hidden');
        Array.from(input.files).forEach(file => {
            const r = new FileReader(); r.onload = e => {
                attachedImages.push(e.target.result);
                preview.innerHTML += `<img src="${e.target.result}" class="w-16 h-16 object-cover rounded-lg">`;
            }; r.readAsDataURL(file);
        });
    }

    function startNewChat() { currentChatId = null; document.getElementById('messages-list').innerHTML = ""; document.getElementById('welcome-state').style.display = 'flex'; }
    function toggleSettingsMenu() { document.getElementById('settings-menu').classList.toggle('show'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function openConfigModal() { document.getElementById('config-modal').style.display = 'flex'; toggleSettingsMenu(); }
    function closeConfigModal() { document.getElementById('config-modal').style.display = 'none'; }
    function updateProfilePic(i) { if (i.files[0]) { const r = new FileReader(); r.onload = e => { currentUser.pfp = e.target.result; document.getElementById('user-pfp').src = e.target.result; localStorage.setItem('aladdin_user', JSON.stringify(currentUser)); }; r.readAsDataURL(i.files[0]); } }
    function logout() { if (confirm("Logout 🧞?")) { localStorage.removeItem('aladdin_user'); location.reload(); } }
</script>
</body>
</html>
