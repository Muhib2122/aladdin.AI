<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI 🧞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b0b0f; color: #e5e7eb; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar { width: 280px; background: #000; transition: all 0.3s ease; }
        .msg-user { background: #222; border-radius: 18px 18px 0 18px; }
        .msg-ai { background: transparent; border-radius: 0 18px 18px 18px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .hidden { display: none; }
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: #0b0b0f; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay">
        <div class="glass p-10 rounded-3xl w-96 text-center shadow-2xl">
            <h2 class="text-3xl font-bold mb-2">Aladdin AI 🧞</h2>
            <p class="text-gray-400 mb-8 text-sm">Unlock the Magic of Intelligence</p>
            
            <div id="step-1">
                <input id="u-name" type="text" placeholder="Your Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-3 outline-none focus:border-emerald-500">
                <input id="u-email" type="email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-emerald-500">
                <button onclick="sendOTP()" id="send-btn" class="w-full bg-emerald-600 p-4 rounded-xl font-bold hover:bg-emerald-700 transition">Get Access Code</button>
            </div>

            <div id="step-2" class="hidden">
                <p class="text-xs text-emerald-400 mb-4">Magic code sent to your inbox!</p>
                <input id="u-otp" type="text" placeholder="000000" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 text-center text-2xl tracking-widest outline-none">
                <button onclick="verifyOTP()" class="w-full bg-emerald-600 p-4 rounded-xl font-bold">Verify & Enter</button>
            </div>
        </div>
    </div>

    <aside class="sidebar flex flex-col border-r border-white/5">
        <div class="p-4 border-b border-white/5">
            <button onclick="createNewChat()" class="w-full flex items-center gap-3 p-3 rounded-xl border border-white/10 hover:bg-white/5 transition text-sm">
                <i class="fa fa-plus"></i> New Chat
            </button>
        </div>
        
        <div id="chat-history" class="flex-1 overflow-y-auto p-3 space-y-2 text-sm text-gray-400">
            </div>

        <div class="p-4 border-t border-white/5">
            <div onclick="toggleProfile()" class="flex items-center gap-3 cursor-pointer hover:bg-white/5 p-2 rounded-xl transition">
                <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-white" id="profile-icon">M</div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-white font-medium truncate" id="profile-name">Master</p>
                    <p class="text-[10px] text-gray-500">Settings & Profile</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[#0b0b0f]">
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/5 glass">
            <div class="flex items-center gap-4">
                <span class="font-bold text-lg">Aladdin AI</span>
                <select id="think-level" class="bg-white/5 text-[10px] uppercase tracking-widest p-1 px-2 rounded border border-white/10 outline-none">
                    <option value="basic">Level 1: Basic</option>
                    <option value="standard" selected>Level 2: Standard</option>
                    <option value="pro">Level 3: Pro</option>
                    <option value="ultra">Level 4: Ultra Brain</option>
                </select>
            </div>
            <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></div>
        </header>

        <div id="chat-scroller" class="flex-1 overflow-y-auto px-4 py-8">
            <div id="welcome-container" class="max-w-2xl mx-auto text-center mt-20">
                <div class="text-6xl mb-6">🧞</div>
                <h1 id="dynamic-greeting" class="text-3xl font-bold mb-4">Shagoto, Master!</h1>
                <p class="text-gray-500">How can I assist your brilliant mind today?</p>
            </div>
            <div id="chat-content" class="max-w-3xl mx-auto space-y-10"></div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#0b0b0f] to-transparent">
            <div class="max-w-3xl mx-auto relative group">
                <textarea id="main-input" rows="1" placeholder="Type anything... I'm ready." 
                    class="w-full bg-[#171717] border border-white/10 rounded-2xl p-4 pr-16 outline-none focus:border-emerald-500/50 resize-none max-h-60 transition shadow-2xl"></textarea>
                <button onclick="handleSend()" id="send-btn-main" class="absolute right-3 bottom-3 w-10 h-10 bg-white text-black rounded-xl flex items-center justify-center hover:scale-105 active:scale-95 transition disabled:opacity-20">
                    <i class="fa fa-arrow-up"></i>
                </button>
            </div>
            <p class="text-[10px] text-center text-gray-600 mt-3">Aladdin AI may produce inaccurate info. Power of Groq 3.3 Versatile.</p>
        </div>

        <div id="profile-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
            <div class="glass w-80 p-6 rounded-3xl text-center">
                <div class="w-20 h-20 bg-emerald-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">M</div>
                <h3 class="text-xl font-bold mb-1" id="modal-user-name">Master</h3>
                <p class="text-xs text-gray-500 mb-6" id="modal-user-email">master@mail.com</p>
                
                <div class="text-left space-y-4 mb-8">
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 block mb-1">Response Language</label>
                        <select id="pref-lang" class="w-full bg-white/5 border border-white/10 p-2 rounded-lg text-sm outline-none">
                            <option value="auto">Auto Detect</option>
                            <option value="bn">Bengali</option>
                            <option value="en">English</option>
                            <option value="hi">Hindi</option>
                        </select>
                    </div>
                </div>

                <div class="flex flex-col gap-2">
                    <button onclick="toggleProfile()" class="w-full p-3 rounded-xl border border-white/10 hover:bg-white/5 text-sm">Close Settings</button>
                    <button onclick="logout()" class="w-full p-3 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500/20 text-sm font-bold transition">Logout</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        /* ═══════════════════════════════════════════════════════════ 
           CONFIGS & CORE DATA
        ═══════════════════════════════════════════════════════════ */
        const GK = "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";
        const ES = "service_d7q8v4o";
        const ET = "template_9nrhdsl";
        const EK = "5IDeLAjB6gy610xIB"; // Public Key

        let currentOTP = "";
        let chatHistory = JSON.parse(localStorage.getItem('aladdin_chats')) || [];
        let activeChatId = null;
        let isGenerating = false;
        let userData = JSON.parse(localStorage.getItem('aladdin_user')) || null;

        const greetings = [
            "Greetings, [NAME]! The magic lamp awaits your command.",
            "Shagoto, [NAME]! Aajke amra ki niye alochona korbo?",
            "Welcome back, Master [NAME]! Ready to solve the unsolvable?",
            "Aadaab, [NAME]! I'm thinking at Level [LEVEL] today. What's the task?",
            "Hello [NAME]! My brain is upgraded and ready for your request.",
            "The genie is out of the bottle! How can I help you, [NAME]?"
        ];

        /* ═══════════════════════════════════════════════════════════ 
           LOGIN & AUTH (EmailJS g_id Fix)
        ═══════════════════════════════════════════════════════════ */
        async function sendOTP() {
            const name = document.getElementById('u-name').value;
            const email = document.getElementById('u-email').value;
            if(!name || !email.includes('@')) return alert("Master, name and valid email is required!");

            const btn = document.getElementById('send-btn');
            btn.innerText = "Sending Magic...";
            btn.disabled = true;

            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                // FIXED: Explicit Public Key delivery
                await emailjs.send(ES, ET, {
                    to_name: name,
                    email: email,
                    otp: currentOTP
                }, EK);

                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            } catch (err) {
                console.error(err);
                alert("Login Error: Public Key mismatch. Please check EmailJS settings.");
            } finally {
                btn.innerText = "Get Access Code";
                btn.disabled = false;
            }
        }

        function verifyOTP() {
            const val = document.getElementById('u-otp').value;
            if(val === currentOTP) {
                userData = {
                    name: document.getElementById('u-name').value,
                    email: document.getElementById('u-email').value,
                    lang: 'auto'
                };
                localStorage.setItem('aladdin_user', JSON.stringify(userData));
                initApp();
            } else {
                alert("Wrong code, Master!");
            }
        }

        /* ═══════════════════════════════════════════════════════════ 
           APP INITIALIZATION
        ═══════════════════════════════════════════════════════════ */
        function initApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('profile-name').innerText = userData.name;
            document.getElementById('profile-icon').innerText = userData.name[0].toUpperCase();
            document.getElementById('modal-user-name').innerText = userData.name;
            document.getElementById('modal-user-email').innerText = userData.email;
            
            updateGreeting();
            renderHistoryList();
            if(chatHistory.length > 0) {
                loadChat(chatHistory[0].id);
            }
        }

        function updateGreeting() {
            const level = document.getElementById('think-level').value.toUpperCase();
            const randomMsg = greetings[Math.floor(Math.random() * greetings.length)];
            document.getElementById('dynamic-greeting').innerText = randomMsg.replace("[NAME]", userData.name).replace("[LEVEL]", level);
        }

        /* ═══════════════════════════════════════════════════════════ 
           CHAT ENGINE (Groq Integration)
        ═══════════════════════════════════════════════════════════ */
        async function handleSend() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if(!text || isGenerating) return;

            if(!activeChatId) createNewChat(false);

            const chatIndex = chatHistory.findIndex(c => c.id === activeChatId);
            const userMessage = { role: 'user', content: text };
            chatHistory[chatIndex].messages.push(userMessage);
            
            input.value = "";
            input.style.height = "auto";
            document.getElementById('welcome-container').classList.add('hidden');
            renderMessages();

            isGenerating = true;
            document.getElementById('send-btn-main').disabled = true;

            const aiBubble = addAiPlaceholder();
            let accumulated = "";

            try {
                const level = document.getElementById('think-level').value;
                const lang = document.getElementById('pref-lang').value;
                
                // Brain Levels Logic
                let systemPrompt = "You are Aladdin AI 🧞, a top-tier intelligence. ";
                if(level === 'basic') systemPrompt += "Give concise and fast answers.";
                if(level === 'pro') systemPrompt += "Use advanced reasoning and deep explanations.";
                if(level === 'ultra') systemPrompt += "You are in Deep Think mode. Analyze every detail step-by-step with maximum complexity.";
                if(lang !== 'auto') systemPrompt += ` Respond ONLY in ${lang} language.`;

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GK}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            ...chatHistory[chatIndex].messages.map(m => ({ role: m.role, content: m.content }))
                        ],
                        stream: true,
                        temperature: level === 'ultra' ? 0.3 : 0.7
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while(true) {
                    const {done, value} = await reader.read();
                    if(done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for(let line of lines) {
                        if(line.startsWith("data: ") && line !== "data: [DONE]") {
                            try {
                                const json = JSON.parse(line.substring(6));
                                const delta = json.choices[0].delta.content || "";
                                accumulated += delta;
                                aiBubble.innerHTML = marked.parse(accumulated);
                                scrollBot();
                            } catch(e){}
                        }
                    }
                }
                
                chatHistory[chatIndex].messages.push({ role: 'assistant', content: accumulated });
                saveAndSync();
                hljs.highlightAll();
            } catch (err) {
                aiBubble.innerText = "Error connecting to the Lamp. Please check internet.";
            } finally {
                isGenerating = false;
                document.getElementById('send-btn-main').disabled = false;
            }
        }

        /* ═══════════════════════════════════════════════════════════ 
           UI & UTILS
        ═══════════════════════════════════════════════════════════ */
        function createNewChat(resetUI = true) {
            const id = Date.now();
            chatHistory.unshift({
                id: id,
                title: "New Magic Chat",
                messages: []
            });
            activeChatId = id;
            if(resetUI) {
                document.getElementById('chat-content').innerHTML = "";
                document.getElementById('welcome-container').classList.remove('hidden');
                updateGreeting();
            }
            saveAndSync();
            renderHistoryList();
        }

        function renderMessages() {
            const container = document.getElementById('chat-content');
            container.innerHTML = "";
            const chat = chatHistory.find(c => c.id === activeChatId);
            chat.messages.forEach(m => {
                const row = document.createElement('div');
                row.className = `flex gap-4 ${m.role === 'user' ? 'justify-end' : ''}`;
                row.innerHTML = `
                    <div class="max-w-[85%] p-4 ${m.role === 'user' ? 'msg-user border border-white/5' : 'msg-ai'}">
                        <p class="text-[10px] text-gray-500 uppercase mb-2">${m.role === 'user' ? 'Master' : 'Aladdin 🧞'}</p>
                        <div class="prose prose-invert text-sm leading-relaxed">${marked.parse(m.content)}</div>
                    </div>
                `;
                container.appendChild(row);
            });
            scrollBot();
        }

        function addAiPlaceholder() {
            const container = document.getElementById('chat-content');
            const row = document.createElement('div');
            row.className = "flex gap-4";
            row.innerHTML = `
                <div class="max-w-[85%] p-4 msg-ai">
                    <p class="text-[10px] text-gray-500 uppercase mb-2">Aladdin 🧞</p>
                    <div class="ai-body text-sm leading-relaxed italic text-gray-400">Thinking...</div>
                </div>
            `;
            container.appendChild(row);
            scrollBot();
            return row.querySelector('.ai-body');
        }

        function renderHistoryList() {
            const list = document.getElementById('chat-history');
            list.innerHTML = "";
            chatHistory.forEach(c => {
                const item = document.createElement('div');
                item.className = `p-3 rounded-xl cursor-pointer hover:bg-white/5 truncate ${c.id === activeChatId ? 'bg-white/5 border border-white/10 text-white' : ''}`;
                item.innerText = c.messages.length > 0 ? c.messages[0].content.substring(0, 30) + "..." : "New Magic Chat";
                item.onclick = () => loadChat(c.id);
                list.appendChild(item);
            });
        }

        function loadChat(id) {
            activeChatId = id;
            const chat = chatHistory.find(c => c.id === id);
            if(chat.messages.length > 0) {
                document.getElementById('welcome-container').classList.add('hidden');
                renderMessages();
                hljs.highlightAll();
            } else {
                document.getElementById('chat-content').innerHTML = "";
                document.getElementById('welcome-container').classList.remove('hidden');
            }
            renderHistoryList();
        }

        function saveAndSync() {
            localStorage.setItem('aladdin_chats', JSON.stringify(chatHistory));
        }

        function scrollBot() {
            const scroller = document.getElementById('chat-scroller');
            scroller.scrollTop = scroller.scrollHeight;
        }

        function toggleProfile() {
            document.getElementById('profile-modal').classList.toggle('hidden');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        document.getElementById('main-input').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        // Key Listeners
        document.getElementById('main-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            if(userData) initApp();
        };
    </script>
</body>
</html>
