<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin AI | v3.0 Legend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #09090b; --sidebar: #000000; --card: #18181b; --text: #f4f4f5; --accent: #e2b714; --user-msg: #27272a; }
        .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #22c55e; } .theme-purple { --accent: #a855f7; }
        .theme-red { --accent: #ef4444; } .theme-pink { --accent: #ec4899; } .light-theme { --bg: #ffffff; --sidebar: #f4f4f5; --card: #ffffff; --text: #09090b; --user-msg: #e4e4e7; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        .font-magic { font-family: 'Cinzel', serif; }
        
        /* Mobile Responsive Sidebar */
        #sidebar { transition: transform 0.3s ease; z-index: 50; }
        @media (max-width: 768px) { #sidebar { position: fixed; transform: translateX(-100%); height: 100%; } #sidebar.open { transform: translateX(0); } }

        /* Chat Layout (Gemini Style) */
        .msg-container { display: flex; flex-direction: column; gap: 20px; }
        .user-msg { align-self: flex-start; background: var(--user-msg); padding: 12px 18px; border-radius: 18px; max-width: 85%; font-size: 14px; position: relative; margin-bottom: 20px;}
        .ai-msg { align-self: flex-end; padding: 12px; max-width: 90%; text-align: left; }
        
        /* File Upload Box */
        .file-preview { background: #111; border: 1px solid #333; padding: 8px; border-radius: 10px; display: flex; align-items: center; gap: 10px; width: 200px; margin-bottom: 10px; }
        .progress-bar { height: 4px; background: var(--accent); transition: width 0.3s; }

        .think-pill { cursor: pointer; padding: 4px 12px; border-radius: 20px; border: 1px solid #333; font-size: 11px; transition: 0.2s; }
        .think-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-4">
        <div class="bg-[var(--card)] p-8 rounded-2xl border border-white/10 w-full max-w-sm text-center">
            <img src="https://em-content.zobj.net/source/apple/354/genie_1f9de.png" class="w-16 mx-auto mb-4" alt="Aladdin Logo">
            <h2 class="text-2xl font-bold font-magic text-[var(--accent)] mb-2">ALADDIN AI</h2>
            <div id="email-step">
                <input type="email" id="auth-email" placeholder="Master's Email" class="w-full bg-black border border-white/10 p-3 rounded-lg mb-4 text-center">
                <button onclick="sendOTP()" id="otp-btn" class="w-full bg-white text-black font-bold py-3 rounded-lg">Send Magic Code</button>
            </div>
            <div id="otp-step" class="hidden">
                <input type="text" id="auth-otp" placeholder="6-Digit Code" class="w-full bg-black border border-white/10 p-3 rounded-lg mb-4 text-center text-2xl tracking-widest">
                <button onclick="verifyOTP()" class="w-full bg-[var(--accent)] text-black font-bold py-3 rounded-lg">Verify Wish</button>
            </div>
            <div id="profile-step" class="hidden">
                <input type="text" id="user-name" placeholder="Your Name" class="w-full bg-black border border-white/10 p-3 rounded-lg mb-3">
                <input type="number" id="user-age" placeholder="Age" class="w-full bg-black border border-white/10 p-3 rounded-lg mb-4">
                <button onclick="saveProfile()" class="w-full bg-white text-black font-bold py-3 rounded-lg">Start Journey</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="w-[280px] bg-[var(--sidebar)] border-r border-white/10 flex flex-col p-4 shrink-0">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2 font-magic font-bold text-[var(--accent)]">
                <span>🧞</span> ALADDIN v3.0
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-2xl">×</button>
        </div>

        <button onclick="createNewChat()" class="w-full text-left p-3 rounded-lg hover:bg-white/5 border border-white/10 text-sm mb-6">+ New chat</button>

        <div class="flex-1 overflow-y-auto space-y-6 text-sm custom-scrollbar">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">🧭 Core Options</p>
                <div class="space-y-1">
                    <div class="p-2 hover:bg-white/5 rounded-md cursor-pointer">New conversation</div>
                    <div class="p-2 hover:bg-white/5 rounded-md cursor-pointer">Search chats</div>
                    <div class="p-2 hover:bg-white/5 rounded-md cursor-pointer font-bold text-[var(--accent)]">Codex AI</div>
                </div>
            </div>

            <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">📁 Projects Section</p>
                <div class="p-2 border border-dashed border-white/20 rounded-md text-center text-xs text-gray-500 cursor-pointer">+ New project</div>
            </div>

            <div id="chat-list-container">
                <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-2">🕘 Recents</p>
                <div id="chat-list" class="space-y-1"></div>
            </div>
        </div>

        <div class="pt-4 border-t border-white/10 space-y-2">
            <div class="grid grid-cols-6 gap-1 mb-2" id="color-picker">
                <div onclick="setTheme('gold')" class="h-4 w-4 bg-[#e2b714] rounded-full cursor-pointer"></div>
                <div onclick="setTheme('blue')" class="h-4 w-4 bg-[#3b82f6] rounded-full cursor-pointer"></div>
                <div onclick="setTheme('green')" class="h-4 w-4 bg-[#22c55e] rounded-full cursor-pointer"></div>
                <div onclick="setTheme('purple')" class="h-4 w-4 bg-[#a855f7] rounded-full cursor-pointer"></div>
                <div onclick="setTheme('red')" class="h-4 w-4 bg-[#ef4444] rounded-full cursor-pointer"></div>
                <div onclick="setTheme('light')" class="h-4 w-4 bg-white border border-gray-300 rounded-full cursor-pointer"></div>
            </div>
            <button onclick="logout()" class="w-full text-left p-2 text-xs text-red-500">🚪 Logout Session</button>
            <div class="flex items-center gap-3 p-2 bg-white/5 rounded-lg border border-white/5">
                <div id="user-avatar" class="w-8 h-8 rounded-full bg-[var(--accent)] flex items-center justify-center text-black font-bold text-xs">U</div>
                <div class="text-xs truncate">
                    <p id="nav-user-name" class="font-bold">Master</p>
                    <p class="opacity-50">Free Plan</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative min-w-0">
        <header class="p-4 border-b border-white/10 flex justify-between items-center bg-[var(--bg)]/80 backdrop-blur-sm z-40">
            <div class="flex items-center gap-2">
                <button onclick="toggleSidebar()" class="md:hidden">☰</button>
                <div class="flex gap-2" id="brain-selector">
                    <span class="think-pill active" onclick="setBrain('Basic', this)">Basic</span>
                    <span class="think-pill" onclick="setBrain('Pro', this)">Pro</span>
                    <span class="think-pill" onclick="setBrain('Ultra', this)">Ultra</span>
                    <span class="think-pill text-[var(--accent)] border-[var(--accent)]" onclick="setBrain('Cherag Pro', this)">Cherag Pro</span>
                </div>
            </div>
            <div id="dynamic-greeting" class="text-[10px] font-bold uppercase tracking-wider text-[var(--accent)]"></div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div id="messages" class="max-w-3xl mx-auto msg-container">
                <div class="text-center py-20 opacity-30 font-magic">
                    <h1 class="text-4xl mb-2">ALADDIN LEGEND</h1>
                    <p class="text-sm">Authentic Response Intelligence</p>
                </div>
            </div>
        </div>

        <div class="p-4">
            <div class="max-w-3xl mx-auto relative">
                <div id="upload-status" class="hidden absolute bottom-full mb-4 w-full"></div>
                
                <div class="bg-[var(--card)] border border-white/10 rounded-2xl shadow-2xl relative">
                    <textarea id="user-input" rows="1" placeholder="Ask anything to Aladdin..." 
                        class="w-full bg-transparent p-4 pl-14 pr-24 outline-none resize-none text-sm max-h-40"></textarea>
                    
                    <button onclick="document.getElementById('file-input').click()" class="absolute left-4 bottom-3 text-gray-500 hover:text-[var(--accent)] transition">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </button>
                    <input type="file" id="file-input" class="hidden" multiple onchange="handleFileUpload(this)">

                    <div class="absolute right-4 bottom-2.5 flex items-center gap-3">
                        <button class="text-gray-500 hover:text-white"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg></button>
                        <button onclick="handleSendMessage()" id="send-btn" class="bg-[var(--accent)] text-black p-2 rounded-xl hover:scale-105 active:scale-95 transition">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center mt-2 opacity-30">Aladdin can make mistakes. Verify important info.</p>
            </div>
        </div>
    </main>

    <script>
        const GROQ_KEY = "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";
        const EMAILJS = { service: "service_d7q8v4o", template: "template_9nrhdsl", key: "5IDeLAjB6gy610xIB" };

        let chats = JSON.parse(localStorage.getItem('al_chats')) || [];
        let currentChatId = null;
        let currentOTP = "";
        let selectedBrain = "Basic";

        (function() { emailjs.init(EMAILJS.key); })();

        window.onload = () => {
            if(localStorage.getItem('al_logged') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                initApp();
            }
            updateDynamicGreeting();
        };

        // 1. DYNAMIC GREETING LOGIC
        function updateDynamicGreeting() {
            const profile = JSON.parse(localStorage.getItem('al_profile'));
            if(!profile) return;
            const hour = new Date().getHours();
            let greet = hour < 12 ? "Good Morning" : hour < 17 ? "Good Afternoon" : "Good Evening";
            document.getElementById('dynamic-greeting').innerText = `✨ ${greet}, ${profile.name} | The Lamp is active`;
        }

        // 2. EMAIL OTP (UNTOUCHED LOGIC)
        async function sendOTP() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Enter valid email");
            
            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('otp-btn');
            btn.innerText = "Casting Spell..."; btn.disabled = true;

            try {
                await emailjs.send(EMAILJS.service, EMAILJS.template, { email: email, otp: currentOTP });
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            } catch (e) { alert("Email Failed! Check Config."); }
            btn.innerText = "Send Magic Code"; btn.disabled = false;
        }

        function verifyOTP() {
            if(document.getElementById('auth-otp').value === currentOTP) {
                document.getElementById('otp-step').classList.add('hidden');
                document.getElementById('profile-step').classList.remove('hidden');
            } else alert("Wrong code!");
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value || "Master";
            const age = document.getElementById('user-age').value || "20";
            localStorage.setItem('al_profile', JSON.stringify({name, age}));
            localStorage.setItem('al_logged', 'true');
            location.reload();
        }

        // 3. FILE UPLOAD UI (CHATGPT STYLE)
        function handleFileUpload(input) {
            const statusDiv = document.getElementById('upload-status');
            statusDiv.innerHTML = "";
            statusDiv.classList.remove('hidden');

            Array.from(input.files).forEach(file => {
                const card = document.createElement('div');
                card.className = "file-preview";
                card.innerHTML = `
                    <div class="text-xl">📄</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] truncate">${file.name}</p>
                        <div class="w-full bg-white/10 rounded-full mt-1">
                            <div class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>
                `;
                statusDiv.appendChild(card);
                
                // Simulate Upload
                let p = 0;
                let interval = setInterval(() => {
                    p += 10;
                    card.querySelector('.progress-bar').style.width = p + "%";
                    if(p >= 100) {
                        clearInterval(interval);
                        setTimeout(() => card.style.borderColor = "var(--accent)", 200);
                    }
                }, 100);
            });
        }

        // 4. CHAT LOGIC (GEMINI STYLE POSITIONING)
        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const chat = chats.find(c => c.id === currentChatId);
            if(chat.messages.length === 0) chat.title = text.substring(0, 20);

            // User message on left (Gemini Style)
            addMsgUI('user', text);
            chat.messages.push({role: 'user', content: text});
            input.value = '';
            document.getElementById('upload-status').classList.add('hidden');

            // AI thinking and response on right
            const aiStream = addMsgUI('ai', `<span class="italic text-gray-500">ALADDIN is thinking using ${selectedBrain} brain...</span>`, true);
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: selectedBrain === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: `You are Aladdin AI Legend. Current Brain: ${selectedBrain}. Always provide high-quality tips and advice based on context. Speak Bangla & English naturally. At the very end of every reply, ALWAYS ask in English: "Do you need anything else? I am Aladdin, right by your side."`},
                            ...chat.messages
                        ],
                        temperature: selectedBrain === 'Ultra' ? 0.9 : 0.6
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiStream.innerHTML = marked.parse(aiText);
                chat.messages.push({role: 'assistant', content: aiText});
                saveData();
            } catch (e) { aiStream.innerHTML = "Connection Error to the Lamp."; }
        }

        function addMsgUI(role, content, isStream = false) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            
            const profile = JSON.parse(localStorage.getItem('al_profile'));
            const avatar = role === 'ai' ? '🧞' : '👤';
            const name = role === 'ai' ? 'Aladdin AI' : profile.name;

            div.innerHTML = `
                <div class="flex items-center gap-2 mb-1 opacity-50 text-[10px] font-bold uppercase">
                    <span>${avatar}</span> ${name}
                </div>
                <div class="prose prose-invert max-w-full text-sm leading-relaxed">${isStream ? content : marked.parse(content)}</div>
            `;
            
            document.getElementById('messages').appendChild(div);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            return div.querySelector('.prose');
        }

        // HELPERS
        function setBrain(level, el) {
            selectedBrain = level;
            document.querySelectorAll('.think-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }

        function setTheme(t) {
            document.body.className = "flex h-screen overflow-hidden";
            if(t === 'light') document.body.classList.add('light-theme');
            else document.body.classList.add('theme-' + t);
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function createNewChat() {
            const id = Date.now();
            chats.unshift({id, title: "New Wish", messages: []});
            saveData(); renderSidebar(); renderChat(id);
        }
        function renderSidebar() {
            document.getElementById('chat-list').innerHTML = chats.map(c => `
                <div onclick="renderChat(${c.id})" class="p-2 hover:bg-white/5 rounded flex justify-between group cursor-pointer text-xs ${c.id === currentChatId ? 'bg-white/10' : ''}">
                    <span class="truncate">💬 ${c.title}</span>
                    <span onclick="deleteChat(event, ${c.id})" class="opacity-0 group-hover:opacity-50 hover:!opacity-100">×</span>
                </div>
            `).join('');
        }
        function renderChat(id) {
            currentChatId = id;
            document.getElementById('messages').innerHTML = "";
            const chat = chats.find(c => c.id === id);
            chat.messages.forEach(m => addMsgUI(m.role, m.content));
            renderSidebar();
        }
        function deleteChat(e, id) { e.stopPropagation(); chats = chats.filter(c => c.id !== id); saveData(); initApp(); }
        function saveData() { localStorage.setItem('al_chats', JSON.stringify(chats)); }
        function initApp() {
            const profile = JSON.parse(localStorage.getItem('al_profile'));
            document.getElementById('nav-user-name').innerText = profile.name;
            document.getElementById('user-avatar').innerText = profile.name[0];
            if(chats.length === 0) createNewChat(); else renderChat(chats[0].id);
        }
        function logout() { localStorage.clear(); location.reload(); }
        
        document.getElementById('user-input').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
        });
    </script>
</body>
</html>
