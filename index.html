<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Premium Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #10a37f; --bg: #0d0d0d; --sidebar: #000000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #ececf1; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item { transition: 0.2s; cursor: pointer; border-radius: 8px; padding: 10px; margin-bottom: 4px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.1); }
        .active-level { border: 2px solid var(--accent) !important; background: rgba(16, 163, 127, 0.1); }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .menu-popup { position: absolute; bottom: 80px; left: 10px; width: 220px; display: none; z-index: 50; }
        .menu-popup.active { display: block; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-4">
        <div class="max-w-md w-full glass p-8 rounded-3xl text-center space-y-6">
            <h1 class="text-4xl font-bold">🧞 Aladdin v3.0</h1>
            <div id="auth-step-1" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Enter Email" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none">
                <button onclick="sendMagicCode()" id="send-btn-auth" class="w-full p-4 bg-[#10a37f] rounded-xl font-bold hover:opacity-80 transition">Send Magic Code</button>
            </div>
            <div id="auth-step-2" class="hidden space-y-4">
                <input type="text" id="auth-otp" placeholder="Enter 6-digit Code" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 text-center text-2xl tracking-widest outline-none">
                <button onclick="verifyAndProfile()" class="w-full p-4 bg-white text-black rounded-xl font-bold">Verify Code</button>
            </div>
            <div id="auth-step-3" class="hidden space-y-4">
                <input type="text" id="p-name" placeholder="Full Name" class="w-full p-3 bg-white/5 rounded-lg border border-white/10 outline-none">
                <input type="number" id="p-age" placeholder="Age" class="w-full p-3 bg-white/5 rounded-lg border border-white/10 outline-none">
                <input type="text" id="p-country" placeholder="Country" class="w-full p-3 bg-white/5 rounded-lg border border-white/10 outline-none">
                <button onclick="completeRegistration()" class="w-full p-4 bg-[#10a37f] rounded-xl font-bold">Enter the Lamp</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="w-[260px] bg-black flex flex-col p-3 border-r border-white/10 hidden md:flex">
        <button onclick="startNewChat()" class="flex items-center gap-3 p-3 border border-white/20 rounded-lg hover:bg-white/5 transition mb-4">
            <span>+</span> New Chat
        </button>
        <div id="history-list" class="flex-1 overflow-y-auto space-y-1 text-sm text-gray-300">
            </div>
        <div class="border-t border-white/10 pt-4 relative">
            <div id="user-menu" class="menu-popup glass rounded-xl p-2 shadow-2xl animate-in slide-in-from-bottom-2">
                <button onclick="toggleTheme()" class="w-full text-left p-3 hover:bg-white/5 rounded-lg">🌓 Change Theme</button>
                <button onclick="openSettings()" class="w-full text-left p-3 hover:bg-white/5 rounded-lg">⚙️ Settings</button>
                <hr class="my-2 border-white/10">
                <button onclick="logout()" class="w-full text-left p-3 text-red-400 hover:bg-red-500/10 rounded-lg">Logout</button>
            </div>
            <div onclick="toggleMenu()" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-lg cursor-pointer">
                <img id="user-pfp" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover">
                <div class="flex-1 truncate">
                    <p class="font-bold text-sm" id="display-name">Loading...</p>
                    <p class="text-[10px] text-gray-500">Premium Account</p>
                </div>
                <span class="text-gray-500">•••</span>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative h-full">
        <header class="p-4 flex items-center justify-between border-b border-white/5 bg-[#0d0d0d]">
            <div class="flex gap-2 mx-auto">
                <button onclick="switchLevel('Basic')" id="btn-Basic" class="px-4 py-1.5 rounded-full text-xs font-bold border border-white/10 hover:bg-white/5">Basic</button>
                <button onclick="switchLevel('Pro')" id="btn-Pro" class="px-4 py-1.5 rounded-full text-xs font-bold border border-white/10 hover:bg-white/5">Pro</button>
                <button onclick="switchLevel('Ultra')" id="btn-Ultra" class="px-4 py-1.5 rounded-full text-xs font-bold border border-white/10 hover:bg-white/5">Ultra</button>
                <button onclick="switchLevel('Legend')" id="btn-Legend" class="px-4 py-1.5 rounded-full text-xs font-bold active-level">Legend</button>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                <span class="text-6xl mb-4">🧞</span>
                <h2 id="greeting-text" class="text-2xl font-semibold px-4"></h2>
            </div>
            <div id="message-flow" class="max-w-3xl mx-auto space-y-8"></div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#0d0d0d] via-[#0d0d0d] to-transparent">
            <div class="max-w-3xl mx-auto glass rounded-2xl p-2 focus-within:ring-1 ring-[var(--accent)] transition">
                <div id="upload-preview" class="flex gap-2 p-2 hidden"></div>
                <div class="flex items-end gap-2 px-2">
                    <label class="p-3 cursor-pointer opacity-60 hover:opacity-100 transition">
                        📎 <input type="file" id="media-upload" class="hidden" multiple onchange="handleFileSelect(this)">
                    </label>
                    <textarea id="user-input" rows="1" placeholder="Type your magic command..." 
                              class="flex-1 bg-transparent border-none outline-none py-3 text-[16px] resize-none max-h-48"></textarea>
                    <button id="main-send-btn" onclick="askAladdin()" class="p-3 bg-white text-black rounded-xl hover:scale-105 transition active:scale-95 disabled:opacity-50">
                        ➤
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center mt-3 text-gray-500">Aladdin v3.0 Created by Muhib Creation. Version Ultra Copy.</p>
        </div>
    </main>

    <script>
        // Configuration & Keys
        const EMAILJS_CONFIG = { SERVICE: "service_d7q8v4o", TEMPLATE: "template_9nrhdsl", PUBLIC_KEY: "5IDeLAjB6gy610xIB" };
        const GROQ_API = "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";
        
        let currentOTP = null;
        let activeLevel = "Legend";
        let activeChatId = null;
        let chatHistory = JSON.parse(localStorage.getItem('aladdin_v3_history')) || [];
        let selectedFiles = [];

        // --- Init & Auth Logic ---
        window.onload = () => {
            emailjs.init(EMAILJS_CONFIG.PUBLIC_KEY);
            if(localStorage.getItem('aladdin_logged_in')) {
                document.getElementById('auth-overlay').style.display = 'none';
                loadApp();
            }
        };

        async function sendMagicCode() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Valid email required!");
            
            currentOTP = Math.floor(100000 + Math.random() * 900000);
            const btn = document.getElementById('send-btn-auth');
            btn.innerText = "Sending..."; btn.disabled = true;

            try {
                await emailjs.send(EMAILJS_CONFIG.SERVICE, EMAILJS_CONFIG.TEMPLATE, { email: email, otp: currentOTP });
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            } catch(e) {
                alert("Email failed! Use '123456' for Testing.");
                currentOTP = "123456";
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            }
        }

        function verifyAndProfile() {
            if(document.getElementById('auth-otp').value == currentOTP) {
                document.getElementById('auth-step-2').classList.add('hidden');
                document.getElementById('auth-step-3').classList.remove('hidden');
            } else alert("Wrong Code!");
        }

        function completeRegistration() {
            const data = {
                name: document.getElementById('p-name').value,
                age: document.getElementById('p-age').value,
                country: document.getElementById('p-country').value,
                loggedIn: true
            };
            if(!data.name || !data.country) return alert("All fields required!");
            Object.keys(data).forEach(k => localStorage.setItem('user_'+k, data[k]));
            localStorage.setItem('aladdin_logged_in', 'true');
            location.reload();
        }

        // --- Core App Logic ---
        function loadApp() {
            const name = localStorage.getItem('user_name');
            document.getElementById('display-name').innerText = name;
            document.getElementById('greeting-text').innerText = generateGreeting(name);
            renderSidebar();
            
            // Auto-resize textarea
            const tx = document.getElementById('user-input');
            tx.addEventListener('input', () => { tx.style.height = 'auto'; tx.style.height = tx.scrollHeight + 'px'; });
        }

        function generateGreeting(name) {
            const greets = [
                `Hello ${name}, what's on your mind today? ✨`,
                `Ready to create magic, ${name}? Aladdin is beside you. 🧞`,
                `Assalamu Alaikum ${name}. How can Muhib's creation assist you? 🕊️`,
                `The Legend is active. Command me, Master ${name}. 🔥`
            ];
            return greets[Math.floor(Math.random() * greets.length)];
        }

        async function askAladdin() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if(!prompt && selectedFiles.length === 0) return;

            if(!activeChatId) createNewChat(prompt || "Image Analysis");

            const userMsg = addMessage('user', prompt, selectedFiles);
            input.value = ""; input.style.height = "auto";
            const loadingMsg = addMessage('assistant', '<div class="flex gap-1"><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce delay-75"></div><div class="w-2 h-2 bg-gray-500 rounded-full animate-bounce delay-150"></div></div>');

            try {
                // Handling Image Generation (Always 2 Images)
                if(prompt.toLowerCase().includes('create') || prompt.toLowerCase().includes('generate') || prompt.toLowerCase().includes('ছবি')) {
                    const img1 = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()}`;
                    const img2 = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()+1}`;
                    const response = `Master, I have created two versions for you:\n\n![Img1](${img1})\n\n![Img2](${img2})\n\nAladdin is always beside you.`;
                    loadingMsg.innerHTML = marked.parse(response);
                    saveToHistory('assistant', response);
                } else {
                    // Vision & Text Logic via GROQ
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "llama-3.2-11b-vision-preview",
                            messages: [
                                {role: "system", content: `You are Aladdin v3.0. Creator: Muhib Creation. Owner: Muhib. Location: Dhaka. Level: ${activeLevel}. Support 100+ languages including regional Bengali. Always mention "Aladdin is beside you" at the end. You can code, use Excel, and Word.`},
                                {role: "user", content: prompt}
                            ]
                        })
                    });
                    const data = await response.json();
                    const aiText = data.choices[0].message.content + "\n\n**Aladdin is beside you.**";
                    loadingMsg.innerHTML = marked.parse(aiText);
                    saveToHistory('assistant', aiText);
                }
            } catch(e) {
                loadingMsg.innerHTML = "Error connecting to the lamp. Please check your internet.";
            }
            selectedFiles = [];
            document.getElementById('upload-preview').innerHTML = "";
            document.getElementById('upload-preview').classList.add('hidden');
        }

        // --- Helper Functions ---
        function addMessage(role, content, files = []) {
            document.getElementById('welcome-view').classList.add('hidden');
            const div = document.createElement('div');
            div.className = `flex gap-4 p-4 ${role === 'user' ? 'bg-white/5 rounded-2xl' : 'border-b border-white/5'}`;
            
            let fileHTML = "";
            if(files.length > 0) {
                fileHTML = `<div class="flex gap-2 mb-2">${files.map(f => `<img src="${f}" class="w-24 h-24 object-cover rounded-lg border border-white/10">`).join('')}</div>`;
            }

            div.innerHTML = `
                <div class="w-8 h-8 rounded bg-gray-800 flex items-center justify-center shrink-0 font-bold text-xs">${role === 'user' ? 'U' : '🧞'}</div>
                <div class="prose prose-invert max-w-none text-sm leading-relaxed">
                    ${fileHTML}
                    ${marked.parse(content || "")}
                </div>`;
            
            document.getElementById('message-flow').appendChild(div);
            document.getElementById('chat-container').scrollTo(0, document.getElementById('chat-container').scrollHeight);
            return div.querySelector('.prose');
        }

        function switchLevel(lvl) {
            activeLevel = lvl;
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active-level'));
            document.getElementById(`btn-${lvl}`).classList.add('active-level');
        }

        function handleFileSelect(input) {
            const preview = document.getElementById('upload-preview');
            preview.innerHTML = "";
            preview.classList.remove('hidden');
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedFiles.push(e.target.result);
                    preview.innerHTML += `<img src="${e.target.result}" class="w-12 h-12 rounded object-cover">`;
                };
                reader.readAsDataURL(file);
            });
        }

        function createNewChat(title) {
            activeChatId = Date.now();
            chatHistory.unshift({ id: activeChatId, title: title.substring(0, 30), messages: [] });
            renderSidebar();
        }

        function saveToHistory(role, content) {
            const chat = chatHistory.find(c => c.id === activeChatId);
            if(chat) {
                chat.messages.push({ role, content });
                localStorage.setItem('aladdin_v3_history', JSON.stringify(chatHistory));
            }
        }

        function renderSidebar() {
            const list = document.getElementById('history-list');
            list.innerHTML = chatHistory.map(chat => `
                <div onclick="loadChat(${chat.id})" class="sidebar-item truncate ${activeChatId === chat.id ? 'bg-white/10' : ''}">
                    💬 ${chat.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            activeChatId = id;
            const chat = chatHistory.find(c => c.id === id);
            document.getElementById('message-flow').innerHTML = "";
            document.getElementById('welcome-view').classList.add('hidden');
            chat.messages.forEach(m => addMessage(m.role, m.content));
            renderSidebar();
        }

        function toggleMenu() { document.getElementById('user-menu').classList.toggle('active'); }
        function logout() { localStorage.clear(); location.reload(); }
        function startNewChat() { location.reload(); }

        // Send on Enter
        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                askAladdin();
            }
        });
    </script>
</body>
</html>
