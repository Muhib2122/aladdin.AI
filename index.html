<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Ultra Premium</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧞</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* 6 Premium Themes */
        :root {
            --bg-main: #212121; --bg-sidebar: #171717; --bg-chat: #2f2f2f; --text-main: #ececf1; --accent: #10a37f;
        }
        [data-theme="light"] { --bg-main: #f7f7f8; --bg-sidebar: #202123; --bg-chat: #ffffff; --text-main: #343541; --accent: #10a37f; }
        [data-theme="blue"] { --bg-main: #0f172a; --bg-sidebar: #020617; --bg-chat: #1e293b; --text-main: #f8fafc; --accent: #3b82f6; }
        [data-theme="purple"] { --bg-main: #2e1065; --bg-sidebar: #17003c; --bg-chat: #4c1d95; --text-main: #f5f3ff; --accent: #a855f7; }
        [data-theme="crimson"] { --bg-main: #450a0a; --bg-sidebar: #280000; --bg-chat: #7f1d1d; --text-main: #fef2f2; --accent: #ef4444; }
        [data-theme="midnight"] { --bg-main: #000000; --bg-sidebar: #0a0a0a; --bg-chat: #121212; --text-main: #e5e5e5; --accent: #f59e0b; }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-main); color: var(--text-main); transition: all 0.3s ease; }
        
        .sidebar { background-color: var(--bg-sidebar); color: #fff; z-index: 40; }
        .glass-panel { background: var(--bg-chat); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .user-msg { background-color: rgba(16, 163, 127, 0.1); border-top-right-radius: 0; }
        .ai-msg { background-color: transparent; }
        
        .level-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,255,255,0.05); }
        
        /* 3-Dot Popup Fix */
        .popup-menu { position: absolute; bottom: 70px; left: 10px; width: 240px; background: var(--bg-chat); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: none; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .popup-menu.show { display: block; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden" data-theme="dark">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-[#1e1e1e] border border-gray-700 p-8 rounded-3xl text-center space-y-6 text-white shadow-2xl">
            <div class="flex justify-center mb-4">
                <div class="text-6xl animate-bounce">🧞</div>
            </div>
            <h1 class="text-3xl font-bold text-[var(--accent)]">Aladdin AI</h1>
            <p class="text-sm text-gray-400">The Legend Awakes</p>

            <div id="auth-step-1" class="space-y-4">
                <input type="email" id="login-email" placeholder="Enter your email" class="w-full p-4 rounded-xl bg-black/50 border border-gray-600 outline-none focus:border-[var(--accent)]">
                <button onclick="sendMagicCode()" id="btn-send-code" class="w-full p-4 bg-[var(--accent)] rounded-xl font-bold hover:brightness-110 transition">Send Magic Code</button>
            </div>

            <div id="auth-step-2" class="hidden space-y-4">
                <p class="text-xs text-gray-400">Check your email for the 6-digit code.</p>
                <input type="text" id="login-otp" placeholder="••••••" class="w-full p-4 rounded-xl bg-black/50 border border-gray-600 text-center text-2xl tracking-[0.5em] outline-none focus:border-[var(--accent)]">
                <button onclick="verifyCode()" class="w-full p-4 bg-white text-black rounded-xl font-bold">Verify Code</button>
            </div>

            <div id="auth-step-3" class="hidden space-y-4 text-left">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-3 bg-black/50 rounded-lg border border-gray-600 outline-none">
                <input type="number" id="reg-age" placeholder="Age" class="w-full p-3 bg-black/50 rounded-lg border border-gray-600 outline-none">
                <input type="text" id="reg-country" placeholder="Country" class="w-full p-3 bg-black/50 rounded-lg border border-gray-600 outline-none">
                <button onclick="completeLogin()" class="w-full p-4 bg-[var(--accent)] rounded-xl font-bold text-center mt-2">Enter the Lamp</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="sidebar w-[260px] flex flex-col h-full hidden md:flex transition-all">
        <div class="p-4 flex items-center gap-3 font-bold text-xl tracking-wide border-b border-white/10">
            <span class="text-2xl">🧞</span>
            Aladdin AI
        </div>
        
        <div class="p-3">
            <button onclick="startNewChat()" class="flex items-center gap-3 w-full p-3 border border-white/20 rounded-xl hover:bg-white/10 transition">
                <i class="fa-solid fa-pen-to-square"></i> New Chat
            </button>
        </div>

        <div id="chat-history" class="flex-1 overflow-y-auto px-3 space-y-1 text-sm">
            </div>

        <div class="p-3 border-t border-white/10 relative">
            <div id="user-popup" class="popup-menu p-2 text-white">
                <div class="text-xs text-gray-400 px-3 py-2 uppercase font-bold tracking-wider">Settings</div>
                <button onclick="openSettings()" class="w-full text-left px-3 py-2 hover:bg-white/10 rounded-lg flex items-center gap-3"><i class="fa-solid fa-gear"></i> App Settings</button>
                <hr class="border-gray-700 my-1">
                <button onclick="logout()" class="w-full text-left px-3 py-2 text-red-400 hover:bg-red-500/10 rounded-lg flex items-center gap-3"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
            </div>

            <div onclick="toggleMenu()" class="flex items-center gap-3 p-2 hover:bg-white/10 rounded-xl cursor-pointer transition">
                <img id="sidebar-pfp" src="https://via.placeholder.com/150" class="w-10 h-10 rounded-full object-cover border border-gray-600">
                <div class="flex-1 truncate">
                    <p class="font-bold text-sm" id="sidebar-name">User</p>
                    <p class="text-[10px] text-[var(--accent)] font-semibold">Premium</p>
                </div>
                <i class="fa-solid fa-ellipsis-vertical px-2"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="md:hidden flex items-center justify-between p-4 border-b border-gray-700/50 bg-[var(--bg-main)] z-20">
            <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" class="text-xl"><i class="fa-solid fa-bars"></i></button>
            <span class="font-bold">Aladdin AI</span>
            <div class="w-6"></div>
        </header>

        <div class="flex justify-center p-3 z-10 bg-[var(--bg-main)]">
            <div class="glass-panel flex p-1 rounded-full text-xs font-bold gap-1">
                <button onclick="setLevel('Basic')" id="btn-Basic" class="level-btn px-4 py-1.5 rounded-full border border-transparent transition">Basic</button>
                <button onclick="setLevel('Pro')" id="btn-Pro" class="level-btn px-4 py-1.5 rounded-full border border-transparent transition">Pro</button>
                <button onclick="setLevel('Ultra')" id="btn-Ultra" class="level-btn px-4 py-1.5 rounded-full border border-transparent transition">Ultra</button>
                <button onclick="setLevel('Legend')" id="btn-Legend" class="level-btn active px-4 py-1.5 rounded-full border border-transparent transition">Legend</button>
            </div>
        </div>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:px-20 lg:px-40 pb-32">
            <div id="welcome-state" class="h-full flex flex-col items-center justify-center text-center opacity-70">
                <div class="text-7xl mb-6 drop-shadow-[0_0_15px_rgba(16,163,127,0.5)]">🧞</div>
                <h2 id="greeting-msg" class="text-2xl md:text-3xl font-bold mb-2"></h2>
                <p class="text-sm opacity-60">Aladdin is right by your side. Upload images, text, or ask for creations.</p>
            </div>
            <div id="messages" class="space-y-6"></div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent pt-10 pb-6 px-4 md:px-20 lg:px-40">
            <div class="glass-panel p-2 shadow-2xl relative">
                <div id="file-preview" class="flex gap-2 p-2 hidden overflow-x-auto"></div>
                
                <div class="flex items-end gap-2 px-2">
                    <label class="p-3 cursor-pointer hover:text-[var(--accent)] transition">
                        <i class="fa-solid fa-paperclip text-lg"></i>
                        <input type="file" id="media-upload" class="hidden" multiple accept="image/*, .pdf" onchange="handleFiles(this)">
                    </label>
                    <textarea id="prompt-input" rows="1" placeholder="Command Aladdin..." class="flex-1 bg-transparent border-none outline-none py-3 resize-none max-h-40"></textarea>
                    <button id="send-btn" onclick="sendPrompt()" class="p-3 bg-[var(--accent)] text-white rounded-xl hover:scale-105 active:scale-95 transition disabled:opacity-50">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
            </div>
            <div class="text-center text-[10px] mt-3 opacity-40">Creator: Muhib Creation | Owner: Muhib | Location: Dhaka</div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[300] bg-black/80 hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="max-w-md w-full bg-[#1e1e1e] p-6 rounded-2xl border border-gray-700 text-white space-y-5">
            <div class="flex justify-between items-center border-b border-gray-700 pb-3">
                <h2 class="text-xl font-bold">App Settings</h2>
                <button onclick="closeSettings()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="text-sm font-bold text-gray-400 block mb-2">Profile Picture</label>
                    <div class="flex items-center gap-4">
                        <img id="settings-pfp" src="https://via.placeholder.com/150" class="w-16 h-16 rounded-full object-cover">
                        <input type="file" id="pfp-upload" class="hidden" accept="image/*" onchange="updatePFP(this)">
                        <button onclick="document.getElementById('pfp-upload').click()" class="px-4 py-2 bg-white/10 rounded-lg text-sm hover:bg-white/20">Change Photo</button>
                    </div>
                </div>

                <div>
                    <label class="text-sm font-bold text-gray-400 block mb-2">Theme Color</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="changeTheme('dark')" class="p-2 bg-[#212121] border border-gray-600 rounded-lg text-xs">Dark</button>
                        <button onclick="changeTheme('light')" class="p-2 bg-[#f7f7f8] text-black border border-gray-300 rounded-lg text-xs">Light</button>
                        <button onclick="changeTheme('blue')" class="p-2 bg-[#0f172a] border border-gray-600 rounded-lg text-xs">Blue</button>
                        <button onclick="changeTheme('purple')" class="p-2 bg-[#2e1065] border border-gray-600 rounded-lg text-xs">Purple</button>
                        <button onclick="changeTheme('crimson')" class="p-2 bg-[#450a0a] border border-gray-600 rounded-lg text-xs">Crimson</button>
                        <button onclick="changeTheme('midnight')" class="p-2 bg-black border border-gray-600 rounded-lg text-xs">Midnight</button>
                    </div>
                </div>

                <div>
                    <label class="text-sm font-bold text-gray-400 block mb-2">Language Preference</label>
                    <select id="lang-pref" class="w-full p-3 bg-black/50 border border-gray-600 rounded-lg outline-none" onchange="saveLang(this.value)">
                        <option value="en">English (Default)</option>
                        <option value="bn">Bengali / Banglish</option>
                        <option value="auto">Auto Detect (100+ Langs)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- API Keys & Setup ---
        const EMAILJS = { SERVICE: "service_d7q8v4o", TEMPLATE: "template_9nrhdsl", PUBLIC: "5IDeLAjB6gy610xIB" };
        const GROQ_API = "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";
        
        let genOTP = null;
        let aiLevel = "Legend";
        let currChatId = null;
        let attachedImages = []; 
        let chatDB = JSON.parse(localStorage.getItem('aladdin_db')) || [];

        window.onload = () => {
            emailjs.init(EMAILJS.PUBLIC);
            checkSession();
            
            const ta = document.getElementById('prompt-input');
            ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
            ta.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); } });

            document.addEventListener('click', (e) => {
                const popup = document.getElementById('user-popup');
                if(!e.target.closest('.relative') && popup.classList.contains('show')) popup.classList.remove('show');
            });
        };

        function checkSession() {
            if(localStorage.getItem('aladdin_user')) {
                document.getElementById('auth-screen').style.display = 'none';
                bootApp();
            }
        }

        async function sendMagicCode() {
            const email = document.getElementById('login-email').value;
            if(!email.includes('@')) return alert("Enter a valid email");
            
            genOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('btn-send-code');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                await emailjs.send(EMAILJS.SERVICE, EMAILJS.TEMPLATE, { email: email, otp: genOTP });
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            } catch(err) {
                alert("EmailJS Error! If testing without live domain, use fallback: 123456");
                genOTP = "123456";
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            }
        }

        function verifyCode() {
            const input = document.getElementById('login-otp').value;
            if(input === genOTP) {
                document.getElementById('auth-step-2').classList.add('hidden');
                document.getElementById('auth-step-3').classList.remove('hidden');
            } else alert("Invalid code. Try again.");
        }

        function completeLogin() {
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const country = document.getElementById('reg-country').value;
            if(!name || !age || !country) return alert("Fill all details to enter!");

            const userData = { name, age, country, joined: new Date().toISOString() };
            localStorage.setItem('aladdin_user', JSON.stringify(userData));
            
            if(!localStorage.getItem('aladdin_theme')) localStorage.setItem('aladdin_theme', 'dark');
            if(!localStorage.getItem('aladdin_lang')) localStorage.setItem('aladdin_lang', 'en');
            
            location.reload();
        }

        function bootApp() {
            const user = JSON.parse(localStorage.getItem('aladdin_user'));
            document.getElementById('sidebar-name').innerText = user.name;
            document.getElementById('greeting-msg').innerText = getCustomGreeting(user.name);
            
            const pfp = localStorage.getItem('aladdin_pfp');
            if(pfp) {
                document.getElementById('sidebar-pfp').src = pfp;
                document.getElementById('settings-pfp').src = pfp;
            }

            changeTheme(localStorage.getItem('aladdin_theme'));
            document.getElementById('lang-pref').value = localStorage.getItem('aladdin_lang');
            
            renderHistory();
        }

        function getCustomGreeting(name) {
            const hour = new Date().getHours();
            let timeGreet = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
            const emojis = ["✨", "🧞", "🚀", "🌟", "🔥", "💡", "🔮"];
            const phrases = [
                `Ready to create magic, ${name}?`,
                `Aladdin is right by your side.`,
                `What shall we build today?`,
                `Command me, Master ${name}.`,
                `Your wish is my code.`,
                `Let's solve some problems together.`
            ];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            return `${timeGreet}, ${name}! ${randomPhrase} ${randomEmoji}`;
        }

        function toggleMenu() { document.getElementById('user-popup').classList.toggle('show'); }
        function setLevel(lvl) {
            aiLevel = lvl;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lvl}`).classList.add('active');
        }

        function handleFiles(input) {
            const preview = document.getElementById('file-preview');
            preview.classList.remove('hidden');
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    attachedImages.push(e.target.result);
                    preview.innerHTML += `<div class="relative"><img src="${e.target.result}" class="w-16 h-16 object-cover rounded-lg border border-gray-500"></div>`;
                };
                reader.readAsDataURL(file);
            });
        }

        async function sendPrompt() {
            const input = document.getElementById('prompt-input');
            const text = input.value.trim();
            if(!text && attachedImages.length === 0) return;

            if(!currChatId) {
                currChatId = Date.now().toString();
                chatDB.unshift({ id: currChatId, title: text.substring(0, 25) || "Analysis", msgs: [] });
                renderHistory();
            }

            appendDOM('user', text, attachedImages);
            input.value = ""; input.style.height = "auto";
            document.getElementById('file-preview').innerHTML = "";
            document.getElementById('file-preview').classList.add('hidden');
            
            const loader = appendDOM('ai', '<i class="fa-solid fa-circle-notch fa-spin text-[var(--accent)]"></i> Aladdin is analyzing...');
            const tempImages = [...attachedImages];
            attachedImages = [];

            try {
                if(text.toLowerCase().includes('create image') || text.toLowerCase().includes('ছবি বানাও')) {
                    const seed1 = Math.floor(Math.random() * 10000);
                    const encoded = encodeURIComponent(text);
                    const resText = `![Creation](https://pollinations.ai/p/${encoded}?width=1024&height=1024&seed=${seed1})\n\n**Aladdin is right by your side.**`;
                    loader.innerHTML = marked.parse(resText);
                    saveMsg('ai', resText);
                    return;
                }

                const userPrefs = JSON.parse(localStorage.getItem('aladdin_user'));
                // Improved Vision Logic
                const sysPrompt = `You are Aladdin AI v3.0. Creator: Muhib. You can see and analyze images perfectly. Languages: 100+ (inc. Banglish). Level: ${aiLevel}. End with "Aladdin is right by your side."`;

                let apiModel = tempImages.length > 0 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                let messagesPayload = [{ role: "system", content: sysPrompt }];
                
                // History context
                const chatHistory = chatDB.find(c => c.id === currChatId).msgs;
                chatHistory.slice(-4).forEach(m => {
                    messagesPayload.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content });
                });

                // Vision Specific Payload
                if(tempImages.length > 0) {
                    let contentArray = [{ type: "text", text: text || "Analyze this image in detail." }];
                    tempImages.forEach(imgData => {
                        contentArray.push({ type: "image_url", image_url: { url: imgData } });
                    });
                    messagesPayload.push({ role: "user", content: contentArray });
                } else {
                    messagesPayload.push({ role: "user", content: text });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: apiModel, messages: messagesPayload, temperature: 0.6 })
                });

                const data = await response.json();
                let aiResponse = data.choices[0].message.content;
                if(!aiResponse.includes("Aladdin")) aiResponse += "\n\n**Aladdin is right by your side.**";
                
                loader.innerHTML = marked.parse(aiResponse);
                saveMsg('ai', aiResponse);

            } catch(error) {
                loader.innerHTML = "<span class='text-red-400'>Lamp error! Please check internet or API.</span>";
            }
        }

        function appendDOM(role, text, images = []) {
            document.getElementById('welcome-state').classList.add('hidden');
            const wrapper = document.getElementById('messages');
            const div = document.createElement('div');
            
            div.className = `flex gap-4 p-4 rounded-2xl max-w-4xl mx-auto ${role === 'user' ? 'user-msg ml-auto w-fit' : 'ai-msg w-full'}`;
            
            let imgHTML = "";
            if(images.length > 0) {
                imgHTML = `<div class="flex flex-wrap gap-2 mb-3">${images.map(i => `<img src="${i}" class="max-w-[250px] rounded-lg shadow-lg">`).join('')}</div>`;
            }

            // Changed AI message icon to emoji
            const icon = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<span class="text-xl">🧞</span>';
            
            div.innerHTML = `
                <div class="w-8 h-8 shrink-0 rounded-full flex items-center justify-center bg-black/20 border border-white/10">${icon}</div>
                <div class="prose prose-invert max-w-none text-[15px] leading-relaxed w-full overflow-x-auto">
                    ${imgHTML}
                    ${role === 'user' ? (text || '') : marked.parse(text || '')}
                </div>
            `;
            wrapper.appendChild(div);
            scrollToBottom();
            if(role === 'user' && currChatId) saveMsg('user', text, images);
            return div.querySelector('.prose');
        }

        function scrollToBottom() {
            const box = document.getElementById('chat-box');
            box.scrollTop = box.scrollHeight;
        }

        function saveMsg(role, content, images = []) {
            const chat = chatDB.find(c => c.id === currChatId);
            if(chat) {
                chat.msgs.push({ role, content, images });
                localStorage.setItem('aladdin_db', JSON.stringify(chatDB));
            }
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatDB.map(c => `
                <div onclick="loadChat('${c.id}')" class="p-3 hover:bg-white/10 rounded-xl cursor-pointer truncate transition flex items-center gap-2 ${currChatId === c.id ? 'bg-white/10 border border-white/5' : ''}">
                    <i class="fa-regular fa-message opacity-50"></i> ${c.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            currChatId = id;
            const chat = chatDB.find(c => c.id === id);
            document.getElementById('messages').innerHTML = "";
            document.getElementById('welcome-state').classList.add('hidden');
            chat.msgs.forEach(m => appendDOM(m.role, m.content, m.images));
            renderHistory();
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
        }

        function startNewChat() {
            currChatId = null;
            document.getElementById('messages').innerHTML = "";
            document.getElementById('welcome-state').classList.remove('hidden');
            const user = JSON.parse(localStorage.getItem('aladdin_user'));
            document.getElementById('greeting-msg').innerText = getCustomGreeting(user.name);
            renderHistory();
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.add('hidden');
        }

        function openSettings() { 
            document.getElementById('settings-modal').style.display = 'flex'; 
            document.getElementById('user-popup').classList.remove('show');
        }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        
        function changeTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('aladdin_theme', theme);
        }
        
        function updatePFP(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = e.target.result;
                    localStorage.setItem('aladdin_pfp', data);
                    document.getElementById('sidebar-pfp').src = data;
                    document.getElementById('settings-pfp').src = data;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveLang(val) { localStorage.setItem('aladdin_lang', val); }
        function logout() { localStorage.clear(); location.reload(); }

    </script>
</body>
</html>
