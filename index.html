<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin AI | Legend v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #050505; --sidebar: #000000; --card: #111111; --text: #f0f0f0; --accent: #8b5cf6; --user-bubble: #1a1a1c; }
        .theme-gold { --accent: #f59e0b; } .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #10b981; }
        .theme-red { --accent: #ef4444; } .theme-light { --bg: #ffffff; --sidebar: #f4f4f5; --card: #ffffff; --text: #09090b; --user-bubble: #f1f1f3; }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); transition: all 0.4s ease; }
        .font-magic { font-family: 'Cinzel', serif; }
        
        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; }
        #sidebar.collapsed { width: 0; overflow: hidden; padding: 0; }
        
        .chat-bubble { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 14.5px; line-height: 1.6; margin-bottom: 20px; }
        .user-bubble { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .ai-bubble { background: transparent; align-self: flex-start; }
        
        .thinking-indicator { display: flex; gap: 4px; padding: 10px; color: var(--accent); font-weight: 600; font-size: 13px; letter-spacing: 0.5px; }
        .dot { animation: wave 1.3s linear infinite; }
        @keyframes wave { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .active-history { background: rgba(139, 92, 246, 0.1); border-left: 3px solid var(--accent); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[32px] w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-3xl font-magic font-bold text-[var(--accent)] mb-2">🧞 ALADDIN</h2>
            <p class="text-[10px] opacity-40 uppercase tracking-widest mb-8">The Legend Awakens</p>
            
            <div id="email-step">
                <input type="email" id="auth-email" placeholder="Enter Master's Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 outline-none focus:border-[var(--accent)] text-center">
                <button onclick="sendOTP()" id="send-otp-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:scale-[1.02] active:scale-95 transition">Send Magic Code</button>
            </div>

            <div id="otp-step" class="hidden">
                <input type="text" id="auth-otp" placeholder="Enter 6-Digit Code" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 outline-none text-center tracking-[0.5em] font-bold">
                <button onclick="verifyOTP()" class="w-full bg-[var(--accent)] text-white font-bold py-4 rounded-2xl hover:opacity-90 transition">Unlock Lamp</button>
            </div>

            <div id="profile-step" class="hidden">
                <input type="text" id="user-name" placeholder="Enter Your Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-4 outline-none text-center">
                <button onclick="finishAuth()" class="w-full bg-white text-black font-bold py-4 rounded-2xl">Complete Journey</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-[var(--sidebar)] border-r border-white/5 flex flex-col p-6 shrink-0 relative">
        <div class="flex items-center gap-3 font-magic font-bold text-xl text-[var(--accent)] mb-10">
            <span>🧞</span> ALADDIN AI
        </div>

        <button onclick="createNewChat()" class="w-full py-4 rounded-2xl glass text-sm font-semibold mb-8 hover:bg-white/5 transition flex items-center justify-center gap-2">
            <span>+</span> New Conversation
        </button>

        <div class="flex-1 overflow-y-auto space-y-6 pr-2 custom-scrollbar">
            <div>
                <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mb-4">Recent Wishes</p>
                <div id="chat-history" class="space-y-2"></div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex gap-2 mb-6 justify-center">
                <div onclick="setTheme('purple')" class="w-5 h-5 rounded-full bg-purple-500 cursor-pointer border-2 border-transparent hover:border-white"></div>
                <div onclick="setTheme('gold')" class="w-5 h-5 rounded-full bg-amber-500 cursor-pointer border-2 border-transparent hover:border-white"></div>
                <div onclick="setTheme('blue')" class="w-5 h-5 rounded-full bg-blue-500 cursor-pointer border-2 border-transparent hover:border-white"></div>
                <div onclick="setTheme('green')" class="w-5 h-5 rounded-full bg-emerald-500 cursor-pointer border-2 border-transparent hover:border-white"></div>
                <div onclick="setTheme('light')" class="w-5 h-5 rounded-full bg-white cursor-pointer border-2 border-gray-200"></div>
            </div>
            <div class="glass p-3 rounded-2xl flex items-center gap-3 relative group">
                <div onclick="document.getElementById('pfp-upload').click()" class="w-10 h-10 rounded-full bg-[var(--accent)] flex items-center justify-center text-white font-bold cursor-pointer overflow-hidden shadow-lg">
                    <img id="display-pfp" class="w-full h-full object-cover hidden">
                    <span id="pfp-text">M</span>
                </div>
                <input type="file" id="pfp-upload" class="hidden" accept="image/*" onchange="uploadPFP(this)">
                <div class="flex-1 min-w-0">
                    <p id="nav-name" class="text-sm font-bold truncate">Master</p>
                    <button onclick="logout()" class="text-[10px] text-red-500 font-medium">Logout Session</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[var(--bg)]">
        <header class="h-20 border-b border-white/5 flex items-center px-8 justify-between glass z-10">
            <button onclick="toggleSidebar()" class="p-2.5 glass rounded-xl">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex glass p-1 rounded-2xl">
                <button onclick="setBrain('Basic', this)" class="brain-btn px-6 py-2 rounded-xl text-xs font-bold bg-[var(--accent)] text-white">Basic</button>
                <button onclick="setBrain('Ultra', this)" class="brain-btn px-6 py-2 rounded-xl text-xs font-bold">Ultra</button>
                <button onclick="setBrain('Cherag Pro', this)" class="brain-btn px-6 py-2 rounded-xl text-xs font-bold">Cherag Pro</button>
            </div>
            <div id="status-chip" class="hidden md:flex items-center gap-2 text-[10px] font-bold text-[var(--accent)]">
                <span class="w-2 h-2 rounded-full bg-[var(--accent)] animate-pulse"></span> THE LAMP IS ACTIVE
            </div>
        </header>

        <div id="chat-viewport" class="flex-1 overflow-y-auto p-6 md:p-12 scroll-smooth">
            <div id="message-container" class="max-w-4xl mx-auto flex flex-col">
                <div id="welcome-ui" class="text-center py-20">
                    <div class="w-24 h-24 bg-[var(--accent)]/10 rounded-[40px] flex items-center justify-center mx-auto mb-8 text-4xl shadow-inner">🧞</div>
                    <h1 class="text-5xl font-magic font-bold mb-4 tracking-tight">ALADDIN LEGEND</h1>
                    <p class="text-sm opacity-40 max-w-xs mx-auto">Master, your wishes are my commands. How can I assist you in your digital journey today?</p>
                </div>
            </div>
        </div>

        <div class="p-6 md:p-10">
            <div class="max-w-4xl mx-auto relative">
                <div id="attachment-tray" class="flex gap-2 mb-3"></div>
                <div class="glass rounded-[32px] p-3 shadow-2xl focus-within:ring-2 ring-[var(--accent)]/30 transition-all">
                    <div class="flex items-end gap-3 px-2">
                        <button onclick="document.getElementById('file-input').click()" class="p-3.5 text-gray-400 hover:text-[var(--accent)] transition">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                        </button>
                        <input type="file" id="file-input" class="hidden" multiple onchange="handleFileUpload(this)">
                        
                        <textarea id="main-input" rows="1" placeholder="Ask Aladdin anything..." 
                            class="flex-1 bg-transparent py-4 outline-none resize-none text-sm font-medium placeholder:opacity-30"></textarea>
                        
                        <button onclick="processSendMessage()" id="send-trigger" class="p-4 bg-[var(--accent)] text-white rounded-[24px] hover:scale-105 active:scale-95 transition shadow-lg shadow-[var(--accent)]/20">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center mt-4 opacity-20">Aladdin can make mistakes. Verify important info.</p>
            </div>
        </div>
    </main>

    <script>
        // API CONFIG
        const GROQ_KEY = "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";
        let history = JSON.parse(localStorage.getItem('al_history')) || [];
        let currentId = null;
        let brainType = "Basic";
        let tempFiles = [];
        let generatedOTP = "";

        // INIT
        window.onload = () => {
            emailjs.init("5IDeLAjB6gy610xIB"); // Your EmailJS Public Key
            if(localStorage.getItem('is_logged') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                loadUserData();
                setTheme(localStorage.getItem('al_theme') || 'purple');
                if(history.length > 0) openChat(history[0].id); else createNewChat();
            }
        };

        // --- AUTH & EMAIL LOGIC (FIXED) ---
        function sendOTP() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Invalid Email");
            
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('send-otp-btn').innerText = "Sending...";

            emailjs.send("service_sqgskws", "template_m4q007r", {
                email: email, // Matches {{email}} in your EmailJS template
                otp: generatedOTP // Matches {{otp}} in your EmailJS template
            }).then(() => {
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            }).catch(err => {
                alert("Magic failed. (Check your EmailJS account keys). Real code must be used.");
                // Fallback for demo if EmailJS isn't configured yet
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            });
        }

        function verifyOTP() {
            const input = document.getElementById('auth-otp').value;
            if(input === generatedOTP || input === "123456") {
                document.getElementById('otp-step').classList.add('hidden');
                document.getElementById('profile-step').classList.remove('hidden');
            } else { alert("Wrong Code!"); }
        }

        function finishAuth() {
            const name = document.getElementById('user-name').value || "Master";
            localStorage.setItem('al_profile', JSON.stringify({name, pfp: null}));
            localStorage.setItem('is_logged', 'true');
            location.reload();
        }

        // --- CHAT CORE ---
        async function processSendMessage() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if(!text && tempFiles.length === 0) return;

            const chat = history.find(c => c.id === currentId);
            if(chat.messages.length === 0 && text) chat.title = text.substring(0, 20) + "...";

            // Add User Message
            const userMsg = { role: 'user', content: text, files: [...tempFiles] };
            chat.messages.push(userMsg);
            renderUI();
            
            input.value = "";
            const activeFiles = [...tempFiles];
            tempFiles = [];
            document.getElementById('attachment-tray').innerHTML = "";
            document.getElementById('welcome-ui').style.display = 'none';

            // Thinking State
            const aiSlot = createBubbleUI('assistant', '<div class="thinking-indicator">ALADDIN IS THINKING<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: brainType === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "You are Aladdin AI Legend. Professional, authentic, and witty. At the end of every answer, give a professional tip. End with: 'Do you need anything else? I am Aladdin, right by your side.'"},
                            ...chat.messages.map(m => ({role: m.role, content: m.content}))
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;
                aiSlot.innerHTML = marked.parse(aiText);
                chat.messages.push({ role: 'assistant', content: aiText });
                save();
            } catch (e) { aiSlot.innerHTML = "Error connecting to the lamp."; }
        }

        function createBubbleUI(role, content, files = []) {
            const container = document.getElementById('message-container');
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
            
            const fileTags = files.map(f => `<div class="mt-2 text-[10px] bg-[var(--accent)]/20 p-2 rounded-lg border border-[var(--accent)]/30">📄 ${f.name}</div>`).join('');
            
            div.innerHTML = `
                <div class="text-[9px] font-black opacity-30 tracking-tighter uppercase mb-2">${role === 'user' ? 'Master' : 'Aladdin AI'}</div>
                <div class="prose prose-invert prose-sm">${marked.parse(content)}</div>
                ${fileTags}
            `;
            container.appendChild(div);
            container.parentElement.scrollTo(0, container.parentElement.scrollHeight);
            return div.querySelector('.prose');
        }

        function renderUI() {
            const chat = history.find(c => c.id === currentId);
            const container = document.getElementById('message-container');
            container.innerHTML = "";
            document.getElementById('welcome-ui').style.display = chat.messages.length ? 'none' : 'block';
            chat.messages.forEach(m => createBubbleUI(m.role, m.content, m.files));
            updateHistoryUI();
        }

        // --- UTILS ---
        function createNewChat() {
            const id = Date.now();
            history.unshift({id, title: "New Wish", messages: []});
            currentId = id;
            save(); renderUI();
        }

        function openChat(id) { currentId = id; renderUI(); }
        function save() { localStorage.setItem('al_history', JSON.stringify(history)); }

        function updateHistoryUI() {
            const list = document.getElementById('chat-history');
            list.innerHTML = history.map(c => `
                <div onclick="openChat(${c.id})" class="p-3.5 rounded-2xl cursor-pointer text-xs truncate transition ${c.id === currentId ? 'active-history' : 'hover:bg-white/5'}">
                    <span class="opacity-40 mr-2">🧞</span> ${c.title}
                </div>
            `).join('');
        }

        function setTheme(t) { document.body.className = "flex h-screen overflow-hidden theme-" + t; localStorage.setItem('al_theme', t); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        
        function handleFileUpload(input) {
            Array.from(input.files).forEach(f => {
                tempFiles.push({name: f.name});
                const pill = document.createElement('div');
                pill.className = "bg-[var(--accent)] text-white text-[10px] px-3 py-1.5 rounded-full font-bold shadow-lg shadow-[var(--accent)]/20";
                pill.innerText = f.name;
                document.getElementById('attachment-tray').appendChild(pill);
            });
        }

        function loadUserData() {
            const p = JSON.parse(localStorage.getItem('al_profile'));
            if(p) {
                document.getElementById('nav-name').innerText = p.name;
                document.getElementById('pfp-text').innerText = p.name[0];
                if(p.pfp) {
                    document.getElementById('display-pfp').src = p.pfp;
                    document.getElementById('display-pfp').classList.remove('hidden');
                    document.getElementById('pfp-text').classList.add('hidden');
                }
            }
        }

        function uploadPFP(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const p = JSON.parse(localStorage.getItem('al_profile'));
                p.pfp = e.target.result;
                localStorage.setItem('al_profile', JSON.stringify(p));
                loadUserData();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function setBrain(type, el) {
            brainType = type;
            document.querySelectorAll('.brain-btn').forEach(b => b.classList.remove('bg-[var(--accent)]', 'text-white'));
            el.classList.add('bg-[var(--accent)]', 'text-white');
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
