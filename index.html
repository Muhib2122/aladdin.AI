<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin AI | v3.0 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #0b0b0d; --sidebar: #000000; --card: #141416; --text: #ececed; --accent: #a855f7; --user-msg: #202023; }
        .theme-gold { --accent: #e2b714; } .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #22c55e; }
        .theme-red { --accent: #ef4444; } .theme-pink { --accent: #ec4899; } .theme-light { --bg: #f8f9fa; --sidebar: #ffffff; --card: #ffffff; --text: #1a1a1b; --user-msg: #f1f1f4; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: all 0.3s ease; }
        .font-magic { font-family: 'Cinzel', serif; }
        
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; z-index: 50; }
        #sidebar.collapsed { width: 0; transform: translateX(-280px); padding: 0; opacity: 0; pointer-events: none; }
        
        .user-msg { align-self: flex-end; background: var(--user-msg); padding: 12px 16px; border-radius: 18px 18px 2px 18px; max-width: 85%; font-size: 14px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .ai-msg { align-self: flex-start; padding: 12px; max-width: 90%; margin-bottom: 20px; }
        
        .thinking-dot { animation: pulse 1.5s infinite; color: var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .active-chat { border-left: 3px solid var(--accent) !important; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-[var(--card)] p-8 rounded-3xl border border-white/5 w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold font-magic text-[var(--accent)] mb-6">🧞 ALADDIN v3.0</h2>
            <div id="email-step">
                <input type="email" id="auth-email" placeholder="Enter Email" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[var(--accent)]">
                <button onclick="sendOTP()" class="w-full bg-white text-black font-bold py-3 rounded-xl">Unlock Lamp</button>
            </div>
            <div id="otp-step" class="hidden">
                <input type="text" id="auth-otp" placeholder="Magic Code" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 text-center tracking-widest outline-none">
                <button onclick="verifyOTP()" class="w-full bg-[var(--accent)] text-white font-bold py-3 rounded-xl">Verify Wish</button>
            </div>
            <div id="profile-step" class="hidden">
                <input type="text" id="user-name" placeholder="Your Name" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 outline-none">
                <button onclick="saveProfile()" class="w-full bg-white text-black font-bold py-3 rounded-xl">Save Profile</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-[var(--sidebar)] border-r border-white/5 flex flex-col p-5 shrink-0">
        <div class="flex items-center gap-3 font-magic font-bold text-lg text-[var(--accent)] mb-8">
            <span class="text-2xl">🧞</span> ALADDIN
        </div>

        <button onclick="createNewChat()" class="w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 text-sm mb-6 hover:bg-white/10 transition">
            <span>+ New chat</span>
            <kbd class="text-[10px] opacity-40">Ctrl K</kbd>
        </button>

        <div class="flex-1 overflow-y-auto custom-scrollbar space-y-6">
            <div>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4 px-2">🧭 Core Options</p>
                <div class="space-y-1">
                    <div onclick="createNewChat()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm"><span>✨</span> New Conversation</div>
                    <div onclick="focusSearch()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm"><span>🔍</span> Search chats</div>
                    <div onclick="activateCodex()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm font-bold text-[var(--accent)]"><span>💻</span> Codex AI</div>
                </div>
            </div>

            <div>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4 px-2">📁 Projects</p>
                <div onclick="alert('Project created!')" class="p-3 border-2 border-dashed border-white/5 rounded-xl text-center text-xs opacity-40 hover:opacity-100 cursor-pointer">+ New project</div>
            </div>

            <div>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4 px-2">🕘 Recents</p>
                <div id="chat-list" class="space-y-2"></div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex justify-between mb-4 px-2">
                <div onclick="setTheme('purple')" class="w-4 h-4 rounded-full bg-purple-500 cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('gold')" class="w-4 h-4 rounded-full bg-yellow-500 cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('blue')" class="w-4 h-4 rounded-full bg-blue-500 cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('green')" class="w-4 h-4 rounded-full bg-green-500 cursor-pointer hover:scale-125 transition"></div>
                <div onclick="setTheme('light')" class="w-4 h-4 rounded-full bg-white border border-gray-300 cursor-pointer hover:scale-125 transition"></div>
            </div>
            <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl relative group cursor-pointer">
                <input type="file" id="pfp-input" class="hidden" onchange="updatePFP(this)">
                <div onclick="document.getElementById('pfp-input').click()" class="w-9 h-9 rounded-full bg-[var(--accent)] overflow-hidden flex items-center justify-center text-white font-bold" id="user-avatar">
                    <img id="pfp-img" class="w-full h-full object-cover hidden">
                    <span id="pfp-initial">M</span>
                </div>
                <div class="text-xs truncate">
                    <p id="profile-name" class="font-bold">Master</p>
                    <button onclick="logout()" class="text-[10px] text-red-500 opacity-0 group-hover:opacity-100 transition">Logout Session</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        <header class="h-16 border-b border-white/5 flex items-center px-6 bg-[var(--bg)]/80 backdrop-blur-md z-40 sticky top-0">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-xl mr-4">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex-1 flex justify-center">
                <div class="flex bg-black/30 p-1 rounded-xl border border-white/5 text-[10px]">
                    <button onclick="setBrain('Basic', this)" class="brain-tab px-4 py-1.5 rounded-lg bg-[var(--accent)] text-white">Basic</button>
                    <button onclick="setBrain('Pro', this)" class="brain-tab px-4 py-1.5 rounded-lg">Pro</button>
                    <button onclick="setBrain('Ultra', this)" class="brain-tab px-4 py-1.5 rounded-lg">Cherag Pro</button>
                </div>
            </div>
            <div id="greeting-box" class="text-[10px] font-bold text-[var(--accent)] hidden md:block"></div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div id="messages" class="max-w-3xl mx-auto flex flex-col">
                <div id="welcome-box" class="py-20 text-center">
                    <h1 class="text-4xl font-magic font-bold text-[var(--accent)] mb-4">ALADDIN LEGEND</h1>
                    <p class="text-sm opacity-40">Your authentic professional AI assistant.</p>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-8 bg-gradient-to-t from-[var(--bg)] to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div id="file-preview-tray" class="flex gap-2 mb-2"></div>
                <div class="bg-[var(--card)] border border-white/10 rounded-3xl p-2 shadow-2xl focus-within:border-[var(--accent)] transition">
                    <div class="flex items-end gap-2 px-2">
                        <button onclick="document.getElementById('file-upload').click()" class="p-3 text-gray-400 hover:text-[var(--accent)]">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                        </button>
                        <input type="file" id="file-upload" class="hidden" multiple onchange="handleFileSelection(this)">
                        
                        <textarea id="user-input" rows="1" placeholder="Ask Aladdin anything..." 
                            class="flex-1 bg-transparent py-3 outline-none resize-none text-sm max-h-48"></textarea>
                        
                        <button onclick="handleSendMessage()" class="p-3 bg-[var(--accent)] text-white rounded-2xl hover:scale-105 transition">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GROQ_API = "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";
        let chats = JSON.parse(localStorage.getItem('al_history_v3')) || [];
        let activeId = null;
        let selectedBrain = "Basic";
        let currentFiles = [];

        // 1. Initialization
        window.onload = () => {
            emailjs.init("5IDeLAjB6gy610xIB");
            if(localStorage.getItem('al_logged') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                loadProfile();
                setTheme(localStorage.getItem('al_theme') || 'purple');
                if(chats.length > 0) loadChat(chats[0].id); else createNewChat();
            }
            updateGreeting();
        };

        // 2. Profile & Theme Logic
        function loadProfile() {
            const p = JSON.parse(localStorage.getItem('al_profile'));
            if(!p) return;
            document.getElementById('profile-name').innerText = p.name;
            document.getElementById('pfp-initial').innerText = p.name[0];
            if(p.pfp) {
                document.getElementById('pfp-img').src = p.pfp;
                document.getElementById('pfp-img').classList.remove('hidden');
                document.getElementById('pfp-initial').classList.add('hidden');
            }
        }

        function updatePFP(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const p = JSON.parse(localStorage.getItem('al_profile'));
                p.pfp = e.target.result;
                localStorage.setItem('al_profile', JSON.stringify(p));
                loadProfile();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function setTheme(t) {
            document.body.className = "flex h-screen overflow-hidden theme-" + t;
            localStorage.setItem('al_theme', t);
        }

        // 3. Sidebar & Chat History
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({id, title: "New Conversation", messages: []});
            activeId = id;
            save(); renderHistory(); renderMessages();
        }

        function loadChat(id) {
            activeId = id;
            renderHistory();
            renderMessages();
        }

        function renderHistory() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="loadChat(${c.id})" class="p-3 rounded-xl cursor-pointer text-xs truncate transition border border-transparent ${c.id === activeId ? 'active-chat' : 'hover:bg-white/5'}">
                    <span>💬 ${c.title}</span>
                </div>
            `).join('');
        }

        // 4. Message Handling
        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && currentFiles.length === 0) return;

            const chat = chats.find(c => c.id === activeId);
            if(chat.messages.length === 0 && text) chat.title = text.substring(0, 25);

            // Add User Msg
            const userMsg = { role: 'user', content: text, files: [...currentFiles] };
            chat.messages.push(userMsg);
            renderMessages();

            input.value = "";
            const filesToSend = [...currentFiles];
            currentFiles = [];
            document.getElementById('file-preview-tray').innerHTML = "";
            document.getElementById('welcome-box').style.display = 'none';

            // AI Thinking State
            const aiDiv = addMessageUI('assistant', '<span class="thinking-dot">Thinking and processing wishes...</span>');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: selectedBrain === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: `You are Aladdin AI Legend. Professional, authentic, and helpful. Always give professional advice/tips based on the chat context at the end. Final sentence must be: "Do you need anything else? I am Aladdin, right by your side."`},
                            ...chat.messages.map(m => ({role: m.role, content: m.content}))
                        ],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                aiDiv.innerHTML = marked.parse(reply);
                chat.messages.push({ role: 'assistant', content: reply });
                save();
            } catch (e) { aiDiv.innerHTML = "Error connecting to the lamp. Try again."; }
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === activeId);
            const container = document.getElementById('messages');
            container.innerHTML = "";
            document.getElementById('welcome-box').style.display = chat.messages.length ? 'none' : 'block';
            chat.messages.forEach(m => addMessageUI(m.role, m.content, m.files));
            container.parentElement.scrollTo(0, container.parentElement.scrollHeight);
        }

        function addMessageUI(role, content, files = []) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            const fileHtml = files.map(f => `<div class="text-[10px] bg-[var(--accent)]/10 p-2 rounded-lg mt-2">📄 ${f.name}</div>`).join('');
            
            div.innerHTML = `
                <div class="text-[10px] opacity-30 font-bold mb-1 uppercase">${role === 'user' ? 'Master' : 'Aladdin AI'}</div>
                <div class="prose prose-sm prose-invert max-w-none">${marked.parse(content || "")}</div>
                ${fileHtml}
            `;
            document.getElementById('messages').appendChild(div);
            return div.querySelector('.prose');
        }

        // 5. Utility Functions
        function handleFileSelection(input) {
            Array.from(input.files).forEach(f => {
                currentFiles.push({name: f.name});
                const pill = document.createElement('div');
                pill.className = "text-[10px] bg-[var(--accent)] text-white px-3 py-1 rounded-full";
                pill.innerText = f.name.substring(0,10);
                document.getElementById('file-preview-tray').appendChild(pill);
            });
        }

        function setBrain(type, el) {
            selectedBrain = type;
            document.querySelectorAll('.brain-tab').forEach(t => t.classList.remove('bg-[var(--accent)]', 'text-white'));
            el.classList.add('bg-[var(--accent)]', 'text-white');
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            const greet = hour < 12 ? "Good Morning" : hour < 17 ? "Good Afternoon" : "Good Evening";
            document.getElementById('greeting-box').innerText = `✨ ${greet}, Master`;
        }

        function save() { localStorage.setItem('al_history_v3', JSON.stringify(chats)); }
        function logout() { localStorage.clear(); location.reload(); }
        function activateCodex() { alert("Codex AI Mode: Optimized for clean code & debugging."); }
        function focusSearch() { alert("Type to filter through your magic conversation history."); }

        // Auth Logic (Untouched OTP Logic)
        function sendOTP() { document.getElementById('email-step').classList.add('hidden'); document.getElementById('otp-step').classList.remove('hidden'); }
        function verifyOTP() { document.getElementById('otp-step').classList.add('hidden'); document.getElementById('profile-step').classList.remove('hidden'); }
        function saveProfile() {
            const name = document.getElementById('user-name').value || "Master";
            localStorage.setItem('al_profile', JSON.stringify({name, pfp: null}));
            localStorage.setItem('al_logged', 'true');
            location.reload();
        }
    </script>
</body>
</html>
