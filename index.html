<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Legend Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --bg: #09090b;
            --sidebar: #000000;
            --card: #18181b;
            --text: #f4f4f5;
            --gold: #e2b714;
            --accent: #27272a;
        }
        .light-theme {
            --bg: #ffffff;
            --sidebar: #f4f4f5;
            --card: #ffffff;
            --text: #09090b;
            --gold: #b38a3d;
            --accent: #e4e4e7;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin:0; transition: 0.3s; overflow: hidden; }
        .font-magic { font-family: 'Cinzel', serif; }
        .genie-glow { filter: drop-shadow(0 0 10px var(--gold)); }
        
        #auth-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(12px); }
        .auth-card { background: var(--card); padding: 2.5rem; border-radius: 20px; border: 1px solid var(--accent); width: 100%; max-width: 400px; text-align: center; }

        .sidebar-item { cursor: pointer; padding: 10px; border-radius: 8px; margin-bottom: 4px; transition: 0.2s; font-size: 14px; display: flex; align-items: center; justify-content: space-between; color: var(--text); }
        .sidebar-item:hover { background: var(--accent); }
        .active-chat { background: var(--accent); border-left: 3px solid var(--gold); }

        .msg-bubble { margin-bottom: 24px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .prose pre { background: #000 !important; padding: 12px; border-radius: 8px; margin: 8px 0; overflow-x: auto; }
        
        .cursor { display: inline-block; width: 8px; height: 18px; background: var(--gold); animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <div id="auth-overlay">
        <div class="auth-card" id="email-step">
            <div class="text-6xl mb-4 genie-glow">🧞</div>
            <h2 class="text-2xl font-bold mb-1 font-magic text-gold">ALADDIN AI</h2>
            <p class="text-xs text-gray-500 mb-6 uppercase tracking-widest">Premium Intelligence</p>
            <input type="email" id="auth-email" placeholder="Enter your email" class="w-full bg-black/20 border border-accent p-3 rounded-lg mb-4 outline-none focus:border-gold text-center">
            <button onclick="sendOTP()" id="otp-btn" class="w-full bg-white text-black font-bold py-3 rounded-lg hover:bg-gold transition transform active:scale-95">Send Magic Code</button>
        </div>

        <div class="auth-card hidden" id="otp-step">
            <h2 class="text-xl font-bold mb-4 font-magic">Verification</h2>
            <input type="text" id="auth-otp" placeholder="Enter Code" maxlength="6" class="w-full text-center text-2xl bg-black/20 border border-accent p-3 rounded-lg mb-4 outline-none focus:border-gold tracking-[0.5em]">
            <button onclick="verifyOTP()" class="w-full bg-gold text-black font-bold py-3 rounded-lg">Enter the Lamp</button>
        </div>

        <div class="auth-card hidden" id="profile-step">
            <h2 class="text-xl font-bold mb-6 font-magic">Master Setup</h2>
            <input type="text" id="user-name" placeholder="Full Name" class="w-full bg-black/20 border border-accent p-3 rounded-lg mb-3 outline-none focus:border-gold">
            <input type="number" id="user-age" placeholder="Age" class="w-full bg-black/20 border border-accent p-3 rounded-lg mb-6 outline-none focus:border-gold">
            <button onclick="saveProfile()" class="w-full bg-gold text-black font-bold py-3 rounded-lg">Finish Setup</button>
        </div>
    </div>

    <aside id="sidebar" class="w-[260px] bg-[var(--sidebar)] border-r border-accent flex flex-col p-3">
        <button onclick="createNewChat()" class="flex items-center gap-3 border border-accent p-3 rounded-lg hover:bg-accent transition mb-6 font-medium text-sm">
            <span class="text-lg">+</span> New Chat
        </button>
        
        <div id="chat-list" class="flex-1 overflow-y-auto custom-scrollbar"></div>

        <div class="pt-4 border-t border-accent space-y-2">
            <button onclick="toggleTheme()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-accent text-sm">🌙 Theme</button>
            <button onclick="logout()" class="w-full flex items-center gap-3 p-2 rounded-lg hover:bg-red-900/10 text-red-500 text-sm">🚪 Logout</button>
            
            <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl mt-2 border border-accent">
                <div class="w-8 h-8 bg-gold rounded flex items-center justify-center font-bold text-black text-sm" id="user-initial">U</div>
                <div class="text-xs truncate">
                    <p class="font-bold" id="profile-display-name">Master</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden relative">
        <header class="p-4 border-b border-accent flex justify-between items-center bg-[var(--bg)]/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧞</span>
                <span class="font-bold text-gold font-magic tracking-widest">ALADDIN v3.0</span>
            </div>
            <div id="greeting-badge" class="text-[10px] px-3 py-1 rounded-full border border-gold/30 text-gold font-bold bg-gold/5 uppercase"></div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto custom-scrollbar">
            <div id="messages" class="max-w-3xl mx-auto p-6 space-y-10"></div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent">
            <div class="max-w-3xl mx-auto relative group">
                <input type="file" id="file-upload" class="hidden" multiple onchange="handleFileUpload(this)">
                
                <textarea id="user-input" rows="1" placeholder="Type a message..." 
                    class="w-full bg-[var(--card)] border border-accent rounded-2xl py-4 px-14 outline-none focus:border-gold transition-all shadow-xl resize-none max-h-40"></textarea>
                
                <button onclick="document.getElementById('file-upload').click()" class="absolute left-4 bottom-3.5 p-1 text-gray-500 hover:text-gold transition">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 0 1 5 0v10.5c0 .28-.22.5-.5.5s-.5-.22-.5-.5V6H10v9.5a2.5 2.5 0 0 0 5 0V5a4.5 4.5 0 0 0-9 0v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"></path></svg>
                </button>
                
                <button onclick="handleSendMessage()" class="absolute right-4 bottom-3.5 p-1 bg-gold rounded-lg text-black hover:scale-105 active:scale-95 transition-all shadow-lg">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // 🚀 CONFIRMED: YOUR REAL API KEYS
        const GROQ_KEY = "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";
        const EMAILJS_KEYS = {
            service_id: "service_d7q8v4o",
            template_id: "template_9nrhdsl",
            public_key: "5IDeLAjB6gy610xIB"
        };

        let chats = JSON.parse(localStorage.getItem('aladdin_chats')) || [];
        let currentChatId = null;
        let currentOTP = "";

        // INITIALIZE
        (function() { emailjs.init(EMAILJS_KEYS.public_key); })();

        window.onload = () => {
            // FIXED: Persistent Login Check
            if(localStorage.getItem('aladdin_logged_in') === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                initApp();
            }
            updateGreeting();
        };

        // 1. FIXED EMAIL OTP SYSTEM (Correct Variable {{email}})
        async function sendOTP() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Invalid email!");
            
            currentOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('otp-btn');
            btn.innerText = "Sending..."; btn.disabled = true;

            try {
                // FIXED: Using 'email' variable as per your EmailJS dashboard
                await emailjs.send(EMAILJS_KEYS.service_id, EMAILJS_KEYS.template_id, {
                    email: email, 
                    otp: currentOTP
                });
                
                alert("Magic code sent to your email!");
                document.getElementById('email-step').classList.add('hidden');
                document.getElementById('otp-step').classList.remove('hidden');
            } catch (err) {
                alert("Magic failed. Ensure EmailJS keys are correct.");
                console.error(err);
            } finally {
                btn.innerText = "Send Magic Code"; btn.disabled = false;
            }
        }

        function verifyOTP() {
            if(document.getElementById('auth-otp').value === currentOTP) {
                document.getElementById('otp-step').classList.add('hidden');
                document.getElementById('profile-step').classList.remove('hidden');
            } else {
                alert("Wrong code! Real magic only.");
            }
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value || "Master";
            const age = document.getElementById('user-age').value || "20";
            localStorage.setItem('user_profile', JSON.stringify({ name, age }));
            localStorage.setItem('aladdin_logged_in', 'true'); // Fix: No auto logout
            location.reload();
        }

        function logout() {
            localStorage.removeItem('aladdin_logged_in');
            location.reload();
        }

        // 2. CHATGPT-STYLE GREETINGS & PANEL
        function updateGreeting() {
            const profile = JSON.parse(localStorage.getItem('user_profile'));
            if(!profile) return;
            
            const hours = new Date().getHours();
            const badge = document.getElementById('greeting-badge');
            
            const greetMsg = hours < 12 ? "Good Morning" : hours < 17 ? "Good Afternoon" : "Good Evening";
            const localGreetings = ["স্বাগতম", "Welcome", "The Lamp is Active"];
            const randomExtra = localGreetings[Math.floor(Math.random() * localGreetings.length)];
            
            badge.innerHTML = `✨ ${greetMsg}, ${profile.name} | ${randomExtra}`;
        }

        function initApp() {
            const profile = JSON.parse(localStorage.getItem('user_profile'));
            document.getElementById('profile-display-name').innerText = profile.name;
            document.getElementById('user-initial').innerText = profile.name[0].toUpperCase();
            
            if(chats.length === 0) createNewChat();
            else renderChat(chats[0].id);
            renderSidebar();
        }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({ id, title: "New Wish", messages: [] });
            saveData(); renderSidebar(); renderChat(id);
        }

        function renderSidebar() {
            document.getElementById('chat-list').innerHTML = chats.map(chat => `
                <div class="sidebar-item ${chat.id === currentChatId ? 'active-chat' : ''}" onclick="renderChat(${chat.id})">
                    <span class="truncate">💬 ${chat.title}</span>
                    <span onclick="deleteChat(event, ${chat.id})" class="opacity-30 hover:opacity-100">×</span>
                </div>
            `).join('');
        }

        function renderChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            const area = document.getElementById('messages');
            area.innerHTML = "";
            
            if(chat.messages.length === 0) {
                area.innerHTML = `<div class="text-center mt-20 opacity-40">
                    <h1 class="text-3xl font-magic text-gold">Aladdin Legend 3.0</h1>
                    <p>I can understand Bangla, English and anything you wish.</p>
                </div>`;
            } else {
                chat.messages.forEach(m => addMsgUI(m.role, m.content, false));
            }
            renderSidebar();
        }

        function addMsgUI(role, content, streaming) {
            const div = document.createElement('div');
            div.className = `msg-bubble flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            const avatar = role === 'ai' ? '🧞' : '👤';
            div.innerHTML = `
                <div class="w-8 h-8 rounded bg-accent flex items-center justify-center text-sm">${avatar}</div>
                <div class="flex-1 text-sm leading-relaxed prose prose-invert max-w-full">
                    <div class="content-body">${streaming ? content : marked.parse(content)}</div>
                    ${streaming ? '<span class="cursor"></span>' : ''}
                </div>
            `;
            document.getElementById('messages').appendChild(div);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            return div.querySelector('.content-body');
        }

        // 3. LEGEND BRAIN STREAMING
        async function handleSendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text) return;

            const chat = chats.find(c => c.id === currentChatId);
            if(chat.messages.length === 0) chat.title = text.substring(0, 30);

            addMsgUI('user', text, false);
            chat.messages.push({role: 'user', content: text});
            input.value = '';

            const streamBox = addMsgUI('ai', '', true);
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "You are Aladdin AI v3.0, a legendary assistant. You understand Bangla & English perfectly. Answer like ChatGPT Pro."}, ...chat.messages],
                        stream: true
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for (const line of lines) {
                        if (line.startsWith("data: ") && line !== "data: [DONE]") {
                            const data = JSON.parse(line.substring(6));
                            fullText += data.choices[0].delta.content || "";
                            streamBox.innerHTML = marked.parse(fullText);
                        }
                    }
                }
                streamBox.nextElementSibling.remove();
                chat.messages.push({role: 'assistant', content: fullText});
                saveData();
            } catch (err) { streamBox.innerHTML = "Lamp Error. Check Connection."; }
        }

        function saveData() { localStorage.setItem('aladdin_chats', JSON.stringify(chats)); }
        function deleteChat(e, id) { e.stopPropagation(); chats = chats.filter(c => c.id !== id); saveData(); initApp(); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); }
        function handleFileUpload(input) { alert(input.files.length + " file(s) ready to process."); }

        document.getElementById('user-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
        });
    </script>
</body>
</html>
