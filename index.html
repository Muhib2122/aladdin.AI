<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aladdin AI 🧞</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>

<style>
    /* Claude's Full CSS Logic (Minimal set here for brevity, use your full CSS from index 7) */
    body { font-family: 'Inter', sans-serif; background: #212121; color: #ececec; overflow: hidden; }
    #auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #212121; }
    .auth-card { width: 380px; background: #2f2f2f; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 40px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); text-align: center; }
    .auth-input { width: 100%; padding: 12px; background: #3a3a3a; border: 1px solid #444; border-radius: 8px; color: #fff; margin-bottom: 15px; outline: none; }
    .auth-btn { width: 100%; padding: 12px; background: #10a37f; border: none; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer; }
    .hidden { display: none; }
    /* Your existing CSS... */
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 20px;">Aladdin AI 🧞</h2>
    <div id="auth-s1">
      <input type="text" id="a-name" class="auth-input" placeholder="Your Name">
      <input type="email" id="a-email" class="auth-input" placeholder="Email Address">
      <button class="auth-btn" id="a-send-btn" onclick="authSend()">Send Code</button>
    </div>
    <div id="auth-s2" class="hidden">
      <p style="font-size: 0.8rem; color: #8e8ea0; margin-bottom: 15px;">Enter the code from your inbox.</p>
      <input type="number" id="a-otp" class="auth-input" placeholder="000000" style="text-align: center; letter-spacing: 4px;">
      <button class="auth-btn" id="a-verify-btn" onclick="verifyOtp()">Verify & Enter</button>
    </div>
  </div>
</div>

<div id="app" class="hidden" style="display: flex; height: 100vh;">
    <div style="flex:1; display:flex; flex-direction:column;">
        <div id="chat-area" style="flex:1; overflow-y:auto; padding:20px;">
            <div id="chat-inner" style="max-width:768px; margin:0 auto;"></div>
        </div>
        <div class="input-container" style="padding:20px; background:#212121;">
            <div style="max-width:768px; margin:0 auto; background:#2f2f2f; border-radius:12px; padding:10px;">
                <textarea id="chat-ta" placeholder="Message Aladdin..." style="width:100%; background:transparent; border:none; color:#fff; outline:none; resize:none;"></textarea>
                <button onclick="doSend()" id="send-btn" style="float:right; background:#10a37f; color:#fff; padding:5px 15px; border-radius:6px; border:none; cursor:pointer;">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════ 
   CRITICAL CONFIGS
═══════════════════════════════════════════════════════════ */
const EJS_SVC = "service_d7q8v4o";
const EJS_TPL = "template_9nrhdsl";
const EJS_KEY = "5IDeLAjB6gy610xIB"; // Public Key
const GROQ_KEY = "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";

// Modern SDK Initialization
emailjs.init(EJS_KEY);

let pendingOTP = "";
let appUser = null;
let chatHistory = [];

/* ═══════════════════════════════════════════════════════════ 
   LOGIN LOGIC (FIXED)
═══════════════════════════════════════════════════════════ */
async function authSend() {
    const name = document.getElementById('a-name').value;
    const email = document.getElementById('a-email').value;
    
    if(!email.includes('@')) return alert("Valid email dorkar!");

    const btn = document.getElementById('a-send-btn');
    btn.disabled = true;
    btn.innerText = "Sending...";

    pendingOTP = Math.floor(100000 + Math.random() * 900000).toString();

    try {
        // THE FIX: Explicitly passing Public Key (4th parameter)
        await emailjs.send(EJS_SVC, EJS_TPL, {
            to_name: name,
            email: email,
            otp: pendingOTP
        }, EJS_KEY); 

        document.getElementById('auth-s1').classList.add('hidden');
        document.getElementById('auth-s2').classList.remove('hidden');
        console.log("OTP sent successfully");
    } catch (err) {
        console.error("EmailJS Error:", err);
        alert("Login failed! Dashboard check koren ba Public Key thik ashe naki dekhun.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Send Code";
    }
}

function verifyOtp() {
    const val = document.getElementById('a-otp').value;
    if(val === pendingOTP) {
        localStorage.setItem("aladdin_verified", "true");
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    } else {
        alert("Code mile nai Master!");
    }
}

/* ═══════════════════════════════════════════════════════════ 
   GROQ LOGIC (PAYLOAD FIX)
═══════════════════════════════════════════════════════════ */
async function doSend() {
    const ta = document.getElementById('chat-ta');
    const text = ta.value.trim();
    if(!text) return;

    // UI Update
    appendUI('user', text);
    ta.value = "";
    
    const userMsg = { role: 'user', content: text };
    chatHistory.push(userMsg);

    try {
        // Payload Cleaning to prevent 400 error
        const cleanMessages = chatHistory.map(m => ({
            role: m.role,
            content: m.content
        }));

        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Authorization": "Bearer " + GROQ_KEY,
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: cleanMessages,
                temperature: 0.7
            })
        });

        const data = await res.json();
        const aiText = data.choices[0].message.content;
        
        chatHistory.push({ role: 'assistant', content: aiText });
        appendUI('assistant', aiText);

    } catch (e) {
        console.error(e);
        appendUI('assistant', "Error connecting to Groq Lamp.");
    }
}

function appendUI(role, text) {
    const inner = document.getElementById('chat-inner');
    const div = document.createElement('div');
    div.style.padding = "15px";
    div.style.background = role === 'user' ? "rgba(255,255,255,0.05)" : "transparent";
    div.innerHTML = `<strong>${role === 'user' ? 'You' : 'Aladdin'}:</strong> <p>${text}</p>`;
    inner.appendChild(div);
    document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
}

window.onload = () => {
    if(localStorage.getItem("aladdin_verified") === "true") {
        document.getElementById("auth-screen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
    }
};
</script>
</body>
</html>
