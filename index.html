<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI 🧞 | Your Digital Genius</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.js"></script>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #ffce00;
            --bg-dark: #0f0f13;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --sidebar-width: 300px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f13);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Authentication Screen --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0f0f13;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: var(--transition);
        }

        .auth-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .auth-logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
        }

        .auth-card h1 {
            font-family: 'Poppins', sans-serif;
            margin-bottom: 0.5rem;
            color: var(--secondary);
        }

        .input-group {
            margin-top: 1.5rem;
            text-align: left;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            outline: none;
            margin-top: 8px;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255,255,255,0.12);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #6a1b9a);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            margin-top: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        /* --- Main Layout --- */
        #app-container {
            display: none; /* Shown after auth */
            width: 100%;
            height: 100vh;
        }

        /* Sidebar */
        aside {
            width: var(--sidebar-width);
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 900;
        }

        .sidebar-header {
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .history-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .history-item {
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.9rem;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--glass);
            border-color: var(--glass-border);
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--glass-border);
        }

        /* Main Chat */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: rgba(15, 15, 19, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 2px;
        }

        /* Profile & Settings Drawer */
        .profile-btn {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            overflow: hidden;
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Input Area */
        .input-wrapper {
            padding: 1.5rem 2rem;
            background: linear-gradient(to top, #0f0f13, transparent);
        }

        .input-box {
            max-width: 900px;
            margin: 0 auto;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 15px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            resize: none;
            padding: 10px 0;
            max-height: 200px;
            font-size: 1rem;
            color: white;
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            background: var(--glass);
            color: var(--secondary);
        }

        /* Image Preview */
        #image-preview-container {
            display: none;
            padding: 10px;
            position: relative;
        }

        .preview-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        /* Responsive Sidebar Logic */
        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            aside {
                position: fixed;
                left: -100%;
                height: 100%;
                background: #15151e;
            }
            aside.open { left: 0; }
            .mobile-toggle { display: block; }
            .chat-container { padding: 1rem; }
            .message { max-width: 90%; }
        }

        /* Visuals */
        .gen-image {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid var(--glass-border);
        }

        .dual-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* Loading Spinner */
        .dots { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 8px; height: 8px; background: #888; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    </style>
</head>
<body>

    <!-- Authentication Screen -->
    <div id="auth-screen">
        <div class="auth-card" id="email-step">
            <span class="auth-logo">🧞</span>
            <h1>Aladdin AI</h1>
            <p>Your wish is my command.</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="auth-email" placeholder="master@agrabah.com">
            </div>
            <button class="btn-primary" onclick="sendOTP()">Request Entry</button>
        </div>

        <div class="auth-card" id="otp-step" style="display: none;">
            <span class="auth-logo">🧞</span>
            <h1>Verify Identity</h1>
            <p>Enter the secret code sent to your lamp.</p>
            <div class="input-group">
                <label>OTP Code</label>
                <input type="text" id="auth-otp" placeholder="6-digit code">
            </div>
            <button class="btn-primary" onclick="verifyOTP()">Unlock Lamp</button>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <span style="font-size: 1.5rem;">🧞</span>
                <h2 style="font-family: 'Poppins'; font-size: 1.2rem;">Aladdin AI</h2>
            </div>
            
            <div class="history-container" id="chat-history">
                <!-- History Items Inject Here -->
            </div>

            <div class="sidebar-footer">
                <select id="lang-select" onchange="updateLanguage()">
                    <option value="en">English</option>
                    <option value="bn">Bengali (বাংলা)</option>
                    <option value="hi">Hindi (हिन्दी)</option>
                    <option value="ar">Arabic (العربية)</option>
                    <option value="es">Spanish (Español)</option>
                </select>
                <button class="btn-primary" style="margin-top: 10px; background: var(--glass);" onclick="newChat()">+ New Chat</button>
            </div>
        </aside>

        <main>
            <header>
                <div class="mobile-toggle" onclick="toggleSidebar()">☰</div>
                <div id="greeting-text" style="font-weight: 600;">Good Morning, Master 🧞</div>
                <div class="profile-btn" onclick="toggleProfile()">
                    <div class="profile-img" id="user-avatar-display">A</div>
                </div>
            </header>

            <div class="chat-container" id="chat-box">
                <!-- Messages Inject Here -->
            </div>

            <div id="image-preview-container">
                <img src="" id="preview-img-tag" class="preview-img">
                <button onclick="clearImage()" style="position: absolute; top: 0; left: 50px; background: red; color: white; border: none; border-radius: 50%; width: 20px; cursor: pointer;">×</button>
            </div>

            <div class="input-wrapper">
                <div class="input-box">
                    <label class="action-btn" for="image-upload">
                        <input type="file" id="image-upload" hidden accept="image/*" onchange="handleImageSelection(event)">
                        📷
                    </label>
                    <textarea id="user-input" placeholder="Ask anything..." rows="1"></textarea>
                    <button class="action-btn" title="Summarization Mode" onclick="toggleSummarize()" id="sum-btn">📝</button>
                    <button class="action-btn" style="color: var(--primary); font-size: 1.5rem;" onclick="sendMessage()">✦</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" style="display:none; position: fixed; inset:0; background: rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
        <div class="auth-card">
            <h3>Profile Settings</h3>
            <div class="input-group">
                <label>Update Profile Pic</label>
                <input type="file" id="profile-upload" accept="image/*" onchange="updateProfilePic(event)">
            </div>
            <button class="btn-primary" onclick="toggleProfile()">Close</button>
        </div>
    </div>

    <script>
        // --- Configuration & Constants ---
        const GROQ_KEY = "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";
        const EMAILJS_CONFIG = {
            serviceID: "service_d7q8v4o",
            templateID: "template_9nrhdsl",
            publicKey: "5IDeLAjB6gy610xIB"
        };

        let state = {
            user: JSON.parse(localStorage.getItem('aladdin_user')) || null,
            history: JSON.parse(localStorage.getItem('aladdin_history')) || [],
            currentChatId: Date.now(),
            currentMessages: [],
            selectedImageBase64: null,
            isSummarizeMode: false,
            generatedOTP: null,
            language: 'en'
        };

        // --- Initialization ---
        window.onload = () => {
            emailjs.init(EMAILJS_CONFIG.publicKey);
            if(state.user) {
                showApp();
            }
            renderHistory();
            updateGreeting();
            autoResizeTextarea();
        };

        // --- Auth Logic ---
        function sendOTP() {
            const email = document.getElementById('auth-email').value;
            if(!email.includes('@')) return alert("Enter valid email");
            
            state.generatedOTP = Math.floor(100000 + Math.random() * 900000);
            
            emailjs.send(EMAILJS_CONFIG.serviceID, EMAILJS_CONFIG.templateID, {
                email: email,
                otp: state.generatedOTP
            }).then(() => {
                document.getElementById('email-step').style.display = 'none';
                document.getElementById('otp-step').style.display = 'block';
            }).catch(err => alert("EmailJS Error: " + err));
        }

        function verifyOTP() {
            const entered = document.getElementById('auth-otp').value;
            if(entered == state.generatedOTP) {
                state.user = { email: document.getElementById('auth-email').value, avatar: null };
                localStorage.setItem('aladdin_user', JSON.stringify(state.user));
                showApp();
            } else {
                alert("Incorrect Code!");
            }
        }

        function showApp() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                if(state.user.avatar) {
                    document.getElementById('user-avatar-display').innerHTML = `<img src="${state.user.avatar}">`;
                }
            }, 300);
        }

        // --- Chat & AI Logic ---
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            const imgBase64 = state.selectedImageBase64;

            if(!text && !imgBase64) return;

            // 1. Add User Message to UI
            addMessage('user', text, imgBase64);
            inputField.value = '';
            clearImage();

            // 2. Logic Triggers
            if(isImageRequest(text)) {
                return generateImages(text);
            }

            // 3. AI Processing
            const aiMsgId = addMessage('ai', '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>');
            
            try {
                const response = await callGroq(text, imgBase64);
                updateMessage(aiMsgId, response + "\n\nAladdin is right by your side. 🧞");
                saveChat();
            } catch (e) {
                updateMessage(aiMsgId, "The lamp is flickering... please try again. 🧞");
            }
        }

        async function callGroq(text, base64) {
            const isVision = base64 != null;
            const model = isVision ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
            
            let systemPrompt = `You are Aladdin AI, a helpful and premium digital genius. 
                                Default language: ${state.language}. 
                                Always end with "Aladdin is right by your side. 🧞"`;
            
            if(state.isSummarizeMode) {
                systemPrompt += " CONCISE MODE: Summarize the following input as briefly as possible.";
            }

            const messages = [
                { role: "system", content: systemPrompt },
                ...state.currentMessages.slice(-5).map(m => ({ role: m.role, content: m.content }))
            ];

            if(isVision) {
                messages.push({
                    role: "user",
                    content: [
                        { type: "text", text: text || "Describe this image." },
                        { type: "image_url", image_url: { url: base64 } }
                    ]
                });
            } else {
                messages.push({ role: "user", content: text });
            }

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ model, messages, temperature: 0.7 })
            });

            const data = await res.json();
            return data.choices[0].message.content;
        }

        // --- Image Generation (Pollinations) ---
        function isImageRequest(text) {
            const keywords = ['create image', 'draw', 'generate photo', 'ছবি বানাও', 'চিত্র', 'imagen', 'pintar'];
            return keywords.some(k => text.toLowerCase().includes(k));
        }

        function generateImages(prompt) {
            const aiMsgId = addMessage('ai', `Summoning your visual desires... 🧞`);
            const seed1 = Math.floor(Math.random() * 100000);
            const seed2 = Math.floor(Math.random() * 100000);
            const cleanPrompt = encodeURIComponent(prompt.replace(/create image|draw|ছবি বানাও/gi, ''));
            
            const html = `
                <div class="dual-grid">
                    <img src="https://pollinations.ai/p/${cleanPrompt}?seed=${seed1}&width=1024&height=1024&nologo=true" class="gen-image" onload="this.style.opacity=1">
                    <img src="https://pollinations.ai/p/${cleanPrompt}?seed=${seed2}&width=1024&height=1024&nologo=true" class="gen-image" onload="this.style.opacity=1">
                </div>
                <p style="margin-top:10px">Your wishes have taken form. Aladdin is right by your side. 🧞</p>
            `;
            setTimeout(() => updateMessage(aiMsgId, html), 2000);
        }

        // --- UI Utilities ---
        function addMessage(role, content, img = null) {
            const id = Date.now();
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `message ${role}-message`;
            div.id = `msg-${id}`;
            
            let html = '';
            if(img) html += `<img src="${img}" style="width:100%; border-radius:10px; margin-bottom:10px;">`;
            html += `<div>${content}</div>`;
            
            div.innerHTML = html;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;

            if(role !== 'ai' || !content.includes('dots')) {
                state.currentMessages.push({ role, content, img, id });
            }
            return id;
        }

        function updateMessage(id, content) {
            const el = document.getElementById(`msg-${id}`);
            if(el) {
                el.innerHTML = content.replace(/\n/g, '<br>');
                const msgObj = state.currentMessages.find(m => m.id === id);
                if(msgObj) msgObj.content = content;
                else state.currentMessages.push({role: 'ai', content, id});
            }
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        function handleImageSelection(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                state.selectedImageBase64 = event.target.result;
                document.getElementById('image-preview-container').style.display = 'block';
                document.getElementById('preview-img-tag').src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            state.selectedImageBase64 = null;
            document.getElementById('image-preview-container').style.display = 'none';
            document.getElementById('image-upload').value = '';
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let greet = "Good Evening";
            if(hour < 12) greet = "Good Morning";
            else if(hour < 17) greet = "Good Afternoon";
            document.getElementById('greeting-text').innerText = `${greet}, Master 🧞`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleSummarize() {
            state.isSummarizeMode = !state.isSummarizeMode;
            document.getElementById('sum-btn').style.color = state.isSummarizeMode ? 'var(--secondary)' : 'white';
        }

        function updateLanguage() {
            state.language = document.getElementById('lang-select').value;
        }

        // --- Persistence ---
        function saveChat() {
            if(state.currentMessages.length === 0) return;
            const existingIdx = state.history.findIndex(h => h.id === state.currentChatId);
            const chatSummary = {
                id: state.currentChatId,
                title: state.currentMessages[0].content.substring(0, 30) + "...",
                messages: state.currentMessages,
                date: new Date().toISOString()
            };

            if(existingIdx > -1) state.history[existingIdx] = chatSummary;
            else state.history.unshift(chatSummary);

            localStorage.setItem('aladdin_history', JSON.stringify(state.history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = state.history.map(chat => `
                <div class="history-item" onclick="loadChat(${chat.id})">
                    💬 ${chat.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            const chat = state.history.find(h => h.id === id);
            if(!chat) return;
            state.currentChatId = chat.id;
            state.currentMessages = chat.messages;
            document.getElementById('chat-box').innerHTML = '';
            chat.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `message ${m.role}-message`;
                div.innerHTML = (m.img ? `<img src="${m.img}" style="width:100%; border-radius:10px; margin-bottom:10px;">` : '') + m.content;
                document.getElementById('chat-box').appendChild(div);
            });
            if(window.innerWidth < 768) toggleSidebar();
        }

        function newChat() {
            state.currentChatId = Date.now();
            state.currentMessages = [];
            document.getElementById('chat-box').innerHTML = '';
            if(window.innerWidth < 768) toggleSidebar();
        }

        // --- Profile Management ---
        function toggleProfile() {
            const modal = document.getElementById('profile-modal');
            modal.style.display = (modal.style.display === 'none') ? 'flex' : 'none';
        }

        function updateProfilePic(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                state.user.avatar = event.target.result;
                localStorage.setItem('aladdin_user', JSON.stringify(state.user));
                document.getElementById('user-avatar-display').innerHTML = `<img src="${event.target.result}">`;
                alert("Profile Updated! 🧞");
            };
            reader.readAsDataURL(file);
        }

        function autoResizeTextarea() {
            const tx = document.getElementById('user-input');
            tx.addEventListener("input", function() {
                this.style.height = "auto";
                this.style.height = (this.scrollHeight) + "px";
            }, false);
        }

    </script>
</body>
</html>
