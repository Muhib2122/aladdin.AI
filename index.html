<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | The Legend Awakes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #10a37f; --bg: #0d0d0d; --sidebar: #000000; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: #e5e7eb; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Mobile UI Fixes */
        @media (max-width: 768px) {
            #sidebar { position: fixed; transform: translateX(-100%); z-index: 100; height: 100%; width: 85%; transition: 0.3s; }
            #sidebar.open { transform: translateX(0); }
        }

        /* ChatGPT Style Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Thinking Animation */
        .dots { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

        /* Pop-up Menu Fix */
        .bottom-menu { position: absolute; bottom: 70px; left: 10px; width: 200px; display: none; }
        .bottom-menu.active { display: block; }
    </style>
</head>
<body class="flex h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center p-6">
        <div class="w-full max-w-md space-y-6 text-center">
            <h1 class="text-5xl font-bold tracking-tighter text-white">🧞 ALADDIN v3.0</h1>
            <div id="step-1" class="space-y-4">
                <input type="text" id="user-name" placeholder="Full Name" class="w-full p-4 glass rounded-2xl outline-none focus:border-[var(--accent)]">
                <input type="text" id="user-country" placeholder="Country" class="w-full p-4 glass rounded-2xl outline-none focus:border-[var(--accent)]">
                <input type="email" id="user-email" placeholder="Email Address" class="w-full p-4 glass rounded-2xl outline-none focus:border-[var(--accent)]">
                <button onclick="sendOTP()" id="otp-btn" class="w-full py-4 bg-[var(--accent)] rounded-2xl font-bold hover:scale-95 transition">Send Magic Code</button>
            </div>
            <div id="step-2" class="hidden space-y-4">
                <input type="text" id="otp-input" placeholder="Enter 6-digit Code" class="w-full p-4 glass rounded-2xl text-center text-2xl tracking-widest outline-none">
                <button onclick="verifyOTP()" class="w-full py-4 bg-white text-black rounded-2xl font-bold">Login to Lamp</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="w-[280px] bg-[var(--sidebar)] flex flex-col p-4 border-r border-white/10">
        <button onclick="newChat()" class="flex items-center gap-3 p-4 glass rounded-xl hover:bg-white/5 transition mb-6">
            <span>➕</span> New Chat
        </button>
        
        <div id="chat-history" class="flex-1 overflow-y-auto space-y-2 text-sm text-gray-400">
            </div>

        <div class="pt-4 border-t border-white/10 space-y-4 relative">
            <div id="user-popup" class="bottom-menu glass rounded-xl p-2 animate-bounce-in">
                <button onclick="openSettings()" class="w-full text-left p-3 hover:bg-white/5 rounded-lg">⚙️ Settings</button>
                <button onclick="logout()" class="w-full text-left p-3 hover:bg-red-500/10 text-red-400 rounded-lg">🚪 Logout</button>
            </div>
            
            <div class="flex items-center justify-between">
                <div onclick="toggleUserMenu()" class="flex items-center gap-3 cursor-pointer p-2 hover:bg-white/5 rounded-xl transition">
                    <div class="w-10 h-10 rounded-full bg-gray-800 overflow-hidden relative">
                        <img id="pfp-display" class="w-full h-full object-cover hidden">
                        <input type="file" id="pfp-upload" class="absolute inset-0 opacity-0 cursor-pointer" onchange="uploadPFP(this)">
                    </div>
                    <div>
                        <p class="text-sm font-bold" id="nav-name">Master</p>
                        <p class="text-[10px] text-gray-500">Premium Account</p>
                    </div>
                </div>
                <div class="flex gap-1">
                    <div onclick="setTheme('green')" class="w-3 h-3 rounded-full bg-green-500 cursor-pointer"></div>
                    <div onclick="setTheme('blue')" class="w-3 h-3 rounded-full bg-blue-500 cursor-pointer"></div>
                    <div onclick="setTheme('red')" class="w-3 h-3 rounded-full bg-red-500 cursor-pointer"></div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <header class="p-4 glass md:hidden flex justify-between items-center">
            <button onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
            <span class="font-bold">ALADDIN v3.0</span>
            <div class="w-6"></div>
        </header>

        <div class="flex justify-center gap-2 p-4 text-[10px] font-bold uppercase tracking-widest">
            <button onclick="setLevel('Basic')" id="lvl-Basic" class="px-4 py-2 rounded-full border border-white/10 transition">Basic</button>
            <button onclick="setLevel('Pro')" id="lvl-Pro" class="px-4 py-2 rounded-full border border-white/10 transition">Pro</button>
            <button onclick="setLevel('Ultra')" id="lvl-Ultra" class="px-4 py-2 rounded-full border border-white/10 transition">Ultra</button>
            <button onclick="setLevel('Legend')" id="lvl-Legend" class="px-4 py-2 rounded-full border border-[var(--accent)] bg-[var(--accent)]/10">Legend</button>
        </div>

        <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-12 space-y-8">
            <div id="welcome-msg" class="h-full flex flex-col items-center justify-center text-center opacity-50">
                <span class="text-6xl mb-4">🧞</span>
                <h2 id="greet-text" class="text-2xl font-bold"></h2>
            </div>
            <div id="chat-flow" class="max-w-3xl mx-auto"></div>
        </div>

        <div class="p-4 md:p-10 bg-gradient-to-t from-[var(--bg)]">
            <div class="max-w-3xl mx-auto relative glass rounded-3xl p-2 border-white/10">
                <div id="file-preview" class="flex gap-2 p-2 hidden"></div>
                <div class="flex items-end gap-2 px-4 py-2">
                    <label class="p-2 cursor-pointer opacity-50 hover:opacity-100">
                        📎 <input type="file" id="file-input" class="hidden" multiple onchange="previewFiles(this)">
                    </label>
                    <textarea id="user-input" rows="1" placeholder="Ask Aladdin anything..." 
                              class="flex-1 bg-transparent border-none outline-none py-2 text-[16px] resize-none max-h-[200px]"></textarea>
                    <button id="send-btn" onclick="handleMagic()" class="p-2 bg-white text-black rounded-xl font-bold hover:scale-110 transition">
                        ➤
                    </button>
                </div>
            </div>
            <p class="text-[10px] text-center mt-4 opacity-30">Aladdin AI can make mistakes. Check important info.</p>
        </div>
    </main>

    <script>
        // Configuration
        const MAIL_KEYS = { service: "service_d7q8v4o", template: "template_9nrhdsl", public: "5IDeLAjB6gy610xIB" };
        const GROQ_KEY = "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";
        
        let currentOTP = null;
        let activeLevel = "Legend";
        let activeChatId = null;
        let chatLogs = JSON.parse(localStorage.getItem('aladdin_history')) || [];

        // --- Authentication ---
        window.onload = () => {
            emailjs.init(MAIL_KEYS.public);
            if(localStorage.getItem('auth_complete')) {
                document.getElementById('auth-screen').style.display = 'none';
                loadUserData();
            }
        };

        async function sendOTP() {
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const country = document.getElementById('user-country').value;
            
            if(!name || !email) return alert("Please fill all fields!");
            
            currentOTP = Math.floor(100000 + Math.random() * 900000);
            const btn = document.getElementById('otp-btn');
            btn.innerText = "Sending Code..."; btn.disabled = true;

            try {
                await emailjs.send(MAIL_KEYS.service, MAIL_KEYS.template, { 
                    email: email, 
                    user_name: name,
                    country: country,
                    otp: currentOTP 
                });
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            } catch(e) {
                alert("Email service error. Use '123456' for testing.");
                currentOTP = "123456";
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            }
        }

        function verifyOTP() {
            if(document.getElementById('otp-input').value == currentOTP) {
                localStorage.setItem('auth_complete', 'true');
                localStorage.setItem('user_name', document.getElementById('user-name').value);
                localStorage.setItem('user_country', document.getElementById('user-country').value);
                location.reload();
            } else alert("Wrong Code!");
        }

        // --- Core UI Logic ---
        function loadUserData() {
            const name = localStorage.getItem('user_name');
            document.getElementById('nav-name').innerText = name;
            document.getElementById('greet-text').innerText = getCustomGreeting(name);
            
            const pfp = localStorage.getItem('aladdin_pfp');
            if(pfp) {
                const img = document.getElementById('pfp-display');
                img.src = pfp; img.classList.remove('hidden');
            }
            renderHistory();
        }

        function getCustomGreeting(name) {
            const country = localStorage.getItem('user_country');
            const greetings = [
                `Welcome back, ${name}! Ready for some magic in ${country}? ✨`,
                `Assalamu Alaikum ${name}. How can the Legend assist you today? 🕊️`,
                `Greetings Master ${name}. The lamp is glowing! 🌟`,
                `Hey ${name}, let's build something extraordinary from ${country}! 💻`,
                `The Legend is online. Your command is my priority, ${name}. 🔥`
            ];
            // Added 100+ logic placeholder - can be expanded
            return greetings[Math.floor(Math.random() * greetings.length)];
        }

        async function handleMagic() {
            const input = document.getElementById('user-input');
            const prompt = input.value.trim();
            if(!prompt) return;

            if(!activeChatId) createChat(prompt);
            
            addMessage('user', prompt);
            input.value = ""; input.style.height = "auto";
            
            const aiMsgBox = addMessage('assistant', '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>');

            try {
                // Image Generation Logic (2 Images)
                if(prompt.toLowerCase().includes('create image') || prompt.toLowerCase().includes('ছবি')) {
                    const img1 = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()}`;
                    const img2 = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${Math.random()}`;
                    
                    const response = `I've generated two versions of your request:\n\n![Image 1](${img1})\n\n![Image 2](${img2})`;
                    aiMsgBox.innerHTML = marked.parse(response);
                    saveMessage('assistant', response);
                } else {
                    // Chat Response Logic
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            messages: [{role: "system", content: `You are Aladdin AI v3.0, a Premium Legend. Your thinking level is ${activeLevel}. Answer concisely and elegantly.`}, {role: "user", content: prompt}]
                        })
                    });
                    const data = await res.json();
                    const text = data.choices[0].message.content;
                    aiMsgBox.innerHTML = marked.parse(text);
                    saveMessage('assistant', text);
                }
            } catch(e) {
                aiMsgBox.innerHTML = "Error connecting to the lamp. Check internet connection.";
            }
            scroll();
        }

        // --- Helper Functions ---
        function addMessage(role, content) {
            document.getElementById('welcome-msg').classList.add('hidden');
            const div = document.createElement('div');
            div.className = `p-6 rounded-3xl ${role === 'user' ? 'bg-white/5 ml-auto max-w-[80%]' : 'mr-auto w-full border-b border-white/5'}`;
            div.innerHTML = `<div class="text-[10px] font-bold mb-2 opacity-40 uppercase">${role === 'assistant' ? '🧞 Aladdin AI' : '👤 You'}</div><div class="prose prose-invert max-w-none text-[15px]">${role === 'assistant' ? content : marked.parse(content)}</div>`;
            document.getElementById('chat-flow').appendChild(div);
            scroll();
            return div.querySelector('.prose');
        }

        function toggleUserMenu() { document.getElementById('user-popup').classList.toggle('active'); }
        function setLevel(l) { 
            activeLevel = l; 
            document.querySelectorAll('[id^="lvl-"]').forEach(b => b.classList.remove('bg-[var(--accent)]/10', 'border-[var(--accent)]'));
            document.getElementById(`lvl-${l}`).classList.add('bg-[var(--accent)]/10', 'border-[var(--accent)]');
        }
        function setTheme(c) { 
            const colors = { green: '#10a37f', blue: '#3b82f6', red: '#ef4444' };
            document.documentElement.style.setProperty('--accent', colors[c]);
        }
        function uploadPFP(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('aladdin_pfp', e.target.result);
                document.getElementById('pfp-display').src = e.target.result;
                document.getElementById('pfp-display').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
        function createChat(title) {
            activeChatId = Date.now();
            chatLogs.unshift({ id: activeChatId, title, messages: [] });
            renderHistory();
        }
        function saveMessage(role, content) {
            const chat = chatLogs.find(c => c.id === activeChatId);
            chat.messages.push({role, content});
            localStorage.setItem('aladdin_history', JSON.stringify(chatLogs));
        }
        function renderHistory() {
            document.getElementById('chat-history').innerHTML = chatLogs.map(c => `
                <div onclick="loadChat(${c.id})" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer truncate transition">
                    💬 ${c.title}
                </div>
            `).join('');
        }
        function scroll() { const c = document.getElementById('chat-container'); c.scrollTo(0, c.scrollHeight); }
        function logout() { localStorage.clear(); location.reload(); }
        function newChat() { location.reload(); }

        // Enter to Send Fix
        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleMagic();
            }
        });
    </script>
</body>
</html>
