<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.5 | Ultra Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Satoshi:wght@300;400;500;700;900&display=swap');

        :root {
            --bg-main: #0d0d0d; --bg-sidebar: #000000; --bg-card: #171717; --accent: #10a37f; --text: #ececf1; --border: rgba(255,255,255,0.08);
        }
        [data-theme="light"] { --bg-main: #ffffff; --bg-sidebar: #f9fafb; --bg-card: #f3f4f6; --accent: #10a37f; --text: #1f2937; --border: rgba(0,0,0,0.08); }
        [data-theme="blue"] { --bg-main: #020617; --bg-sidebar: #0f172a; --bg-card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        [data-theme="crimson"] { --bg-main: #1a0505; --bg-sidebar: #450a0a; --bg-card: #7f1d1d; --accent: #ef4444; --text: #fef2f2; }
        [data-theme="midnight"] { --bg-main: #000000; --bg-sidebar: #050505; --bg-card: #121212; --accent: #f59e0b; --text: #ffffff; }
        [data-theme="purple"] { --bg-main: #0f0720; --bg-sidebar: #1e1b4b; --bg-card: #2e1065; --accent: #a855f7; --text: #f5f3ff; }

        body { font-family: 'Satoshi', sans-serif; background-color: var(--bg-main); color: var(--text); transition: 0.3s ease; }
        .sidebar { background-color: var(--bg-sidebar); border-right: 1px solid var(--border); transition: transform 0.3s ease; }
        .chat-bubble { background: var(--bg-card); border: 1px solid var(--border); border-radius: 1.5rem; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* 3-Dot Popup Fix */
        .settings-popup { position: absolute; bottom: 80px; left: 12px; width: 250px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; display: none; z-index: 100; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .settings-popup.show { display: block; animation: slideUp 0.2s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .btn-lvl.active { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 z-[500] bg-black flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-[#111] border border-white/5 p-10 rounded-[3rem] text-center shadow-2xl">
            <div class="mb-6 inline-flex p-5 bg-white/5 rounded-full"><img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-16 h-16 animate-pulse"></div>
            <h1 class="text-3xl font-black text-white mb-2">Aladdin AI</h1>
            <p class="text-gray-500 text-sm mb-8 tracking-wide">Premium Vision Intelligence</p>

            <div id="auth-step-1" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email Address" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-[var(--accent)] text-white text-center">
                <button onclick="sendMagicCode()" id="btn-send-code" class="w-full p-5 bg-[var(--accent)] text-white rounded-2xl font-bold hover:brightness-110 transition shadow-lg">Request Magic Code</button>
            </div>

            <div id="auth-step-2" class="hidden space-y-4">
                <input type="text" id="login-otp" maxlength="6" placeholder="••••••" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-center text-3xl font-mono text-white outline-none">
                <button onclick="verifyCode()" class="w-full p-5 bg-white text-black rounded-2xl font-black uppercase tracking-tighter">Enter the Lamp</button>
            </div>

            <div id="auth-step-3" class="hidden space-y-3">
                <input type="text" id="reg-name" placeholder="Full Name" class="w-full p-4 bg-white/5 rounded-2xl border border-white/10 text-white outline-none">
                <div class="flex gap-2">
                    <input type="number" id="reg-age" placeholder="Age" class="w-1/3 p-4 bg-white/5 rounded-2xl border border-white/10 text-white outline-none">
                    <input type="text" id="reg-country" placeholder="Country" class="w-2/3 p-4 bg-white/5 rounded-2xl border border-white/10 text-white outline-none">
                </div>
                <button onclick="completeLogin()" class="w-full p-5 bg-[var(--accent)] rounded-2xl font-bold text-white mt-4 shadow-xl">Complete Registration</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="sidebar w-[300px] flex flex-col h-full hidden md:flex z-40">
        <div class="p-6 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-3 font-black text-xl"><img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-7 h-7"> Aladdin</div>
            <button onclick="startNewChat()" class="text-gray-400 hover:text-white transition"><i class="fa-solid fa-pen-to-square"></i></button>
        </div>
        
        <div id="chat-history" class="flex-1 overflow-y-auto p-4 space-y-1 custom-scroll"></div>

        <div class="p-4 border-t border-white/5 relative">
            <div id="user-popup" class="settings-popup p-3 text-sm">
                <div class="text-[10px] text-gray-500 px-3 py-2 uppercase font-black tracking-widest">Aladdin Settings</div>
                <button onclick="openSettings()" class="w-full text-left px-3 py-3 hover:bg-white/5 rounded-xl flex items-center gap-3 transition"><i class="fa-solid fa-gear opacity-60"></i> Configuration</button>
                <div class="border-t border-white/5 my-2"></div>
                <button onclick="logout()" class="w-full text-left px-3 py-3 text-red-500 hover:bg-red-500/10 rounded-xl flex items-center gap-3 transition"><i class="fa-solid fa-power-off"></i> Logout</button>
            </div>

            <div onclick="toggleMenu()" class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl cursor-pointer hover:bg-white/10 transition">
                <img id="sidebar-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-10 h-10 rounded-full object-cover border border-white/10">
                <div class="flex-1 truncate">
                    <p class="font-bold text-sm leading-none" id="sidebar-name">Master</p>
                    <p class="text-[9px] text-[var(--accent)] font-black mt-1 uppercase">Legend Active</p>
                </div>
                <i class="fa-solid fa-ellipsis-vertical text-gray-500"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        <header class="flex items-center justify-between p-4 border-b border-white/5 bg-[var(--bg-main)]/80 backdrop-blur-xl z-30">
            <button onclick="toggleSidebar()" class="md:hidden text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
            
            <div class="flex bg-white/5 p-1 rounded-2xl gap-1">
                <button onclick="setLevel('Basic')" id="btn-Basic" class="btn-lvl px-3 py-1.5 rounded-xl text-[10px] font-black transition">BASIC</button>
                <button onclick="setLevel('Pro')" id="btn-Pro" class="btn-lvl px-3 py-1.5 rounded-xl text-[10px] font-black transition">PRO</button>
                <button onclick="setLevel('Ultra')" id="btn-Ultra" class="btn-lvl px-3 py-1.5 rounded-xl text-[10px] font-black transition">ULTRA</button>
                <button onclick="setLevel('Legend')" id="btn-Legend" class="btn-lvl px-3 py-1.5 rounded-xl text-[10px] font-black transition active">LEGEND</button>
            </div>
            <div class="w-8"></div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto px-4 md:px-20 lg:px-60 pb-44 pt-10">
            <div id="welcome-state" class="h-full flex flex-col items-center justify-center text-center opacity-80">
                <img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-20 h-20 mb-8 drop-shadow-2xl grayscale brightness-200">
                <h2 id="greeting-msg" class="text-3xl md:text-5xl font-black mb-4 tracking-tighter"></h2>
                <p class="text-gray-500 text-sm max-w-sm mx-auto font-medium">Analyze images, solve complex code, or create magical art. Aladdin is at your service.</p>
            </div>
            <div id="messages" class="space-y-10"></div>
        </div>

        <div class="absolute bottom-0 w-full bg-gradient-to-t from-[var(--bg-main)] via-[var(--bg-main)] to-transparent pt-20 pb-8 px-4 md:px-20 lg:px-60">
            <div class="max-w-4xl mx-auto">
                <div id="file-preview" class="flex gap-3 p-3 hidden overflow-x-auto bg-white/5 rounded-t-3xl border-x border-t border-white/5"></div>
                <div class="chat-bubble flex items-end gap-2 p-3 shadow-2xl relative">
                    <label class="p-4 cursor-pointer text-gray-500 hover:text-[var(--accent)] transition">
                        <i class="fa-solid fa-link text-xl"></i>
                        <input type="file" id="media-upload" class="hidden" multiple accept="image/*, .pdf" onchange="handleFiles(this)">
                    </label>
                    <textarea id="prompt-input" rows="1" placeholder="Type a message or upload image..." class="flex-1 bg-transparent border-none outline-none py-4 px-2 resize-none max-h-52 text-lg"></textarea>
                    <button id="send-btn" onclick="sendPrompt()" class="m-1 p-4 bg-[var(--accent)] text-white rounded-2xl hover:scale-105 active:scale-95 transition shadow-lg">
                        <i class="fa-solid fa-arrow-up-long"></i>
                    </button>
                </div>
                <div class="text-[9px] text-center mt-4 opacity-20 font-black uppercase tracking-[0.3em]">AI Memory: Active | Vision Level: Legend | Muhib Creation</div>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[600] bg-black/95 hidden items-center justify-center p-4 backdrop-blur-3xl">
        <div class="max-w-xl w-full bg-[#111] p-10 rounded-[3rem] border border-white/10 text-white space-y-8">
            <div class="flex justify-between items-center border-b border-white/5 pb-6">
                <h2 class="text-3xl font-black tracking-tighter">Configuration</h2>
                <button onclick="closeSettings()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-8">
                <div class="flex items-center gap-8">
                    <img id="settings-pfp" src="https://i.ibb.co/mR70vS0/user.png" class="w-24 h-24 rounded-full object-cover border-4 border-[var(--accent)] p-1">
                    <div>
                        <p class="text-xs font-black text-gray-500 uppercase mb-2">Biometric Image</p>
                        <input type="file" id="pfp-upload" class="hidden" accept="image/*" onchange="updatePFP(this)">
                        <button onclick="document.getElementById('pfp-upload').click()" class="px-6 py-3 bg-white text-black rounded-2xl font-black text-xs uppercase transition">Change Photo</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-4">Environment Theme</label>
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="changeTheme('midnight')" class="p-4 bg-black border border-white/10 rounded-2xl text-[10px] font-black uppercase">Midnight</button>
                        <button onclick="changeTheme('dark')" class="p-4 bg-[#1a1a1a] border border-white/10 rounded-2xl text-[10px] font-black uppercase">Carbon</button>
                        <button onclick="changeTheme('light')" class="p-4 bg-white text-black rounded-2xl text-[10px] font-black uppercase">Snow</button>
                        <button onclick="changeTheme('blue')" class="p-4 bg-blue-900/30 border border-blue-500/30 rounded-2xl text-[10px] font-black uppercase text-blue-400">Deep Ocean</button>
                        <button onclick="changeTheme('crimson')" class="p-4 bg-red-900/30 border border-red-500/30 rounded-2xl text-[10px] font-black uppercase text-red-400">Crimson</button>
                        <button onclick="changeTheme('purple')" class="p-4 bg-purple-900/30 border border-purple-500/30 rounded-2xl text-[10px] font-black uppercase text-purple-400">Royal</button>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-4">System Language</label>
                    <select id="lang-pref" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl outline-none font-bold appearance-none" onchange="saveLang(this.value)">
                        <option value="en">English (Neural)</option>
                        <option value="bn">Bengali / Banglish</option>
                        <option value="auto">Auto Intelligence</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SECURE CONFIG ---
        const EMAILJS = { SERVICE: "service_d7q8v4o", TEMPLATE: "template_9nrhdsl", PUBLIC: "5IDeLAjB6gy610xIB" };
        const GROQ_API = "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";
        
        let genOTP = null;
        let aiLevel = "Legend";
        let currChatId = null;
        let attachedImages = []; 
        let chatDB = JSON.parse(localStorage.getItem('aladdin_v3_5_db')) || [];

        window.onload = () => {
            emailjs.init(EMAILJS.PUBLIC);
            checkSession();
            
            const ta = document.getElementById('prompt-input');
            ta.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });
            ta.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPrompt(); } });

            document.addEventListener('click', (e) => {
                if(!e.target.closest('.relative')) document.getElementById('user-popup').classList.remove('show');
            });
        };

        function checkSession() {
            if(localStorage.getItem('aladdin_user_v3_5')) {
                document.getElementById('auth-screen').style.display = 'none';
                bootApp();
            }
        }

        // --- AUTH ---
        async function sendMagicCode() {
            const email = document.getElementById('login-email').value;
            if(!email.includes('@')) return alert("Invalid Magical Email!");
            
            genOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('btn-send-code');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Channelling...';
            btn.disabled = true;

            try {
                await emailjs.send(EMAILJS.SERVICE, EMAILJS.TEMPLATE, { email: email, otp: genOTP });
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            } catch(err) {
                alert("EmailJS Error. Emergency Pass: 123456");
                genOTP = "123456";
                document.getElementById('auth-step-1').classList.add('hidden');
                document.getElementById('auth-step-2').classList.remove('hidden');
            }
        }

        function verifyCode() {
            if(document.getElementById('login-otp').value === genOTP) {
                document.getElementById('auth-step-2').classList.add('hidden');
                document.getElementById('auth-step-3').classList.remove('hidden');
            } else alert("Magic code failed!");
        }

        function completeLogin() {
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const country = document.getElementById('reg-country').value;
            if(!name || !age || !country) return alert("Fill all details!");
            localStorage.setItem('aladdin_user_v3_5', JSON.stringify({ name, age, country }));
            location.reload();
        }

        // --- APP ENGINE ---
        function bootApp() {
            const user = JSON.parse(localStorage.getItem('aladdin_user_v3_5'));
            document.getElementById('sidebar-name').innerText = user.name;
            document.getElementById('greeting-msg').innerText = getPremiumGreeting(user.name);
            
            const pfp = localStorage.getItem('aladdin_pfp');
            if(pfp) {
                document.getElementById('sidebar-pfp').src = pfp;
                document.getElementById('settings-pfp').src = pfp;
            }
            changeTheme(localStorage.getItem('aladdin_theme') || 'midnight');
            renderHistory();
        }

        function getPremiumGreeting(name) {
            const hour = new Date().getHours();
            const time = hour < 12 ? "Morning" : hour < 18 ? "Afternoon" : "Evening";
            const messages = [
                `Rise and shine, ${name}. Shall we build?`, `Magic awaits, Master ${name}.`, `The lamp is ready for you.`, `Ready to solve, ${name}?`,
                `Good ${time}. What's on your mind?`, `Your vision, my intelligence.`, `Let's make some magic today.`, `Command me, Master ${name}.`,
                `Looking for a solution? I'm here.`, `Greetings, ${name}. Ready for Pro AI?`, ` Dhaka's finest AI at your service.`, ` Muhib's creation is active.`
            ];
            // Added logic for 100 variations could be here, using this sample for brevity
            return messages[Math.floor(Math.random() * messages.length)] + " ✨";
        }

        // --- CORE AI LOGIC ---
        async function sendPrompt() {
            const input = document.getElementById('prompt-input');
            const text = input.value.trim();
            if(!text && attachedImages.length === 0) return;

            if(!currChatId) {
                currChatId = "chat_" + Date.now();
                chatDB.unshift({ id: currChatId, title: text.substring(0, 30) || "Visual Analysis", msgs: [] });
            }

            appendDOM('user', text, attachedImages);
            const userImages = [...attachedImages];
            input.value = ""; input.style.height = "auto";
            document.getElementById('file-preview').innerHTML = "";
            document.getElementById('file-preview').classList.add('hidden');
            attachedImages = [];

            const loader = appendDOM('ai', '<div class="flex gap-2 items-center"><i class="fa-solid fa-circle-notch fa-spin text-[var(--accent)]"></i> <span class="text-xs font-black uppercase opacity-50 tracking-[0.2em]">Thinking...</span></div>');
            
            try {
                // 1. Image Generation Check
                if(text.toLowerCase().includes('create image') || text.toLowerCase().includes('ছবি বানাও')) {
                    const encoded = encodeURIComponent(text);
                    const aiRes = `Here are your magical creations, Master ${JSON.parse(localStorage.getItem('aladdin_user_v3_5')).name}:\n\n![Img1](https://pollinations.ai/p/${encoded}?width=1024&height=1024&seed=${Math.random()})\n\n![Img2](https://pollinations.ai/p/${encoded}?width=1024&height=1024&seed=${Math.random()})\n\n**Aladdin is right by your side.**`;
                    loader.innerHTML = marked.parse(aiRes);
                    saveMsg('ai', aiRes);
                    return;
                }

                // 2. Text & Vision Core API
                const user = JSON.parse(localStorage.getItem('aladdin_user_v3_5'));
                const sysPrompt = `You are Aladdin AI v3.5. Creator: Muhib Creation. Owner: Muhib. Location: Dhaka. Support 100+ languages including Banglish. 
                User: ${user.name}, Age ${user.age}. Level: ${aiLevel}. 
                Rule: Be pro-level, remember user preferences. End with "Aladdin is right by your side." (or "Aladdin pashe ache tmr" if Bengali)`;

                const model = userImages.length > 0 ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";
                let messages = [{ role: "system", content: sysPrompt }];
                
                // Add Context History
                const chat = chatDB.find(c => c.id === currChatId);
                chat.msgs.slice(-5).forEach(m => messages.push({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));

                // Add current message with VISION support
                if(userImages.length > 0) {
                    let content = [{ type: "text", text: text || "Analyze this image." }];
                    userImages.forEach(img => content.push({ type: "image_url", image_url: { url: img } }));
                    messages.push({ role: "user", content: content });
                } else {
                    messages.push({ role: "user", content: text });
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: model, messages: messages, temperature: 0.5 })
                });

                const data = await response.json();
                let result = data.choices[0].message.content;
                if(!result.includes("Aladdin")) result += "\n\n**Aladdin is right by your side.**";

                loader.innerHTML = marked.parse(result);
                saveMsg('ai', result);

            } catch(e) {
                loader.innerHTML = "<span class='text-red-500'>The lamp is flickering. Check your connection or API.</span>";
            }
        }

        function appendDOM(role, text, images = []) {
            document.getElementById('welcome-state').classList.add('hidden');
            const wrapper = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `flex gap-4 p-4 ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            let imgHTML = images.map(i => `<img src="${i}" class="max-w-[300px] rounded-3xl border border-white/10 mb-4 shadow-xl">`).join('');
            const icon = role === 'user' ? '<div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-[10px]"><i class="fa-solid fa-user"></i></div>' : '<img src="https://cdn-icons-png.flaticon.com/512/1683/1683050.png" class="w-8 h-8">';

            div.innerHTML = `
                <div class="flex ${role === 'user' ? 'flex-row-reverse' : 'flex-row'} gap-4 max-w-[90%]">
                    <div class="shrink-0 mt-1">${icon}</div>
                    <div class="${role === 'user' ? 'bg-white/5 border border-white/10' : ''} p-5 rounded-[2rem] prose prose-invert max-w-none text-[17px] leading-relaxed">
                        ${imgHTML}
                        ${role === 'user' ? text : marked.parse(text)}
                    </div>
                </div>
            `;
            wrapper.appendChild(div);
            scrollToBottom();
            if(role === 'user' && currChatId) saveMsg('user', text, images);
            return div.querySelector('.prose');
        }

        // --- HELPERS ---
        function scrollToBottom() { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }
        function toggleMenu() { document.getElementById('user-popup').classList.toggle('show'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('hidden'); }
        function startNewChat() { currChatId = null; document.getElementById('messages').innerHTML = ""; document.getElementById('welcome-state').classList.remove('hidden'); bootApp(); }
        
        function setLevel(l) {
            aiLevel = l;
            document.querySelectorAll('.btn-lvl').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${l}`).classList.add('active');
        }

        function handleFiles(input) {
            const preview = document.getElementById('file-preview');
            preview.classList.remove('hidden');
            Array.from(input.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    attachedImages.push(e.target.result);
                    preview.innerHTML += `<div class="relative"><img src="${e.target.result}" class="w-20 h-20 object-cover rounded-2xl border border-white/10"><div class="absolute -top-2 -right-2 bg-red-500 w-5 h-5 rounded-full flex items-center justify-center text-[10px] cursor-pointer" onclick="this.parentElement.remove()">×</div></div>`;
                };
                reader.readAsDataURL(file);
            });
        }

        function saveMsg(role, content, images = []) {
            const chat = chatDB.find(c => c.id === currChatId);
            if(chat) {
                chat.msgs.push({ role, content, images });
                localStorage.setItem('aladdin_v3_5_db', JSON.stringify(chatDB));
            }
        }

        function renderHistory() {
            const container = document.getElementById('chat-history');
            container.innerHTML = chatDB.map(c => `
                <div onclick="loadChat('${c.id}')" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer truncate transition flex items-center gap-3 ${currChatId === c.id ? 'bg-white/10 text-[var(--accent)] font-bold' : 'opacity-60'}">
                    <i class="fa-regular fa-comment-dots text-xs"></i> ${c.title}
                </div>
            `).join('');
        }

        function loadChat(id) {
            currChatId = id;
            const chat = chatDB.find(c => c.id === id);
            document.getElementById('messages').innerHTML = "";
            document.getElementById('welcome-state').classList.add('hidden');
            chat.msgs.forEach(m => appendDOM(m.role, m.content, m.images));
            renderHistory();
        }

        function openSettings() { document.getElementById('settings-modal').style.display = 'flex'; toggleMenu(); }
        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }
        function changeTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('aladdin_theme', t); }
        function saveLang(l) { localStorage.setItem('aladdin_lang', l); }
        
        function updatePFP(input) {
            if(input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    localStorage.setItem('aladdin_pfp', e.target.result);
                    document.getElementById('sidebar-pfp').src = e.target.result;
                    document.getElementById('settings-pfp').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function logout() { localStorage.removeItem('aladdin_user_v3_5'); location.reload(); }
    </script>
</body>
</html>
