<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root { --bg: #09090b; --sidebar: #000000; --accent: #a855f7; --text: #fafafa; --card: #18181b; }
        .theme-gold { --accent: #fbbf24; } .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #22c55e; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
        .font-magic { font-family: 'Cinzel', serif; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .chat-bubble { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; }
        .user-bubble { background: var(--accent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-bubble { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        
        .active-session { background: rgba(255,255,255,0.08); border-left: 3px solid var(--accent); }
        .thinking { animation: pulse 1.5s infinite; color: var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-screen" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-[var(--card)] p-10 rounded-[40px] border border-white/5 w-full max-w-md text-center shadow-2xl">
            <h2 class="text-3xl font-magic text-[var(--accent)] mb-2">🧞 ALADDIN</h2>
            <p class="text-xs opacity-40 mb-8 uppercase tracking-widest">Premium Workspace Access</p>
            
            <div id="email-section">
                <input type="email" id="user-email" placeholder="Master's Email" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-4 outline-none focus:border-[var(--accent)] transition text-center">
                <button onclick="sendVerification()" id="auth-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:scale-[0.98] transition">Send Magic Code</button>
            </div>

            <div id="otp-section" class="hidden">
                <input type="text" id="user-otp" placeholder="Enter Code" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-4 outline-none text-center tracking-widest text-xl">
                <button onclick="verifyMagic()" class="w-full bg-[var(--accent)] text-white font-bold py-4 rounded-2xl shadow-lg">Verify Wish</button>
            </div>
        </div>
    </div>

    <aside class="w-72 bg-[var(--sidebar)] border-r border-white/5 flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-[var(--accent)] rounded-xl flex items-center justify-center font-magic text-xl">A</div>
            <span class="font-magic font-bold text-xl tracking-tighter">ALADDIN v3.0</span>
        </div>

        <button onclick="createNewSession()" class="w-full py-3 rounded-xl bg-white/5 border border-white/10 text-sm font-semibold hover:bg-white/10 transition mb-8">+ New Conversation</button>

        <div class="flex-1 overflow-y-auto pr-2">
            <p class="text-[10px] uppercase font-bold opacity-30 mb-4">Recents</p>
            <div id="session-list" class="space-y-2"></div>
        </div>

        <div class="pt-6 border-t border-white/5">
            <div class="flex gap-2 mb-4 justify-center">
                <div onclick="setTheme('purple')" class="w-4 h-4 rounded-full bg-purple-600 cursor-pointer"></div>
                <div onclick="setTheme('gold')" class="w-4 h-4 rounded-full bg-amber-500 cursor-pointer"></div>
                <div onclick="setTheme('blue')" class="w-4 h-4 rounded-full bg-blue-600 cursor-pointer"></div>
            </div>
            <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl">
                <div id="pfp-container" class="w-10 h-10 rounded-full bg-[var(--accent)] flex items-center justify-center font-bold text-lg overflow-hidden">
                    <img id="pfp-display" class="w-full h-full object-cover hidden">
                    <span id="pfp-text">M</span>
                </div>
                <div class="flex-1 truncate">
                    <p id="master-name" class="text-sm font-bold truncate">Muhib Ibn Shams</p>
                    <button onclick="logout()" class="text-[10px] text-red-500 hover:underline">Logout Session</button>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[var(--bg)]">
        <header class="h-20 flex items-center justify-between px-8 border-b border-white/5 backdrop-blur-xl sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-50">Aladdin is Online</p>
            </div>
            <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setBrain('Basic')" id="btn-Basic" class="brain-tab px-4 py-1.5 text-[10px] rounded-lg font-bold">BASIC</button>
                <button onclick="setBrain('Ultra')" id="btn-Ultra" class="brain-tab px-4 py-1.5 text-[10px] rounded-lg font-bold bg-[var(--accent)]">ULTRA</button>
            </div>
        </header>

        <div id="chat-flow" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-8 scroll-smooth">
            <div id="welcome-view" class="h-full flex flex-col items-center justify-center text-center pb-20">
                <div class="w-20 h-20 bg-[var(--accent)] rounded-[30px] flex items-center justify-center text-4xl mb-6 shadow-2xl shadow-[var(--accent)]/20 animate-bounce">🧞</div>
                <h1 class="text-4xl font-magic font-bold mb-4">The Lamp is Active</h1>
                <p class="text-sm opacity-40 max-w-sm leading-relaxed">Master, your wishes are my commands. Upload files or ask anything to begin our magic journey.</p>
            </div>
        </div>

        <div class="p-6 bg-gradient-to-t from-[var(--bg)] to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <div id="file-tray" class="flex gap-2 mb-3"></div>
                <div class="bg-[var(--card)] border border-white/10 rounded-[30px] p-2 flex items-end gap-2 focus-within:border-[var(--accent)] transition-all shadow-2xl">
                    <button onclick="document.getElementById('file-input').click()" class="p-4 text-gray-500 hover:text-[var(--accent)] transition">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                    </button>
                    <input type="file" id="file-input" class="hidden" multiple onchange="handleFiles(this)">
                    
                    <textarea id="main-input" rows="1" placeholder="Ask Aladdin anything..." 
                        class="flex-1 bg-transparent py-4 outline-none resize-none text-sm"></textarea>
                    
                    <button onclick="executeWish()" id="send-btn" class="p-4 bg-[var(--accent)] text-white rounded-2xl hover:scale-105 active:scale-95 transition shadow-lg">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-3 opacity-20">Aladdin AI v3.0 Pro Ultra | Powered by Groq Llama 3.3</p>
            </div>
        </div>
    </main>

    <script>
        const GROQ_KEY = "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";
        let sessions = JSON.parse(localStorage.getItem('al_sessions')) || [];
        let activeSessionId = null;
        let selectedBrain = "Ultra";
        let tempFiles = [];

        window.onload = () => {
            emailjs.init("5IDeLAjB6gy610xIB"); // Initializing with your Public Key
            if(localStorage.getItem('al_auth') === 'true') {
                document.getElementById('auth-screen').style.display = 'none';
                setTheme(localStorage.getItem('al_theme') || 'purple');
                if(sessions.length > 0) loadSession(sessions[0].id); else createNewSession();
            }
        };

        // --- AUTH LOGIC (FIXED EMAILJS) ---
        function sendVerification() {
            const email = document.getElementById('user-email').value;
            if(!email) return alert("Enter Master's Email");
            
            const otp = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem('al_temp_otp', otp);
            document.getElementById('auth-btn').innerText = "Sending...";

            emailjs.send("service_x9r2dcl", "template_qon57ne", {
                email: email, // Changed from to_email to {{email}} as per your template
                otp: otp
            }).then(() => {
                document.getElementById('email-section').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');
            }).catch(() => {
                alert("Magic failed! Use '123456' for Demo."); // Fallback based on your screenshot
                document.getElementById('email-section').classList.add('hidden');
                document.getElementById('otp-section').classList.remove('hidden');
            });
        }

        function verifyMagic() {
            const input = document.getElementById('user-otp').value;
            const correct = localStorage.getItem('al_temp_otp') || "123456";
            if(input === correct) {
                localStorage.setItem('al_auth', 'true');
                location.reload();
            } else alert("Invalid Magic Code!");
        }

        // --- SESSION MANAGEMENT ---
        function createNewSession() {
            const id = Date.now();
            sessions.unshift({ id, title: "New Wish", messages: [] });
            activeSessionId = id;
            save(); renderSessionList(); renderMessages();
        }

        function loadSession(id) {
            activeSessionId = id;
            renderSessionList();
            renderMessages();
        }

        function renderSessionList() {
            const list = document.getElementById('session-list');
            list.innerHTML = sessions.map(s => `
                <div onclick="loadSession(${s.id})" class="p-3 rounded-xl cursor-pointer text-xs truncate transition ${s.id === activeSessionId ? 'active-session' : 'hover:bg-white/5 opacity-60'}">
                    💎 ${s.title}
                </div>
            `).join('');
        }

        // --- CORE AI EXECUTION (FIXED SEND) ---
        async function executeWish() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if(!text && tempFiles.length === 0) return;

            const session = sessions.find(s => s.id === activeSessionId);
            if(session.messages.length === 0 && text) session.title = text.substring(0, 20);

            // Add User Message
            const userMsg = { role: 'user', content: text, files: [...tempFiles] };
            session.messages.push(userMsg);
            renderMessages();

            // Clear Input & UI
            input.value = "";
            const filesToContext = [...tempFiles];
            tempFiles = [];
            document.getElementById('file-tray').innerHTML = "";
            document.getElementById('welcome-view').classList.add('hidden');

            // Thinking State
            const aiDiv = addBubbleUI('assistant', '<span class="thinking font-magic">Interpreting your wish...</span>');
            
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${GROQ_KEY}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: selectedBrain === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are Aladdin AI v3.0 Ultra. Provide premium, accurate, and witty responses. End every message with: 'Do you need anything else? I am Aladdin, right by your side.'" },
                            ...session.messages.map(m => ({ role: m.role, content: m.content }))
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                aiDiv.innerHTML = marked.parse(reply);
                session.messages.push({ role: 'assistant', content: reply });
                save();
            } catch (e) {
                aiDiv.innerHTML = "<span class='text-red-500'>The lamp is flickering (Connection Error). Please try again.</span>";
            }
        }

        function renderMessages() {
            const session = sessions.find(s => s.id === activeSessionId);
            const container = document.getElementById('chat-flow');
            
            // Clean view but keep welcome if empty
            const messagesWrap = document.createElement('div');
            messagesWrap.className = "max-w-4xl mx-auto flex flex-col space-y-6";
            
            if(session.messages.length > 0) {
                document.getElementById('welcome-view').classList.add('hidden');
                session.messages.forEach(m => {
                    const bubble = document.createElement('div');
                    bubble.className = m.role === 'user' ? 'chat-bubble user-bubble' : 'chat-bubble ai-bubble';
                    const fileHtml = (m.files || []).map(f => `<div class="text-[10px] mt-2 opacity-50">📄 ${f.name}</div>`).join('');
                    
                    bubble.innerHTML = `
                        <div class="text-[10px] uppercase font-bold mb-2 opacity-40">${m.role === 'user' ? 'Master' : 'Aladdin AI'}</div>
                        <div class="prose prose-invert max-w-none prose-sm">${marked.parse(m.content || "")}</div>
                        ${fileHtml}
                    `;
                    messagesWrap.appendChild(bubble);
                });
                container.innerHTML = "";
                container.appendChild(messagesWrap);
            } else {
                document.getElementById('welcome-view').classList.remove('hidden');
            }
            container.scrollTo(0, container.scrollHeight);
        }

        function addBubbleUI(role, content) {
            const container = document.getElementById('chat-flow');
            let wrap = container.querySelector('.max-w-4xl');
            if(!wrap) {
                wrap = document.createElement('div');
                wrap.className = "max-w-4xl mx-auto flex flex-col space-y-6";
                container.appendChild(wrap);
            }
            const div = document.createElement('div');
            div.className = `chat-bubble ${role === 'user' ? 'user-bubble' : 'ai-bubble'}`;
            div.innerHTML = `<div class="prose prose-invert prose-sm">${content}</div>`;
            wrap.appendChild(div);
            container.scrollTo(0, container.scrollHeight);
            return div.querySelector('.prose');
        }

        // --- UTILS ---
        function handleFiles(input) {
            Array.from(input.files).forEach(f => {
                tempFiles.push({ name: f.name });
                const pill = document.createElement('div');
                pill.className = "bg-[var(--accent)] text-white text-[10px] px-3 py-1 rounded-full animate-fade-in";
                pill.innerText = f.name;
                document.getElementById('file-tray').appendChild(pill);
            });
        }

        function setBrain(b) {
            selectedBrain = b;
            document.querySelectorAll('.brain-tab').forEach(t => t.classList.remove('bg-[var(--accent)]'));
            document.getElementById('btn-' + b).classList.add('bg-[var(--accent)]');
        }

        function setTheme(t) {
            document.body.className = "flex h-screen overflow-hidden theme-" + t;
            localStorage.setItem('al_theme', t);
        }

        function save() { localStorage.setItem('al_sessions', JSON.stringify(sessions)); }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
