<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aladdin AI | v3.0 Pro Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #0b0b0d; --sidebar: #000000; --card: #141416; --text: #ececed; --accent: #a855f7; --user-msg: #202023; }
        .theme-gold { --accent: #e2b714; } .theme-blue { --accent: #3b82f6; } .theme-green { --accent: #22c55e; }
        .theme-red { --accent: #ef4444; } .theme-pink { --accent: #ec4899; } .theme-light { --bg: #f8f9fa; --sidebar: #ffffff; --card: #ffffff; --text: #1a1a1b; --user-msg: #f1f1f4; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s ease; }
        .font-magic { font-family: 'Cinzel', serif; }
        
        /* Sidebar Toggle Logic */
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; z-index: 50; }
        #sidebar.collapsed { width: 0; transform: translateX(-280px); padding: 0; opacity: 0; pointer-events: none; }
        
        .chat-main { transition: margin-left 0.3s ease; flex: 1; min-width: 0; }
        
        .user-msg { align-self: flex-end; background: var(--user-msg); padding: 12px 16px; border-radius: 18px 18px 2px 18px; max-width: 85%; font-size: 14px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .ai-msg { align-self: flex-start; padding: 12px; max-width: 90%; margin-bottom: 20px; }
        
        .thinking-dot { animation: pulse 1.5s infinite; color: var(--accent); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        .active-chat { border-left: 3px solid var(--accent) !important; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-overlay" class="fixed inset-0 bg-black z-[100] flex items-center justify-center p-4">
        <div class="bg-[var(--card)] p-8 rounded-3xl border border-white/5 w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold font-magic text-[var(--accent)] mb-6">🧞 ALADDIN v3.0</h2>
            <div id="email-step">
                <input type="email" id="auth-email" placeholder="Enter Email" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[var(--accent)]">
                <button onclick="sendOTP()" class="w-full bg-white text-black font-bold py-3 rounded-xl">Unlock Lamp</button>
            </div>
            <div id="otp-step" class="hidden">
                <input type="text" id="auth-otp" placeholder="Magic Code" class="w-full bg-black/40 border border-white/10 p-4 rounded-xl mb-4 text-center tracking-widest outline-none">
                <button onclick="verifyOTP()" class="w-full bg-[var(--accent)] text-white font-bold py-3 rounded-xl">Verify Wish</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-[var(--sidebar)] border-r border-white/5 flex flex-col p-5 shrink-0">
        <div class="flex items-center gap-3 font-magic font-bold text-lg text-[var(--accent)] mb-8">
            <span class="text-2xl">🧞</span> ALADDIN
        </div>

        <button onclick="createNewChat()" class="w-full flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10 text-sm mb-6 hover:bg-white/10 transition">
            <span>+ New chat</span>
            <kbd class="text-[10px] opacity-40">Ctrl K</kbd>
        </button>

        <div class="flex-1 overflow-y-auto custom-scrollbar space-y-6">
            <div>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4 px-2">Menu</p>
                <div class="space-y-1">
                    <div onclick="createNewChat()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm"><span>✨</span> New Conversation</div>
                    <div onclick="focusSearch()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm"><span>🔍</span> Search chats</div>
                    <div onclick="activateCodex()" class="p-3 hover:bg-white/5 rounded-xl cursor-pointer flex items-center gap-3 text-sm"><span>💻</span> Codex AI</div>
                </div>
            </div>

            <div>
                <p class="text-[10px] uppercase font-bold tracking-widest opacity-30 mb-4 px-2">History</p>
                <div id="chat-list" class="space-y-2"></div>
            </div>
        </div>

        <div class="mt-auto pt-6 border-t border-white/5">
            <div class="flex justify-between mb-4">
                <div onclick="setTheme('purple')" class="w-4 h-4 rounded-full bg-purple-500 cursor-pointer"></div>
                <div onclick="setTheme('gold')" class="w-4 h-4 rounded-full bg-yellow-500 cursor-pointer"></div>
                <div onclick="setTheme('blue')" class="w-4 h-4 rounded-full bg-blue-500 cursor-pointer"></div>
                <div onclick="setTheme('green')" class="w-4 h-4 rounded-full bg-green-500 cursor-pointer"></div>
                <div onclick="setTheme('light')" class="w-4 h-4 rounded-full bg-white cursor-pointer border border-black/10"></div>
            </div>
            <div class="flex items-center gap-3 p-3 bg-white/5 rounded-2xl">
                <div class="w-8 h-8 rounded-full bg-[var(--accent)] flex items-center justify-center font-bold text-xs" id="profile-icon">M</div>
                <div class="text-xs truncate" id="profile-name">Master</div>
            </div>
        </div>
    </aside>

    <main class="chat-main flex flex-col relative overflow-hidden">
        <header class="h-16 border-b border-white/5 flex items-center px-6 bg-[var(--bg)]/80 backdrop-blur-md z-40 sticky top-0">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-xl mr-4">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div class="flex-1 flex justify-center">
                <div class="flex bg-black/30 p-1 rounded-xl border border-white/5 text-[10px]">
                    <button onclick="setBrain('Basic', this)" class="brain-tab px-4 py-1.5 rounded-lg bg-[var(--accent)] text-white">Basic</button>
                    <button onclick="setBrain('Ultra', this)" class="brain-tab px-4 py-1.5 rounded-lg">Ultra</button>
                    <button onclick="setBrain('Pro', this)" class="brain-tab px-4 py-1.5 rounded-lg">Cherag Pro</button>
                </div>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div id="messages" class="max-w-3xl mx-auto flex flex-col">
                <div id="welcome-box" class="py-20 text-center">
                    <h1 class="text-4xl font-magic font-bold text-[var(--accent)] mb-4">ALADDIN v3.0</h1>
                    <p class="text-sm opacity-40">Your wishes, delivered with AI excellence.</p>
                </div>
            </div>
        </div>

        <div class="p-4 md:p-8 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div id="file-tray" class="flex gap-2 mb-2"></div>
                <div class="bg-[var(--card)] border border-white/10 rounded-3xl p-2 shadow-2xl focus-within:border-[var(--accent)] transition">
                    <div class="flex items-end gap-2 px-2">
                        <button onclick="document.getElementById('file-input').click()" class="p-3 text-gray-500 hover:text-[var(--accent)]">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                        </button>
                        <input type="file" id="file-input" class="hidden" multiple onchange="handleFiles(this)">
                        
                        <textarea id="user-input" rows="1" placeholder="Ask Aladdin anything..." 
                            class="flex-1 bg-transparent py-3 outline-none resize-none text-sm max-h-48"></textarea>
                        
                        <button onclick="sendMessage()" class="p-3 bg-[var(--accent)] text-white rounded-2xl hover:scale-105 transition active:scale-95">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "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";
        let chats = JSON.parse(localStorage.getItem('al_history')) || [];
        let activeChatId = null;
        let uploadedFiles = [];

        // App Initialization
        window.onload = () => {
            const logged = localStorage.getItem('al_logged');
            if(logged === 'true') {
                document.getElementById('auth-overlay').style.display = 'none';
                renderChatList();
                setTheme(localStorage.getItem('al_theme') || 'purple');
                if(chats.length > 0) loadChat(chats[0].id); else createNewChat();
            }
        };

        // --- SIDEBAR ACTIONS ---
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function createNewChat() {
            const id = Date.now();
            chats.unshift({id, title: "New Conversation", messages: []});
            activeChatId = id;
            saveHistory();
            renderChatList();
            renderMessages();
        }

        function loadChat(id) {
            activeChatId = id;
            renderChatList();
            renderMessages();
        }

        function renderChatList() {
            const list = document.getElementById('chat-list');
            list.innerHTML = chats.map(c => `
                <div onclick="loadChat(${c.id})" class="p-3 rounded-xl cursor-pointer text-xs truncate transition border border-transparent ${c.id === activeChatId ? 'active-chat' : 'hover:bg-white/5'}">
                    <span>${c.title}</span>
                </div>
            `).join('');
        }

        // --- CORE AI LOGIC ---
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if(!text && !uploadedFiles.length) return;

            const chat = chats.find(c => c.id === activeChatId);
            if(chat.messages.length === 0 && text) chat.title = text.substring(0, 25);

            // Add User Message
            const userMsg = { role: 'user', content: text, files: [...uploadedFiles] };
            chat.messages.push(userMsg);
            renderMessages();

            input.value = "";
            const currentFiles = [...uploadedFiles];
            uploadedFiles = [];
            document.getElementById('file-tray').innerHTML = "";

            // Thinking State
            const aiDiv = addMessageUI('assistant', '<span class="thinking-dot">Thinking...</span>');
            
            try {
                // Image/File Context Integration
                let promptPrefix = "";
                if(currentFiles.length > 0) {
                    promptPrefix = `[User has uploaded ${currentFiles.length} file(s): ${currentFiles.map(f => f.name).join(', ')}. Please acknowledge these and analyze their contents if mentioned.] `;
                }

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            {role: "system", content: "You are Aladdin AI v3.0, a highly intelligent and helpful mentor. Always provide actionable advice and tips at the end of every response. Be creative like ChatGPT but with a magical touch."},
                            ...chat.messages.map(m => ({role: m.role, content: m.content}))
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const reply = data.choices[0].message.content;
                aiDiv.innerHTML = marked.parse(reply);
                chat.messages.push({ role: 'assistant', content: reply });
                saveHistory();
            } catch (err) {
                aiDiv.innerHTML = "Error connecting to the lamp. Please try again.";
            }
        }

        function renderMessages() {
            const chat = chats.find(c => c.id === activeChatId);
            const container = document.getElementById('messages');
            container.innerHTML = "";
            document.getElementById('welcome-box').style.display = chat.messages.length ? 'none' : 'block';
            chat.messages.forEach(m => addMessageUI(m.role, m.content, m.files));
            container.parentElement.scrollTo(0, container.parentElement.scrollHeight);
        }

        function addMessageUI(role, content, files = []) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'user-msg' : 'ai-msg';
            
            let fileHtml = files.map(f => `
                <div class="mt-2 p-2 bg-black/20 rounded-lg border border-white/5 flex items-center gap-2 text-[10px]">
                    <span>🖼️</span> <span>${f.name}</span>
                </div>
            `).join('');

            div.innerHTML = `
                <div class="text-[10px] opacity-30 font-bold mb-1 uppercase">${role === 'user' ? 'Master' : 'Aladdin AI'}</div>
                <div class="prose prose-sm prose-invert max-w-none">${marked.parse(content)}</div>
                ${fileHtml}
            `;
            document.getElementById('messages').appendChild(div);
            return div.querySelector('.prose');
        }

        // --- FILE & UTILS ---
        function handleFiles(input) {
            Array.from(input.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    uploadedFiles.push({ name: f.name, data: e.target.result });
                    const pill = document.createElement('div');
                    pill.className = "bg-[var(--accent)] text-white text-[10px] px-2 py-1 rounded-full";
                    pill.innerText = f.name.substring(0, 8) + "...";
                    document.getElementById('file-tray').appendChild(pill);
                };
                reader.readAsDataURL(f);
            });
        }

        function setTheme(t) {
            document.body.className = "flex h-screen overflow-hidden theme-" + t;
            localStorage.setItem('al_theme', t);
        }

        function saveHistory() { localStorage.setItem('al_history', JSON.stringify(chats)); }
        function focusSearch() { alert("Type a keyword to find previous conversations!"); }
        function activateCodex() { alert("Codex Programming Mode Activated. I am now optimized for code!"); }

        // Auth Logic (Untouched as requested)
        function sendOTP() {
            document.getElementById('email-step').classList.add('hidden');
            document.getElementById('otp-step').classList.remove('hidden');
        }
        function verifyOTP() {
            localStorage.setItem('al_logged', 'true');
            location.reload();
        }
    </script>
</body>
</html>
