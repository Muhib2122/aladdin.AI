<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI v3.0 | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root { --bg: #0d0d0e; --sidebar: #000000; --card: #171719; --accent: #10a37f; --text: #ececf1; }
        .theme-blue { --accent: #3b82f6; } .theme-purple { --accent: #8b5cf6; } 
        .theme-gold { --accent: #f59e0b; } .theme-red { --accent: #ef4444; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; }
        .glass { background: rgba(23, 23, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        #sidebar { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 280px; }
        #sidebar.closed { width: 0; transform: translateX(-280px); opacity: 0; }
        
        .chat-bubble-user { background: #2f2f35; border-radius: 1.5rem 1.5rem 0.2rem 1.5rem; }
        .chat-bubble-ai { background: transparent; }
        
        .thinking-shimmer {
            background: linear-gradient(90deg, var(--accent) 0%, #ffffff 50%, var(--accent) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 1.5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        pre { background: #000 !important; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #333; }
        code { font-family: 'Courier New', monospace; color: #e2e2e2; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="auth-gate" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-md text-center shadow-2xl">
            <div class="mb-6"><span class="text-5xl">🧞</span></div>
            <h2 class="text-2xl font-bold mb-2">Aladdin AI v3.0</h2>
            <p class="text-gray-400 text-sm mb-8">Magic code will be sent to your email</p>
            
            <div id="email-view">
                <input type="email" id="user-email" placeholder="Enter your email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-[var(--accent)] transition">
                <button onclick="sendMagicCode()" id="btn-send" class="w-full bg-[var(--accent)] text-white font-bold py-4 rounded-xl hover:opacity-90">Send Magic Code</button>
            </div>

            <div id="otp-view" class="hidden">
                <input type="text" id="user-otp" placeholder="Enter 6-digit code" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-center tracking-[1em] outline-none focus:border-[var(--accent)]">
                <button onclick="verifyCode()" class="w-full bg-white text-black font-bold py-4 rounded-xl">Verify & Enter</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="bg-[var(--sidebar)] flex flex-col border-r border-white/10 relative overflow-hidden">
        <div class="p-4">
            <button onclick="startNewChat()" class="w-full flex items-center gap-3 p-3 rounded-lg border border-white/10 hover:bg-white/5 transition text-sm">
                <span>+</span> New chat
            </button>
        </div>

        <div id="chat-history" class="flex-1 overflow-y-auto px-3 space-y-2 custom-scrollbar">
            </div>

        <div class="p-4 border-t border-white/10">
            <div class="flex gap-2 mb-4">
                <div onclick="changeTheme('green')" class="w-5 h-5 rounded-full bg-[#10a37f] cursor-pointer"></div>
                <div onclick="changeTheme('blue')" class="w-5 h-5 rounded-full bg-blue-500 cursor-pointer"></div>
                <div onclick="changeTheme('purple')" class="w-5 h-5 rounded-full bg-purple-500 cursor-pointer"></div>
                <div onclick="changeTheme('gold')" class="w-5 h-5 rounded-full bg-amber-500 cursor-pointer"></div>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-white/5 rounded-xl transition cursor-pointer group">
                <div class="w-10 h-10 rounded-full bg-[var(--accent)] overflow-hidden" id="pfp-container">
                    <img id="user-pfp" class="w-full h-full object-cover hidden">
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-sm font-medium truncate" id="display-name">Master User</p>
                    <p class="text-[10px] text-gray-500">Free Plan</p>
                </div>
                <button onclick="logout()" class="text-red-500 opacity-0 group-hover:opacity-100 transition text-xs">Exit</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[var(--bg)]">
        <header class="h-14 border-b border-white/5 flex items-center justify-between px-4 glass z-40">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
            </button>
            <div class="flex bg-white/5 rounded-xl p-1 gap-1 scale-90">
                <button onclick="setModel('Basic')" class="model-btn px-4 py-1.5 rounded-lg text-xs bg-white/10">Basic</button>
                <button onclick="setModel('Ultra')" class="model-btn px-4 py-1.5 rounded-lg text-xs">Ultra</button>
                <button onclick="setModel('Pro')" class="model-btn px-4 py-1.5 rounded-lg text-xs">Pro</button>
            </div>
            <div class="text-[10px] font-bold text-[var(--accent)] uppercase tracking-widest">The Lamp is Active</div>
        </header>

        <div id="chat-view" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 scroll-smooth">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-20">
                <span class="text-6xl mb-4">🧞</span>
                <h1 class="text-3xl font-bold">How can I help you today?</h1>
            </div>
            <div id="msg-container" class="max-w-3xl mx-auto space-y-8"></div>
        </div>

        <div class="p-4 md:pb-8">
            <div class="max-w-3xl mx-auto relative">
                <div id="preview-bar" class="flex gap-2 mb-2"></div>
                <div class="glass rounded-3xl p-2 focus-within:border-white/20 transition-all shadow-2xl">
                    <div class="flex items-end gap-2 px-2">
                        <button onclick="document.getElementById('file-input').click()" class="p-3 text-gray-400 hover:text-white">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
                        </button>
                        <input type="file" id="file-input" class="hidden" multiple onchange="handleFiles(this)">
                        
                        <textarea id="main-input" rows="1" placeholder="Message Aladdin..." 
                            class="flex-1 bg-transparent py-3 outline-none resize-none text-sm max-h-60"
                            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                        
                        <button onclick="processMessage()" id="send-btn" class="p-3 bg-white text-black rounded-2xl hover:scale-105 transition disabled:opacity-50">
                            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
                <p class="text-[10px] text-center mt-3 text-gray-500">Aladdin AI can make mistakes. Check important info.</p>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIGURATION ---
        const GROQ_KEY = "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";
        const EMAILJS_CONFIG = {
            service: "service_d7q8v4o",
            template: "template_9nrhdsl",
            public: "5IDeLAjB6gy610xIB"
        };

        let currentOTP = null;
        let activeChatId = null;
        let model = "Basic";
        let uploadedFiles = [];
        let history = JSON.parse(localStorage.getItem('al_history')) || [];

        // --- AUTH & LOGIN ---
        (function init() {
            emailjs.init(EMAILJS_CONFIG.public);
            if(localStorage.getItem('isLoggedIn')) {
                document.getElementById('auth-gate').style.display = 'none';
                loadUserData();
                renderChatList();
                if(history.length > 0) openChat(history[0].id);
            }
        })();

        async function sendMagicCode() {
            const email = document.getElementById('user-email').value;
            if(!email.includes('@')) return alert("Valid email required");
            
            const btn = document.getElementById('btn-send');
            btn.innerText = "Casting Spell...";
            btn.disabled = true;

            currentOTP = Math.floor(100000 + Math.random() * 900000);
            
            try {
                await emailjs.send(EMAILJS_CONFIG.service, EMAILJS_CONFIG.template, {
                    email: email,
                    otp: currentOTP
                });
                document.getElementById('email-view').classList.add('hidden');
                document.getElementById('otp-view').classList.remove('hidden');
            } catch (err) {
                alert("Magic Failed! Use 123456 (Demo Mode)");
                currentOTP = "123456";
                document.getElementById('email-view').classList.add('hidden');
                document.getElementById('otp-view').classList.remove('hidden');
            }
        }

        function verifyCode() {
            const input = document.getElementById('user-otp').value;
            if(input == currentOTP) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', document.getElementById('user-email').value);
                location.reload();
            } else {
                alert("Invalid Code");
            }
        }

        // --- CHAT LOGIC ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('closed'); }

        function startNewChat() {
            activeChatId = Date.now();
            history.unshift({ id: activeChatId, title: "New Conversation", messages: [] });
            updateStorage();
            renderChatList();
            renderMessages();
        }

        async function processMessage() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if(!text && uploadedFiles.length === 0) return;

            if(!activeChatId) startNewChat();
            const currentChat = history.find(c => c.id === activeChatId);
            
            // Add User Message
            const userMsg = { role: 'user', content: text, files: [...uploadedFiles] };
            currentChat.messages.push(userMsg);
            if(currentChat.messages.length === 1) currentChat.title = text.substring(0, 30);
            
            renderMessages();
            input.value = "";
            input.style.height = "auto";
            const tempFiles = [...uploadedFiles];
            uploadedFiles = [];
            document.getElementById('preview-bar').innerHTML = "";

            // AI Thinking State
            const aiMsgDiv = createMsgElement('assistant', '');
            const shimmer = document.createElement('span');
            shimmer.className = "thinking-shimmer font-bold";
            shimmer.innerText = "Genie is analyzing your wish...";
            aiMsgDiv.appendChild(shimmer);

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: model === 'Basic' ? "llama-3.1-8b-instant" : "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are Aladdin AI Legend. A premium, witty, and high-IQ AI. Format responses with Markdown. Always provide a 'Pro-Tip' section at the end. Final sentence: 'Do you need anything else? I am Aladdin, right by your side.'" },
                            ...currentChat.messages.map(m => ({ role: m.role, content: m.content }))
                        ]
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                aiMsgDiv.innerHTML = marked.parse(aiResponse);
                currentChat.messages.push({ role: 'assistant', content: aiResponse });
                updateStorage();
                renderChatList();
            } catch (err) {
                aiMsgDiv.innerHTML = "<span class='text-red-400'>Error connecting to the lamp. Check API connection.</span>";
            }
        }

        // --- UI RENDERING ---
        function renderMessages() {
            const container = document.getElementById('msg-container');
            const welcome = document.getElementById('welcome-screen');
            const chat = history.find(c => c.id === activeChatId);
            
            container.innerHTML = "";
            welcome.style.display = chat.messages.length ? 'none' : 'flex';
            
            chat.messages.forEach(m => {
                const div = createMsgElement(m.role, m.content);
                if(m.files && m.files.length > 0) {
                    const fDiv = document.createElement('div');
                    fDiv.className = "flex gap-2 mt-2";
                    m.files.forEach(f => {
                        fDiv.innerHTML += `<div class="text-[10px] bg-white/10 px-2 py-1 rounded">📄 ${f.name}</div>`;
                    });
                    div.appendChild(fDiv);
                }
            });
            
            const view = document.getElementById('chat-view');
            view.scrollTo(0, view.scrollHeight);
        }

        function createMsgElement(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in duration-500`;
            
            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] p-4 ${role === 'user' ? 'chat-bubble-user' : 'chat-bubble-ai'}`;
            
            const header = document.createElement('div');
            header.className = "text-[10px] font-bold opacity-30 mb-2 uppercase tracking-tighter";
            header.innerText = role === 'user' ? 'Master' : 'Aladdin AI';
            
            const body = document.createElement('div');
            body.className = "prose prose-invert prose-sm max-w-none";
            body.innerHTML = marked.parse(content);
            
            bubble.appendChild(header);
            bubble.appendChild(body);
            wrapper.appendChild(bubble);
            document.getElementById('msg-container').appendChild(wrapper);
            return body;
        }

        function renderChatList() {
            const list = document.getElementById('chat-history');
            list.innerHTML = history.map(c => `
                <div onclick="openChat(${c.id})" class="p-3 rounded-xl cursor-pointer truncate text-sm transition ${c.id === activeChatId ? 'bg-white/10 border border-white/10' : 'hover:bg-white/5 opacity-60'}">
                    💬 ${c.title}
                </div>
            `).join('');
        }

        function openChat(id) { activeChatId = id; renderChatList(); renderMessages(); }
        function handleFiles(input) {
            Array.from(input.files).forEach(f => {
                uploadedFiles.push({ name: f.name });
                const chip = document.createElement('div');
                chip.className = "bg-[var(--accent)] text-white text-[10px] px-2 py-1 rounded-full";
                chip.innerText = f.name.slice(0,10) + "...";
                document.getElementById('preview-bar').appendChild(chip);
            });
        }

        // --- SETTINGS & STORAGE ---
        function updateStorage() { localStorage.setItem('al_history', JSON.stringify(history)); }
        function changeTheme(c) { document.body.className = "theme-" + c; localStorage.setItem('al_theme', c); }
        function setModel(m) { 
            model = m; 
            document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('bg-white/10'));
            event.target.classList.add('bg-white/10');
        }
        function loadUserData() {
            const email = localStorage.getItem('userEmail');
            document.getElementById('display-name').innerText = email.split('@')[0];
            const theme = localStorage.getItem('al_theme') || 'green';
            changeTheme(theme);
        }
        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
