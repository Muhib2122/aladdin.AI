<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aladdin AI 🧞</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧞</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #212121; color: #ececec; overflow: hidden; height: 100vh; }
        .sidebar { background-color: #171717; width: 260px; flex-shrink: 0; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,0.05); }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #212121; position: relative; }
        .chat-input-container { background: #2f2f2f; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; margin: 0 auto; width: 100%; max-width: 48rem; }
        
        /* Message Styles */
        .prose pre { background: #0d0d0d !important; padding: 16px; border-radius: 12px; margin: 12px 0; border: 1px solid #333; overflow-x: auto; }
        .prose code { font-family: 'JetBrains Mono', monospace; color: #eab308; background: transparent; }
        
        /* Custom Scroll */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3c3c3c; border-radius: 10px; }
        
        /* Login Overlay */
        #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: #212121; display: flex; align-items: center; justify-content: center; }
        .auth-card { width: 400px; background: #2f2f2f; padding: 40px; border-radius: 24px; border: 1px solid #444; text-align: center; }
        
        .hidden { display: none; }
    </style>
</head>
<body class="flex">

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="mb-6">
                <span class="text-5xl">🧞</span>
                <h2 class="text-2xl font-bold mt-4">Aladdin AI</h2>
                <p class="text-gray-400 text-sm">Security Verification</p>
            </div>
            
            <div id="step-email">
                <input id="user-email" type="email" placeholder="Enter your email" class="w-full bg-[#3c3c3c] border border-gray-600 rounded-xl p-4 mb-4 outline-none focus:border-emerald-500 text-white">
                <button onclick="handleSendOTP()" id="send-otp-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-xl transition">
                    Send Magic Code
                </button>
            </div>

            <div id="step-otp" class="hidden">
                <p class="text-xs text-emerald-400 mb-4">Check your inbox for the code!</p>
                <input id="user-otp" type="text" placeholder="000000" class="w-full bg-[#3c3c3c] border border-gray-600 rounded-xl p-4 mb-4 text-center text-2xl tracking-widest outline-none focus:border-emerald-500 text-white">
                <button onclick="handleVerifyOTP()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-xl transition">
                    Verify & Enter
                </button>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="p-4">
            <button onclick="resetChat()" class="w-full flex items-center gap-3 p-3 rounded-lg border border-white/10 hover:bg-white/5 transition">
                <i class="fa fa-plus text-xs"></i>
                <span class="text-sm">New Chat</span>
            </button>
        </div>
        <div id="history-list" class="flex-1 overflow-y-auto custom-scroll px-3 space-y-1"></div>
        <div class="p-4 border-t border-white/5 text-xs text-gray-500">
            Logged in as Master 🧞
        </div>
    </aside>

    <main class="main-content">
        <header class="h-14 flex items-center justify-between px-6 border-b border-white/5">
            <div class="font-bold">Aladdin AI 🧞</div>
            <div class="text-[10px] bg-white/5 px-2 py-1 rounded border border-white/10 text-gray-400 uppercase tracking-tighter">
                Llama 3.3 Versatile
            </div>
        </header>

        <div id="chat-scroller" class="flex-1 overflow-y-auto custom-scroll p-4">
            <div id="welcome-box" class="h-full flex flex-col items-center justify-center text-center">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl mb-4">🧞</div>
                <h1 class="text-3xl font-bold">What's on your mind?</h1>
            </div>
            <div id="chat-messages" class="max-w-3xl mx-auto space-y-8 py-10"></div>
        </div>

        <div class="p-4 bg-gradient-to-t from-[#212121] to-transparent">
            <div id="preview-bar" class="max-w-3xl mx-auto flex flex-wrap gap-2 mb-2 hidden"></div>
            
            <div class="chat-input-container">
                <textarea id="main-input" rows="1" placeholder="Type your request..." class="w-full bg-transparent p-4 outline-none resize-none text-white max-h-48"></textarea>
                <div class="flex items-center justify-between px-4 pb-3">
                    <div class="flex gap-2">
                        <label class="p-2 text-gray-400 hover:text-white cursor-pointer transition">
                            <i class="fa fa-paperclip"></i>
                            <input type="file" id="file-picker" class="hidden" multiple onchange="onFilesSelected(event)">
                        </label>
                    </div>
                    <button onclick="startGeneration()" id="action-btn" class="bg-white text-black w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-200 transition disabled:opacity-20">
                        <i class="fa fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        /* ═══════════════════════════════════════════════════════════ 
           GLOBAL DATA
        ═══════════════════════════════════════════════════════════ */
        const GK = "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";
        const ES = "service_d7q8v4o";
        const ET = "template_9nrhdsl";
        const EK = "5IDeLAjB6gy610xIB";
        
        // PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let chatContext = [];
        let uploadedAssets = [];
        let secretCode = null;
        let processing = false;

        /* ═══════════════════════════════════════════════════════════ 
           FIXED LOGIN (EmailJS g_id Fix)
        ═══════════════════════════════════════════════════════════ */
        async function handleSendOTP() {
            const mail = document.getElementById("user-email").value;
            if(!mail.includes("@")) return alert("Please enter a valid email.");

            const btn = document.getElementById("send-otp-btn");
            btn.disabled = true;
            btn.innerText = "Invoking Magic...";

            secretCode = Math.floor(100000 + Math.random() * 900000).toString();

            try {
                // FIXED: Passing Public Key explicitly in the options to avoid "g_id is required"
                await emailjs.send(ES, ET, {
                    to_name: "Master",
                    email: mail,
                    otp: secretCode
                }, {
                    publicKey: EK
                });
                
                document.getElementById("step-email").classList.add("hidden");
                document.getElementById("step-otp").classList.remove("hidden");
            } catch (err) {
                console.error("EmailJS Failed:", err);
                alert("Login Error: Template or Public Key mismatch. Check Console.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Magic Code";
            }
        }

        function handleVerifyOTP() {
            const val = document.getElementById("user-otp").value;
            if(val === secretCode) {
                localStorage.setItem("aladdin_auth", "true");
                document.getElementById("auth-overlay").classList.add("hidden");
            } else {
                alert("Invalid code, Master!");
            }
        }

        /* ═══════════════════════════════════════════════════════════ 
           FILE & PDF LOGIC
        ═══════════════════════════════════════════════════════════ */
        async function onFilesSelected(e) {
            const list = e.target.files;
            for(let f of list) {
                if(f.type.startsWith("image/")) {
                    const b64 = await toBase64(f);
                    uploadedAssets.push({ type: 'img', data: b64, name: f.name });
                } else if(f.type === "application/pdf") {
                    const text = await parsePDF(f);
                    uploadedAssets.push({ type: 'pdf', data: text, name: f.name });
                }
            }
            showPreviews();
        }

        function toBase64(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onload = (ev) => r(ev.target.result);
                reader.readAsDataURL(f);
            });
        }

        async function parsePDF(f) {
            const buffer = await f.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
            let captured = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                captured += content.items.map(s => s.str).join(" ") + "\n";
            }
            return captured;
        }

        function showPreviews() {
            const bar = document.getElementById("preview-bar");
            bar.innerHTML = "";
            if(uploadedAssets.length > 0) {
                bar.classList.remove("hidden");
                uploadedAssets.forEach((a, i) => {
                    const chip = document.createElement("div");
                    chip.className = "bg-white/10 text-[10px] p-2 rounded-md border border-white/10 flex items-center gap-2";
                    chip.innerHTML = `<span>${a.name}</span><button onclick="removeAsset(${i})">×</button>`;
                    bar.appendChild(chip);
                });
            } else {
                bar.classList.add("hidden");
            }
        }

        function removeAsset(i) {
            uploadedAssets.splice(i, 1);
            showPreviews();
        }

        /* ═══════════════════════════════════════════════════════════ 
           GROQ CORE & PAYLOAD CLEANING (400 Error Fix)
        ═══════════════════════════════════════════════════════════ */
        async function startGeneration() {
            const input = document.getElementById("main-input");
            const rawText = input.value.trim();
            if((!rawText && uploadedAssets.length === 0) || processing) return;

            document.getElementById("welcome-box").classList.add("hidden");
            
            // Context Building
            let finalPrompt = rawText;
            const currentFiles = [...uploadedAssets];
            uploadedAssets = [];
            showPreviews();

            const hasImg = currentFiles.some(x => x.type === 'img');
            if(hasImg) {
                const imgObj = currentFiles.find(x => x.type === 'img');
                finalPrompt = [
                    { type: "text", text: rawText || "Examine this image." },
                    { type: "image_url", image_url: { url: imgObj.data } }
                ];
            }

            const pdfs = currentFiles.filter(x => x.type === 'pdf');
            if(pdfs.length > 0) {
                const context = pdfs.map(p => `[FILE: ${p.name}]\n${p.data}`).join("\n\n");
                finalPrompt = `[Extracted Document Context]:\n${context}\n\n[User]: ${rawText}`;
            }

            const userEntry = { role: "user", content: finalPrompt };
            chatContext.push(userEntry);
            addMessageUI(userEntry);
            
            input.value = "";
            input.style.height = "auto";
            processing = true;
            document.getElementById("action-btn").disabled = true;

            const aiBubble = addMessageUI({ role: "assistant", content: "" });
            const body = aiBubble.querySelector(".msg-txt");

            try {
                // STRICT PAYLOAD CLEANING: Remove everything except role and content
                const cleanPayload = chatContext.map(m => ({
                    role: m.role,
                    content: m.content
                }));

                cleanPayload.unshift({
                    role: "system",
                    content: "You are Aladdin AI 🧞, a top-tier GPT-4 level assistant. End every response with: Aladdin is right by your side. 🧞"
                });

                const targetModel = hasImg ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile";

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: targetModel,
                        messages: cleanPayload,
                        stream: true,
                        temperature: 0.5
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulated = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split("\n");
                    for(let line of lines) {
                        if(line.startsWith("data: ") && line !== "data: [DONE]") {
                            try {
                                const json = JSON.parse(line.substring(6));
                                const part = json.choices[0].delta.content || "";
                                accumulated += part;
                                body.innerHTML = marked.parse(accumulated);
                            } catch(e) {}
                        }
                    }
                }
                chatContext.push({ role: "assistant", content: accumulated });
                hljs.highlightAll();
            } catch (err) {
                body.innerText = "The magic lamp flickered... Error connecting to Groq.";
                console.error(err);
            } finally {
                processing = false;
                document.getElementById("action-btn").disabled = false;
                autoScroll();
            }
        }

        /* ═══════════════════════════════════════════════════════════ 
           UI HELPERS
        ═══════════════════════════════════════════════════════════ */
        function addMessageUI(msg) {
            const container = document.getElementById("chat-messages");
            const isUser = msg.role === "user";
            const row = document.createElement("div");
            row.className = `flex gap-5 p-4 rounded-2xl ${isUser ? 'bg-white/5' : ''}`;
            
            const txt = typeof msg.content === 'string' ? msg.content : "Analyzed an image";
            
            row.innerHTML = `
                <div class="w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center font-bold ${isUser ? 'bg-indigo-600' : 'bg-emerald-600'}">
                    ${isUser ? 'M' : '🧞'}
                </div>
                <div class="flex-1 prose prose-invert max-w-none">
                    <p class="text-[10px] font-bold text-gray-500 uppercase mb-1">${isUser ? 'Master' : 'Aladdin'}</p>
                    <div class="msg-txt text-sm leading-relaxed">${isUser ? txt : marked.parse(txt)}</div>
                </div>
            `;
            container.appendChild(row);
            autoScroll();
            return row;
        }

        function autoScroll() {
            const div = document.getElementById("chat-scroller");
            div.scrollTop = div.scrollHeight;
        }

        document.getElementById("main-input").addEventListener("input", function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        function resetChat() {
            chatContext = [];
            document.getElementById("chat-messages").innerHTML = "";
            document.getElementById("welcome-box").classList.remove("hidden");
        }

        window.onload = () => {
            if(localStorage.getItem("aladdin_auth") === "true") {
                document.getElementById("auth-overlay").classList.add("hidden");
            }
        };
    </script>
</body>
</html>
